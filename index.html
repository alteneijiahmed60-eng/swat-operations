<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة العمليات الخاصة</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #000; --panel: #15191c; --neon: #00ff41; --danger: #ff0000; --tactical: #968c83; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        #callUI { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .call-img { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--neon); object-fit: cover; margin-bottom: 20px; box-shadow: 0 0 15px var(--neon); background: #111; }
        .timer { font-size: 2.8rem; color: var(--neon); font-family: monospace; margin: 20px 0; }
        .pulse { width: 70px; height: 70px; background: var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; color: #000; animation: pulse-anim 1.5s infinite; margin-bottom: 20px; }
        @keyframes pulse-anim { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); } 70% { box-shadow: 0 0 0 25px rgba(0, 255, 65, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); } }
        .btn-call { width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; }
        .accept { background: var(--neon); color: #000; }
        .reject { background: var(--danger); color: #fff; }
        .control { background: #333; color: #fff; }

        #loginPage { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 15px; width: 85%; max-width: 380px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; background: #0b0e11; border: 1px solid #444; color: #fff; border-radius: 5px; text-align: center; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; background: var(--tactical); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        #mainApp { display: none; height: 100vh; flex-direction: column; }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 100; }
        .nav-item { color: #555; font-size: 22px; cursor: pointer; }
        .nav-item.active { color: var(--neon); }
        .tab-content { padding: 15px; flex: 1; overflow-y: auto; padding-bottom: 80px; }
        
        .chat-box { height: calc(100vh - 280px); overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; border: 1px solid #333; margin-bottom: 10px; display: flex; flex-direction: column; }
        .date-divider { text-align: center; margin: 15px 0; position: relative; }
        .date-divider span { background: #222; color: #777; padding: 3px 12px; border-radius: 12px; font-size: 10px; position: relative; z-index: 2; }
        .date-divider::after { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: #222; z-index: 1; }
        .msg { background: #1c2126; padding: 8px; border-radius: 10px; margin-bottom: 10px; display: flex; gap: 8px; border-right: 3px solid var(--tactical); position: relative; }
        .msg img.profile-pic { width: 32px; height: 32px; border-radius: 50%; }
        .msg-text { margin-top: 3px; font-size: 13px; white-space: pre-wrap; line-height: 1.4; }
        .msg-time { font-size: 8px; color: #555; text-align: left; margin-top: 2px; }
        .sys-msg { text-align: center; font-size: 10px; color: var(--neon); background: rgba(0,255,65,0.05); padding: 5px; border-radius: 5px; margin: 5px 0; border: 1px solid rgba(0,255,65,0.1); }
        
        .chat-controls { display: flex; gap: 8px; align-items: flex-end; background: #0b0e11; padding: 8px; border-radius: 8px; border: 1px solid #333; }
        .chat-btn { background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; padding: 5px; }
        #msgInput { flex: 1; padding: 8px; background: #15191c; border: 1px solid #444; color: #fff; border-radius: 5px; resize: none; min-height: 35px; max-height: 120px; font-size: 14px; font-family: inherit; }

        #radarMap { width: 100%; height: 350px; border-radius: 12px; border: 1px solid var(--tactical); margin-top: 15px; z-index: 1; filter: invert(100%) hue-rotate(180deg); }
        .user-label { background: var(--neon); color: #000; border: 1px solid #fff; border-radius: 3px; padding: 1px 5px; font-size: 9px; font-weight: bold; }
        
        #audioPermissionUI, #raidAlertUI { display: none; position: fixed; inset: 0; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; background: rgba(0,0,0,0.95); }
        #raidAlertUI { background: rgba(255, 0, 0, 0.95); }
    </style>
</head>
<body>

<audio id="ringtone" src="https://www.soundjay.com/phone/sounds/phone-calling-1.mp3" loop></audio>
<audio id="sirenSound" src="https://www.soundjay.com/mechanical/sounds/alarm-clock-01.mp3" loop></audio>
<audio id="remoteAudio" autoplay></audio>

<div id="audioPermissionUI">
    <i class="fas fa-satellite-dish" style="font-size: 60px; color: var(--neon); margin-bottom: 20px;"></i>
    <h2 style="color: white;">تفعيل المنظومة</h2>
    <p style="color: #aaa;">سيتم طلب إذن الميكروفون والكاميرا والموقع لضمان العمل</p>
    <button class="btn-main" style="background: var(--neon); color: black;" onclick="enableAudioAndStart()">تفعيل الجاهزية</button>
</div>

<div id="raidAlertUI">
    <i class="fas fa-exclamation-triangle" style="font-size: 80px; color: white;"></i>
    <h1>نداء مداهمة!</h1>
    <h3 id="raidAlertSender"></h3>
    <button class="btn-main" style="background: #000; color: #fff; width: 180px;" onclick="dismissRaidAlert()">علم</button>
</div>

<div id="callUI">
    <div id="callHeader"><div class="pulse"><i class="fas fa-phone-alt"></i></div><h3 id="callStatusText" style="color: var(--neon);">جاري الاتصال...</h3></div>
    <img src="" id="peerImg" class="call-img">
    <video id="remoteVideo" autoplay playsinline class="call-img" style="display: none; background: #111;"></video>
    <div class="call-info"><h2 id="peerName">--</h2><p id="peerRank" style="color: var(--tactical);">--</p></div>
    <div id="activeCallTimer" class="timer" style="display: none;">00:00</div>
    <div class="call-btns" id="callActionBtns"><button id="acceptBtn" class="btn-call accept" onclick="handleAccept()"><i class="fas fa-phone"></i></button><button class="btn-call reject" onclick="endCall()"><i class="fas fa-phone-slash"></i></button></div>
    <div class="call-btns" id="activeCallBtns" style="display: none;"><button id="muteBtn" class="btn-call control" onclick="toggleMute()"><i class="fas fa-microphone"></i></button><button class="btn-call reject" onclick="endCall()"><i class="fas fa-phone-slash"></i></button><button id="videoBtn" class="btn-call control" onclick="toggleVideo()"><i class="fas fa-video-slash"></i></button></div>
</div>

<div id="loginPage">
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/ar/thumb/f/f6/Sharjah_Police_Logo.svg/1200px-Sharjah_Police_Logo.svg.png" style="width:80px; margin-bottom:10px; background:white; border-radius:50%; padding:5px;">
        <h2 style="color: #fff;">العمليات الخاصة</h2>
        <input type="text" id="milId" list="personnelList" placeholder="الرقم العسكري أو الاسم" autocomplete="off">
        <datalist id="personnelList"></datalist>
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn-main" onclick="login()">دخول النظام</button>
    </div>
</div>

<div id="mainApp">
    <div style="padding: 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;">
        <div id="userDisplay" style="font-size: 12px; font-weight: bold;">--</div>
        <button onclick="logout()" style="background: none; border: 1px solid var(--danger); color: var(--danger); font-size: 9px; padding: 2px 8px; border-radius: 4px;">خروج</button>
    </div>

    <div id="homeSec" class="tab-content">
        <div id="adminPanel" style="display:none; background: #1c2126; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-right: 4px solid var(--neon);">
            <h4 style="margin:0 0 10px 0; color: var(--neon);">لوحة القيادة</h4>
            <input type="text" id="targetUser" list="adminPersonnelList" class="admin-select" placeholder="ابحث عن العسكري...">
            <datalist id="adminPersonnelList"></datalist>
            <select id="targetGroupAdmin" class="admin-select">
                <option value="المجموعة المشتركة">المجموعة المشتركة</option>
                <option value="المجموعة القتالية الأولى">القتالية الأولى</option>
                <option value="المجموعة القتالية الثانية">القتالية الثانية</option>
                <option value="المجموعة القتالية الثالثة">القتالية الثالثة</option>
                <option value="قلم القوة">قلم القوة</option>
            </select>
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                <button class="btn-main" style="flex: 1; font-size: 11px;" onclick="manageMember('add')">إضافة</button>
                <button class="btn-main" style="flex: 1; background: var(--danger); color: #fff; font-size: 11px;" onclick="manageMember('remove')">إزالة</button>
            </div>
            <button class="btn-main" style="background: var(--danger); color: #fff;" onclick="triggerRaid()">نداء مداهمة</button>
            <button class="btn-main" style="background: transparent; border: 1px solid var(--danger); color: var(--danger);" onclick="clearChat()">مسح الدردشة</button>
        </div>
        <div style="background: rgba(0, 255, 65, 0.05); padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0; font-size: 0.8rem;">رادار تعقب القوات لايف</h3>
            <div><span id="onlineCountDisplay" style="color: var(--neon); font-weight: bold;">0</span> <small>متصل</small></div>
        </div>
        <div id="radarMap"></div>
    </div>

    <div id="chatSec" class="tab-content" style="display: none; padding: 10px;">
        <div id="groupList">
            <button class="btn-main" onclick="openChat('المجموعة المشتركة')">المجموعة المشتركة</button>
            <button id="btn-g1" class="btn-main" style="display:none;" onclick="openChat('المجموعة القتالية الأولى')">القتالية الأولى</button>
            <button id="btn-g2" class="btn-main" style="display:none;" onclick="openChat('المجموعة القتالية الثانية')">القتالية الثانية</button>
            <button id="btn-g3" class="btn-main" style="display:none;" onclick="openChat('المجموعة القتالية الثالثة')">القتالية الثالثة</button>
            <button id="btn-g4" class="btn-main" style="display:none;" onclick="openChat('قلم القوة')">قلم القوة</button>
        </div>
        <div id="activeChat" style="display: none; flex-direction: column;">
            <div id="chatBox" class="chat-box"></div>
            <div class="chat-controls">
                <input type="file" id="chatFile" accept="image/*" style="display:none;" onchange="uploadFile(event)">
                <button class="chat-btn" onclick="document.getElementById('chatFile').click()"><i class="fas fa-paperclip"></i></button>
                <button class="chat-btn" onclick="insertRaidTemplate()"><i class="fas fa-file-invoice"></i></button>
                <textarea id="msgInput" placeholder="اكتب بلاغاً..."></textarea>
                <button class="chat-btn" style="color: var(--neon);" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
            <button onclick="backToGroups()" class="btn-main" style="margin-top:10px; font-size:12px;">رجوع للقائمة</button>
        </div>
    </div>

    <div id="callSec" class="tab-content" style="display: none;">
        <div style="background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #333;">
            <h3>اتصال عسكري مؤمن</h3>
            <input type="text" id="targetId" list="callList" placeholder="الرقم العسكري أو الاسم" style="width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; text-align: center;">
            <datalist id="callList"></datalist>
            <button class="btn-main" style="background: var(--neon);" onclick="startCall()">اطلب الآن</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="switchTab('call', this)"><i class="fas fa-phone-volume"></i></div>
        <div class="nav-item" onclick="switchTab('chat', this)"><i class="fas fa-comment-dots"></i></div>
    </nav>
</div>

        "105061": { rank: "شرطي أول", name: "عبدالله علي القايدي" },
        "105364": { rank: "شرطي أول", name: "فهد سعيد كشيش الشحي" },
        "105869": { rank: "شرطي أول", name: "حسن علي درويش محمد الرئيسي" }
    };

    let currentUser = "";
    let map, markers = {}, geoWatchId, localStream, peerConnection, currentCallRefId, callTimer;
    let isMuted = false, isVideoOn = false;
    const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

    window.onload = function() {
        const loginList = document.getElementById('personnelList'), callList = document.getElementById('callList'), adminList = document.getElementById('adminPersonnelList');
        Object.keys(personnelDB).sort().forEach(id => {
            let t = id + " - " + personnelDB[id].name;
            loginList.appendChild(new Option(t, t)); callList.appendChild(new Option(t, t)); adminList.appendChild(new Option(t, t));
        });
        let saved = localStorage.getItem('session_user');
        if (saved && personnelDB[saved]) { currentUser = saved; document.getElementById('loginPage').style.display = 'none'; document.getElementById('audioPermissionUI').style.display = 'flex'; }
    };

    async function enableAudioAndStart() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
            localStream.getTracks().forEach(t => t.enabled = false); // غلقها مبدئياً
        } catch(e) { console.log("Camera fail, trying audio only"); localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
        document.getElementById('audioPermissionUI').style.display = 'none';
        showMainApp();
    }

    // --- الشات والإرسال ---
    function sendMsg() {
        const inp = document.getElementById('msgInput');
        const val = inp.value.trim();
        if(!val) return;
        db.ref('chats/' + document.getElementById('currentGroupName').innerText).push({
            id: currentUser, type: 'text', name: personnelDB[currentUser].name, rank: personnelDB[currentUser].rank, text: val, time: Date.now()
        });
        inp.value = ""; inp.style.height = '35px';
    }

    function openChat(n) {
        document.getElementById('groupList').style.display='none'; document.getElementById('activeChat').style.display='flex'; document.getElementById('currentGroupName').innerText=n;
        db.ref('chats/'+n).on('value', snap => {
            const box = document.getElementById('chatBox'); box.innerHTML = "";
            let lastD = "";
            snap.forEach(c => {
                const m = c.val(), key = c.key, d = formatDate(m.time);
                if(d !== lastD) { box.innerHTML += `<div class="date-divider"><span>${d}</span></div>`; lastD = d; }
                if(m.system) { box.innerHTML += `<div class="sys-msg">${m.text} <br><small>${formatTime(m.time)}</small></div>`; }
                else {
                    let del = (m.id === currentUser) ? `<i class="fas fa-trash" style="cursor:pointer;" onclick="deleteMsg('${n}','${key}')"></i>` : "";
                    let content = m.type==='image' ? `<a href="${m.content}" target="_blank"><img src="${m.content}" style="max-width:100%; border-radius:5px;"></a>` : `<div class="msg-text">${m.text}</div>`;
                    box.innerHTML += `<div class="msg"><img src="https://via.placeholder.com/35" class="profile-pic"><div style="flex:1;"><div class="msg-header"><span>${m.rank} / ${m.name}</span>${del}</div>${content}<div class="msg-time">${formatTime(m.time)}</div></div></div>`;
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    // --- نظام الاتصال WebRTC (ثابت) ---
    async function startCall() {
        let raw = document.getElementById('targetId').value.trim(); let tid = raw.split('-')[0].trim();
        if(!personnelDB[tid] || tid === currentUser) return alert("خطأ");
        currentCallRefId = tid; setupCallUI(tid, 'calling');
        peerConnection = new RTCPeerConnection(servers);
        peerConnection.ontrack = e => { 
            if(e.track.kind==='audio') document.getElementById('remoteAudio').srcObject=e.streams[0]; 
            if(e.track.kind==='video') document.getElementById('remoteVideo').srcObject=e.streams[0]; 
        };
        if(localStream) localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
        peerConnection.onicecandidate = e => { if(e.candidate) db.ref(`calls/${tid}/callerCandidates`).push(e.candidate.toJSON()); };
        const offer = await peerConnection.createOffer(); await peerConnection.setLocalDescription(offer);
        db.ref('calls/'+tid).set({ offer:{type:offer.type, sdp:offer.sdp}, callerId:currentUser, status:'ringing', time:Date.now() });
        db.ref(`calls/${tid}`).on('value', async s => { const d = s.val(); if(d && d.status==='accepted' && d.answer && !peerConnection.currentRemoteDescription) { await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer)); startActiveCallUI(); } });
    }

    function listenForCalls() {
        db.ref('calls/'+currentUser).on('value', async s => {
            const d = s.val();
            if(d && d.status==='ringing') { currentCallRefId=currentUser; setupCallUI(d.callerId, 'incoming'); document.getElementById('ringtone').play(); } 
            else if(!d) hideCallUI();
        });
    }

    async function handleAccept() {
        document.getElementById('ringtone').pause(); const snap = await db.ref('calls/'+currentUser).get(); const data = snap.val();
        peerConnection = new RTCPeerConnection(servers);
        peerConnection.ontrack = e => { 
            if(e.track.kind==='audio') document.getElementById('remoteAudio').srcObject=e.streams[0]; 
            if(e.track.kind==='video') document.getElementById('remoteVideo').srcObject=e.streams[0]; 
        };
        if(localStream) localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
        peerConnection.onicecandidate = e => { if(e.candidate) db.ref(`calls/${currentUser}/receiverCandidates`).push(e.candidate.toJSON()); };
        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer)); const answer = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer);
        await db.ref('calls/'+currentUser).update({ answer:{type:answer.type, sdp:answer.sdp}, status:'accepted' }); startActiveCallUI();
    }

    // --- وظائف عامة ---
    function formatTime(t) { return new Date(t).toLocaleTimeString('ar-AE', { hour:'2-digit', minute:'2-digit' }); }
    function formatDate(t) { const d = new Date(t), now = new Date(); if(d.toDateString() === now.toDateString()) return "اليوم"; const y = new Date(); y.setDate(now.getDate()-1); if(d.toDateString() === y.toDateString()) return "أمس"; return d.toLocaleDateString('ar-AE', { day:'numeric', month:'long' }); }
    function login() { let raw = document.getElementById('milId').value.trim(); let id = raw.includes('-') ? raw.split('-')[0].trim() : raw; let pass = document.getElementById('pass').value.trim(); if(personnelDB[id] && pass === (localStorage.getItem(id+'_pass') || "SHJ@123")) { currentUser = id; localStorage.setItem('session_user', id); document.getElementById('loginPage').style.display = 'none'; document.getElementById('audioPermissionUI').style.display = 'flex'; } else alert("خطأ!"); }
    function logout() { db.ref('online_users/'+currentUser).remove(); localStorage.removeItem('session_user'); location.reload(); }
    function switchTab(t, el) { document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none'); document.getElementById(t + 'Sec').style.display = 'block'; document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); if(t==='home'&&map) setTimeout(()=>map.invalidateSize(),200); }
    function backToGroups() { document.getElementById('groupList').style.display = 'block'; document.getElementById('activeChat').style.display = 'none'; }
    function showMainApp() { document.getElementById('mainApp').style.display = 'flex'; document.getElementById('userDisplay').innerText = personnelDB[currentUser].rank + " / " + personnelDB[currentUser].name; if(["1321", "1408", "1549"].includes(currentUser)) document.getElementById('adminPanel').style.display = 'block'; initRadar(); checkGroups(); listenForCalls(); listenForRaidAlerts(); }
    function initRadar() { if(!map) { map = L.map('radarMap').setView([25.3462, 55.4209], 13); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); } if (navigator.geolocation) { geoWatchId = navigator.geolocation.watchPosition(pos => { db.ref('online_users/' + currentUser).set({ lat: pos.coords.latitude, lng: pos.coords.longitude, rank: personnelDB[currentUser].rank, name: personnelDB[currentUser].name, time: Date.now() }); db.ref('online_users/' + currentUser).onDisconnect().remove(); }, null, { enableHighAccuracy: true }); } db.ref('online_users').on('value', snap => { const data = snap.val() || {}; document.getElementById('onlineCountDisplay').innerText = Object.keys(data).length; for(let id in markers) { if(!data[id]) { map.removeLayer(markers[id]); delete markers[id]; } } for(let id in data) { const u = data[id]; if(markers[id]) markers[id].setLatLng([u.lat, u.lng]); else { markers[id] = L.circleMarker([u.lat, u.lng], { radius: 8, fillColor: id===currentUser?"#007bff":"#ff0000", color:"#fff", weight:2, fillOpacity:0.8 }).addTo(map); markers[id].bindTooltip(`${u.rank} / ${u.name}`, { permanent:true, direction:'top', className:'user-label', offset:[0,-10] }).openTooltip(); } } }); }
    function checkGroups() { db.ref('users_groups/' + currentUser).on('value', snap => { const acc = snap.val() || {}; ['g1', 'g2', 'g3', 'g4'].forEach(g => { if(acc[g] && document.getElementById('btn-' + g)) document.getElementById('btn-' + g).style.display = 'block'; }); if (sessionStorage.getItem('login_notified')) return; const groupNames = { "g1": "المجموعة القتالية الأولى", "g2": "المجموعة القتالية الثانية", "g3": "المجموعة القتالية الثالثة", "g4": "قلم القوة" }; Object.keys(acc).forEach(g => { if (acc[g]) db.ref('chats/' + groupNames[g]).push({ system: true, text: `تم تسجيل دخول: ${personnelDB[currentUser].rank} / ${personnelDB[currentUser].name}`, time: Date.now() }); }); sessionStorage.setItem('login_notified', 'true'); }); }
    function setupCallUI(id, type) { document.getElementById('callUI').style.display='flex'; document.getElementById('peerName').innerText=personnelDB[id].name; document.getElementById('peerRank').innerText=personnelDB[id].rank; if(type==='incoming') { document.getElementById('callActionBtns').style.display='flex'; document.getElementById('acceptBtn').style.display='flex'; } else { document.getElementById('callActionBtns').style.display='flex'; document.getElementById('acceptBtn').style.display='none'; } }
    function startActiveCallUI() { document.getElementById('callHeader').style.display='none'; document.getElementById('callActionBtns').style.display='none'; document.getElementById('activeCallBtns').style.display='flex'; document.getElementById('activeCallTimer').style.display='block'; let sec = 0; clearInterval(callTimer); callTimer = setInterval(() => { sec++; let m = Math.floor(sec/60), s = sec%60; document.getElementById('activeCallTimer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }, 1000); }
    function endCall() { if(currentCallRefId) db.ref('calls/'+currentCallRefId).remove(); hideCallUI(); }
    function hideCallUI() { if(peerConnection) peerConnection.close(); document.getElementById('callUI').style.display='none'; document.getElementById('activeCallBtns').style.display='none'; document.getElementById('ringtone').pause(); clearInterval(callTimer); }
    function toggleMute() { isMuted = !isMuted; localStream.getAudioTracks()[0].enabled = !isMuted; document.getElementById('muteBtn').style.background = isMuted?'red':'#333'; }
    function toggleVideo() { isVideoOn = !isVideoOn; localStream.getVideoTracks()[0].enabled = isVideoOn; if(isVideoOn) { document.getElementById('peerImg').style.display='none'; document.getElementById('remoteVideo').style.display='block'; } else { document.getElementById('peerImg').style.display='block'; document.getElementById('remoteVideo').style.display='none'; } document.getElementById('videoBtn').style.background = isVideoOn?'green':'#333'; }
    function triggerRaid() { db.ref('alerts/raid').push({ time: Date.now(), byRank: personnelDB[currentUser].rank, byName: personnelDB[currentUser].name }); }
    function listenForRaidAlerts() { db.ref('alerts/raid').limitToLast(1).on('child_added', snap => { const d = snap.val(); if(d && (Date.now()-d.time < 15000)) { document.getElementById('raidAlertSender').innerText=`بأمر من: ${d.byRank} / ${d.byName}`; document.getElementById('raidAlertUI').style.display='flex'; document.getElementById('sirenSound').play(); } }); }
    function dismissRaidAlert() { document.getElementById('raidAlertUI').style.display = 'none'; document.getElementById('sirenSound').pause(); }
    function deleteMsg(g,k) { if(confirm("حذف؟")) db.ref('chats/'+g+'/'+k).remove(); }
    function clearChat() { let g=document.getElementById('targetGroupAdmin').value; if(confirm("مسح؟")) db.ref('chats/'+g).remove(); }
    function manageMember(a) { let raw=document.getElementById('targetUser').value.trim(); let t=raw.split('-')[0].trim(); if(!personnelDB[t]) return alert("خطأ"); let g=document.getElementById('targetGroupAdmin').value; let gc=g.includes("الأولى")?"g1":g.includes("الثانية")?"g2":g.includes("الثالثة")?"g3":"g4"; if(a==='add') db.ref('users_groups/'+t+'/'+gc).set(true); else db.ref('users_groups/'+t+'/'+gc).remove(); alert("تم"); }
    function uploadFile(e) { const f = e.target.files[0]; if(!f || f.size > 3*1024*1024) return alert("كبير"); const r = new FileReader(); r.onload = ev => { db.ref('chats/' + document.getElementById('currentGroupName').innerText).push({ id: currentUser, type: 'image', name: personnelDB[currentUser].name, rank: personnelDB[currentUser].rank, content: ev.target.result, time: Date.now() }); }; r.readAsDataURL(f); }
    function insertRaidTemplate() { document.getElementById('msgInput').value = "الموضوع : مداهمة\nالقضيه : ( )\nالتاريخ : ( )\nاليوم : ( )\n\nالتحرك : ( )\nالمنطقة : ( )\nبدأ المداهمة: ( )\nوالإنتهاء : ( )\nعدد الرجال : ( )\n\nالضباط :\n1- \n\nافراد المداهمة : \n1- \n\nجهات المشاركة :\n1- المهام الخاصة ( العمليات الخاصة )"; document.getElementById('msgInput').style.height = '120px'; }
</script>
