<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة العمليات الخاصة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #000; --panel: #15191c; --neon: #00ff41; --danger: #ff0000; --tactical: #968c83; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* واجهة المكالمة */
        #callUI { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        #remoteVideo { width: 100%; height: 100%; position: absolute; object-fit: cover; z-index: 10; background: #000; }
        .call-overlay { z-index: 20; position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); }
        .call-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--neon); margin-bottom: 20px; }
        .timer { font-size: 2.5rem; color: var(--neon); font-family: monospace; margin: 15px 0; }
        .btn-call { width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .accept { background: var(--neon); color: #000; }
        .reject { background: var(--danger); color: #fff; }
        .control { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid #fff; }

        /* الرادار والقائمة الجانبية */
        .radar-container { display: flex; height: 350px; margin-top: 15px; gap: 10px; }
        #radarMap { flex: 2; border-radius: 10px; border: 1px solid var(--tactical); filter: invert(100%) hue-rotate(180deg); }
        .units-list { flex: 1; background: var(--panel); border-radius: 10px; border: 1px solid #333; overflow-y: auto; padding: 10px; font-size: 11px; }
        .unit-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid #222; }
        .color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        /* الشات وتسجيل الدخول */
        #loginPage { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 15px; width: 85%; max-width: 380px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #0b0e11; border: 1px solid #444; color: #fff; border-radius: 5px; text-align: center; }
        .btn-main { width: 100%; padding: 12px; background: var(--tactical); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        #mainApp { display: none; height: 100vh; flex-direction: column; }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 100; }
        .nav-item { color: #555; font-size: 22px; cursor: pointer; }
        .nav-item.active { color: var(--neon); }
        .tab-content { padding: 15px; flex: 1; overflow-y: auto; padding-bottom: 80px; }
        
        .chat-box { height: calc(100vh - 280px); overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; border: 1px solid #333; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { background: #1c2126; padding: 8px; border-radius: 10px; margin-bottom: 8px; border-right: 3px solid var(--tactical); }
        .chat-controls { display: flex; gap: 8px; align-items: flex-end; }
        #msgInput { flex: 1; padding: 10px; background: #15191c; border: 1px solid #444; color: #fff; border-radius: 5px; resize: none; min-height: 40px; }

        #audioPermissionUI, #raidAlertUI { display: none; position: fixed; inset: 0; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; background: rgba(0,0,0,0.95); }
    </style>
</head>
<body>

<audio id="ringtone" src="https://www.soundjay.com/phone/sounds/phone-calling-1.mp3" loop></audio>
<audio id="sirenSound" src="https://www.soundjay.com/mechanical/sounds/alarm-clock-01.mp3" loop></audio>
<audio id="remoteAudio" autoplay></audio>

<div id="audioPermissionUI">
    <i class="fas fa-satellite-dish" style="font-size: 60px; color: var(--neon); margin-bottom: 20px;"></i>
    <h2>تأكيد الجاهزية</h2>
    <button class="btn-main" style="background: var(--neon);" onclick="enableAndStart()">دخول المنظومة</button>
</div>

<div id="raidAlertUI" style="background:rgba(255,0,0,0.9);">
    <i class="fas fa-exclamation-triangle" style="font-size: 80px; color: white;"></i>
    <h1>نداء مداهمة!</h1>
    <h3 id="raidAlertSender"></h3>
    <button class="btn-main" style="background:#000; color:#fff; width:150px;" onclick="dismissRaidAlert()">علم</button>
</div>

<div id="callUI">
    <video id="remoteVideo" autoplay playsinline></video>
    <div class="call-overlay">
        <div class="pulse"><i class="fas fa-phone-alt"></i></div>
        <h3 id="callStatusText" style="color: var(--neon);">جاري الاتصال...</h3>
        <img src="https://via.placeholder.com/150" id="peerImg" class="call-img">
        <h2 id="peerName">--</h2>
        <div id="activeCallTimer" class="timer" style="display: none;">00:00</div>
        <div class="call-btns" id="callActionBtns">
            <button id="acceptBtn" class="btn-call accept" onclick="handleAccept()"><i class="fas fa-phone"></i></button>
            <button class="btn-call reject" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
        </div>
        <div class="call-btns" id="activeCallBtns" style="display: none;">
            <button id="muteBtn" class="btn-call control" onclick="toggleMute()"><i class="fas fa-microphone"></i></button>
            <button class="btn-call reject" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
            <button id="videoBtn" class="btn-call control" onclick="toggleVideo()"><i class="fas fa-video"></i></button>
        </div>
    </div>
</div>

<div id="loginPage">
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/ar/thumb/f/f6/Sharjah_Police_Logo.svg/1200px-Sharjah_Police_Logo.svg.png" style="width:80px; margin-bottom:10px; background:white; border-radius:50%; padding:5px;">
        <h2>العمليات الخاصة</h2>
        <input type="text" id="milId" list="personnelList" placeholder="الرقم العسكري أو الاسم" autocomplete="off">
        <datalist id="personnelList"></datalist>
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn-main" onclick="login()">دخول</button>
    </div>
</div>

<div id="mainApp">
    <div style="padding: 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;">
        <div id="userDisplay" style="font-size: 12px; font-weight: bold;">--</div>
        <button onclick="logout()" style="background: none; border: 1px solid var(--danger); color: var(--danger); font-size: 9px; padding: 2px 8px;">خروج</button>
    </div>

    <div id="homeSec" class="tab-content">
        <div id="adminPanel" style="display:none; background: #1c2126; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
            <button class="btn-main" style="background: var(--danger); color: #fff;" onclick="triggerRaid()">إطلاق نداء مداهمة</button>
        </div>
        
        <div style="background: rgba(0, 255, 65, 0.05); padding: 10px; border-radius: 10px;">
            <h3 style="margin: 0; font-size: 0.8rem;"><i class="fas fa-crosshairs"></i> رادار المواقع والوحدات</h3>
        </div>

        <div class="radar-container">
            <div class="units-list" id="unitsList">
                <div style="color: #777; text-align: center;">جاري البحث عن الوحدات...</div>
            </div>
            <div id="radarMap"></div>
        </div>
    </div>

    <div id="chatSec" class="tab-content" style="display: none; padding: 10px;">
        <div id="chatBox" class="chat-box"></div>
        <div class="chat-controls">
            <textarea id="msgInput" placeholder="اكتب بلاغاً..."></textarea>
            <button class="btn-main" style="width: 60px; margin: 0;" onclick="sendMsg()">إرسال</button>
        </div>
    </div>

    <div id="callSec" class="tab-content" style="display: none;">
        <div style="background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #333;">
            <h3>اتصال لاسلكي مؤمن</h3>
            <input type="text" id="targetId" list="callList" placeholder="الرقم العسكري أو الاسم" style="width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; text-align: center;">
            <datalist id="callList"></datalist>
            <button class="btn-main" style="background: var(--neon);" onclick="startCall()">اطلب الآن</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item" onclick="switchTab('home', this)"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="switchTab('chat', this)"><i class="fas fa-comment-dots"></i></div>
        <div class="nav-item" onclick="switchTab('call', this)"><i class="fas fa-phone-volume"></i></div>
    </nav>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCWP-8J8GoZDl-0u22ArnZ1F4QdrY6_EbY",
        authDomain: "al-amaliat-system.firebaseapp.com",
        projectId: "al-amaliat-system",
        storageBucket: "al-amaliat-system.firebasestorage.app",
        messagingSenderId: "970481180924",
        appId: "1:970481180924:web:4966d13c0ec48b8a3db779"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const personnelDB = {
        "1321": { rank: "رائد", name: "مبارك محمد عبدالله" },
        "1408": { rank: "رائد", name: "محمد عبدالله المهيري" },
        "1549": { rank: "نقيب", name: "راشد احمد عبدالرحمن" },
        "1565": { rank: "نقيب", name: "طلال حسن شهيل" },
        "1587": { rank: "نقيب", name: "محمد علي الدرمكي" },
        "1739": { rank: "ملازم أول", name: "سالم راشد الخيال" },
        "1886": { rank: "ملازم", name: "صالح عبيد غريب" },
        "102606": { rank: "عريف أول", name: "سالم عبد الله الشامسي" },
        "105042": { rank: "شرطي أول", name: "أحمد حمدان الطنيجي" },
        "105869": { rank: "شرطي أول", name: "حسن علي الرئيسي" }
    };

    let currentUser = "", map, markers = {}, geoWatchId, localStream, peerConnection, currentCallRefId, callTimer;
    let isMuted = false, isVideoOn = false;
    const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

    // الألوان المخصصة للأعضاء
    const userColors = ["#00ff41", "#ff0000", "#007bff", "#ffeb3b", "#e91e63", "#9c27b0", "#00bcd4", "#ff9800", "#795548", "#607d8b"];

    window.onload = function() {
        const loginList = document.getElementById('personnelList'), callList = document.getElementById('callList');
        Object.keys(personnelDB).sort().forEach(id => {
            let t = id + " - " + personnelDB[id].name;
            loginList.appendChild(new Option(t, t)); callList.appendChild(new Option(t, t));
        });
        let saved = localStorage.getItem('session_user');
        if (saved && personnelDB[saved]) { currentUser = saved; document.getElementById('loginPage').style.display = 'none'; document.getElementById('audioPermissionUI').style.display = 'flex'; }
    };

    function login() {
        let raw = document.getElementById('milId').value.trim();
        let id = raw.includes('-') ? raw.split('-')[0].trim() : raw;
        if(personnelDB[id] && document.getElementById('pass').value.trim() === (localStorage.getItem(id+'_pass') || "SHJ@123")) {
            currentUser = id; localStorage.setItem('session_user', id);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('audioPermissionUI').style.display = 'flex';
        } else alert("خطأ!");
    }

    async function enableAndStart() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
            localStream.getTracks().forEach(t => t.enabled = false);
        } catch(e) { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
        
        if (navigator.geolocation) {
            geoWatchId = navigator.geolocation.watchPosition(pos => {
                db.ref('online_users/' + currentUser).set({ lat: pos.coords.latitude, lng: pos.coords.longitude, rank: personnelDB[currentUser].rank, name: personnelDB[currentUser].name, color: userColors[parseInt(currentUser)%10] });
                db.ref('online_users/' + currentUser).onDisconnect().remove();
            }, null, { enableHighAccuracy: true });
        }
        document.getElementById('audioPermissionUI').style.display = 'none';
        showMainApp();
    }

    function showMainApp() {
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('userDisplay').innerText = personnelDB[currentUser].rank + " / " + personnelDB[currentUser].name;
        if(["1321", "1408", "1549"].includes(currentUser)) document.getElementById('adminPanel').style.display = 'block';
        initRadar(); listenForCalls(); listenForRaidAlerts(); openChat('المجموعة المشتركة');
    }

    // --- الرادار والقائمة الجانبية ---
    function initRadar() {
        if(!map) { map = L.map('radarMap').setView([25.3462, 55.4209], 13); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); }
        db.ref('online_users').on('value', snap => {
            const data = snap.val() || {};
            const listDiv = document.getElementById('unitsList');
            listDiv.innerHTML = "<strong>القوات المتصلة:</strong><br><br>";

            for(let id in markers) { if(!data[id]) { map.removeLayer(markers[id]); delete markers[id]; } }

            for(let id in data) {
                const u = data[id];
                const color = u.color || "#00ff41";
                // تحديث القائمة الجانبية
                listDiv.innerHTML += `<div class="unit-item"><div class="color-dot" style="background:${color}"></div><span>${u.rank} / ${u.name}</span></div>`;

                // تحديث الخريطة بنقاط ملونة
                if(markers[id]) {
                    markers[id].setLatLng([u.lat, u.lng]);
                } else {
                    markers[id] = L.circleMarker([u.lat, u.lng], { radius: 7, fillColor: color, color: "#fff", weight: 2, fillOpacity: 1 }).addTo(map);
                }
            }
        });
    }

    // --- نظام الاتصال (إغلاق متبادل) ---
    async function startCall() {
        let raw = document.getElementById('targetId').value.trim(); let tid = raw.split('-')[0].trim();
        if(!personnelDB[tid] || tid === currentUser) return alert("خطأ");
        currentCallRefId = tid; setupCallUI(tid, 'calling');
        peerConnection = new RTCPeerConnection(servers);
        localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
        peerConnection.ontrack = e => { 
            if(e.track.kind==='audio') document.getElementById('remoteAudio').srcObject=e.streams[0];
            else { document.getElementById('remoteVideo').srcObject=e.streams[0]; document.getElementById('remoteVideo').style.display='block'; document.getElementById('peerImg').style.display='none'; }
        };
        peerConnection.onicecandidate = e => { if(e.candidate) db.ref(`calls/${tid}/callerCandidates`).push(e.candidate.toJSON()); };
        const offer = await peerConnection.createOffer(); await peerConnection.setLocalDescription(offer);
        db.ref('calls/'+tid).set({ offer:{type:offer.type, sdp:offer.sdp}, callerId:currentUser, status:'ringing' });
        db.ref(`calls/${tid}`).on('value', async s => {
            const d = s.val();
            if(!d) return hideCallUI();
            if(d.status==='accepted' && d.answer && !peerConnection.currentRemoteDescription) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer));
                startActiveCallUI();
            }
        });
        db.ref(`calls/${tid}/receiverCandidates`).on('child_added', s => { peerConnection.addIceCandidate(new RTCIceCandidate(s.val())); });
    }

    function listenForCalls() {
        db.ref('calls/'+currentUser).on('value', async s => {
            const d = s.val();
            if(d && d.status==='ringing') { currentCallRefId=currentUser; setupCallUI(d.callerId, 'incoming'); document.getElementById('ringtone').play(); } 
            else if(!d && currentCallRefId===currentUser) hideCallUI();
        });
    }

    async function handleAccept() {
        document.getElementById('ringtone').pause(); const snap = await db.ref('calls/'+currentUser).get(); const data = snap.val();
        peerConnection = new RTCPeerConnection(servers);
        localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
        peerConnection.ontrack = e => { 
            if(e.track.kind==='audio') document.getElementById('remoteAudio').srcObject=e.streams[0];
            else { document.getElementById('remoteVideo').srcObject=e.streams[0]; document.getElementById('remoteVideo').style.display='block'; document.getElementById('peerImg').style.display='none'; }
        };
        peerConnection.onicecandidate = e => { if(e.candidate) db.ref(`calls/${currentUser}/receiverCandidates`).push(e.candidate.toJSON()); };
        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer);
        await db.ref('calls/'+currentUser).update({ answer:{type:answer.type, sdp:answer.sdp}, status:'accepted' });
        startActiveCallUI();
    }

    function endCall() { if(currentCallRefId) db.ref('calls/'+currentCallRefId).remove(); hideCallUI(); }
    function hideCallUI() { if(peerConnection) peerConnection.close(); document.getElementById('callUI').style.display='none'; document.getElementById('activeCallBtns').style.display='none'; document.getElementById('remoteVideo').style.display='none'; document.getElementById('peerImg').style.display='block'; document.getElementById('ringtone').pause(); clearInterval(callTimer); currentCallRefId=""; }
    function toggleMute() { isMuted = !isMuted; localStream.getAudioTracks()[0].enabled = !isMuted; document.getElementById('muteBtn').style.background = isMuted?'red':'#333'; }
    function toggleVideo() { isVideoOn = !isVideoOn; localStream.getVideoTracks()[0].enabled = isVideoOn; document.getElementById('videoBtn').style.background = isVideoOn?'green':'#333'; }

    // --- وظائف الشات ---
    function sendMsg() {
        const val = document.getElementById('msgInput').value.trim(); if(!val) return;
        db.ref('chats/المجموعة المشتركة').push({ rank: personnelDB[currentUser].rank, name: personnelDB[currentUser].name, text: val, time: Date.now() });
        document.getElementById('msgInput').value = "";
    }
    function openChat(n) {
        db.ref('chats/'+n).on('value', snap => {
            const box = document.getElementById('chatBox'); box.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                box.innerHTML += `<div class="msg"><div style="font-size:10px; color:var(--neon);">${m.rank} / ${m.name}</div><div style="font-size:13px;">${m.text}</div></div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function switchTab(t, el) { document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none'); document.getElementById(t + 'Sec').style.display = 'block'; if(t==='home' && map) setTimeout(()=>map.invalidateSize(), 200); }
    function triggerRaid() { db.ref('alerts/raid').push({ by: personnelDB[currentUser].name, time: Date.now() }); }
    function listenForRaidAlerts() { db.ref('alerts/raid').limitToLast(1).on('child_added', snap => { if(Date.now()-snap.val().time < 15000) { document.getElementById('raidAlertSender').innerText=snap.val().by; document.getElementById('raidAlertUI').style.display='flex'; document.getElementById('sirenSound').play(); } }); }
    function dismissRaidAlert() { document.getElementById('raidAlertUI').style.display='none'; document.getElementById('sirenSound').pause(); }
    function setupCallUI(id, type) { document.getElementById('callUI').style.display='flex'; document.getElementById('peerName').innerText = personnelDB[id].name; document.getElementById('callActionBtns').style.display = type === 'incoming' ? 'flex' : 'none'; document.getElementById('callStatusText').innerText = type === 'incoming' ? 'اتصال وارد...' : 'جاري الاتصال...'; }
    function startActiveCallUI() { document.getElementById('callActionBtns').style.display='none'; document.getElementById('activeCallBtns').style.display='flex'; document.getElementById('activeCallTimer').style.display='block'; let sec = 0; clearInterval(callTimer); callTimer = setInterval(() => { sec++; let m=Math.floor(sec/60), s=sec%60; document.getElementById('activeCallTimer').innerText=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }, 1000); }
    function logout() { db.ref('online_users/'+currentUser).remove(); localStorage.removeItem('session_user'); location.reload(); }
</script>
</body>
</html>
