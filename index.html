<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة العمليات الخاصة</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --panel: #15191c; --neon: #00ff41; --danger: #ff0000; --tactical: #968c83; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* واجهة المكالمة */
        #callUI { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .call-img { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--neon); object-fit: cover; margin-bottom: 20px; box-shadow: 0 0 15px var(--neon); background: #111; }
        .call-info h2 { margin: 10px 0; font-size: 1.4rem; }
        .call-info p { margin: 2px 0; color: var(--tactical); }
        .timer { font-size: 2.8rem; color: var(--neon); font-family: monospace; margin: 25px 0; }
        
        #callHeader { display: flex; flex-direction: column; align-items: center; }
        .pulse { width: 70px; height: 70px; background: var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; color: #000; animation: pulse-anim 1.5s infinite; margin-bottom: 20px; }
        @keyframes pulse-anim { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); } 70% { box-shadow: 0 0 0 25px rgba(0, 255, 65, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); } }

        .call-btns { display: flex; gap: 25px; margin-top: 20px; align-items: center; justify-content: center; width: 100%; }
        .btn-call { width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; font-size: 25px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .accept { background: var(--neon); color: #000; }
        .reject { background: var(--danger); color: #fff; }
        .control { background: #333; color: #fff; }

        /* شاشات التنبيه */
        #raidAlertUI { display: none; position: fixed; inset: 0; background: rgba(255, 0, 0, 0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .alert-icon { font-size: 120px; color: white; animation: flash-alert 0.8s infinite; margin-bottom: 20px; }
        @keyframes flash-alert { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
        #audioPermissionUI { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 11000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }

        /* تسجيل الدخول والواجهة */
        #loginPage { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 15px; width: 85%; max-width: 380px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #0b0e11; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; text-align: center; }
        .btn-main { width: 100%; padding: 12px; background: var(--tactical); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        #mainApp { display: none; height: 100vh; flex-direction: column; }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 100; }
        .nav-item { color: #555; font-size: 22px; cursor: pointer; }
        .nav-item.active { color: var(--neon); }
        .tab-content { padding: 15px; flex: 1; overflow-y: auto; padding-bottom: 80px; }
        
        .chat-box { height: calc(100vh - 280px); overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; border: 1px solid #333; margin-bottom: 10px; }
        .msg { background: #1c2126; padding: 10px; border-radius: 10px; margin-bottom: 12px; display: flex; gap: 10px; border-right: 3px solid var(--tactical); align-items: flex-start; }
        .msg img.profile-pic { width: 35px; height: 35px; border-radius: 50%; }
        .admin-select { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; }
        .sys-msg { text-align: center; font-size: 11px; color: var(--neon); margin: 10px 0; background: rgba(0, 255, 65, 0.1); padding: 5px; border-radius: 5px; border: 1px solid rgba(0, 255, 65, 0.3); }
        
        /* تنسيق الشات والمرفقات */
        .chat-controls { display: flex; gap: 10px; align-items: flex-end; background: #0b0e11; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .chat-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 5px; transition: 0.2s; }
        .chat-btn:hover { color: var(--neon); }
        #msgInput { flex: 1; padding: 10px; background: #15191c; border: 1px solid #444; color: #fff; border-radius: 5px; margin: 0; resize: none; min-height: 40px; max-height: 150px; font-family: inherit; line-height: 1.5; }
    </style>
</head>

<audio id="ringtone" src="https://www.soundjay.com/phone/sounds/phone-calling-1.mp3" loop preload="auto"></audio>
<audio id="sirenSound" src="https://www.soundjay.com/mechanical/sounds/alarm-clock-01.mp3" loop preload="auto"></audio>
<audio id="remoteAudio" autoplay></audio>

<div id="audioPermissionUI">
    <i class="fas fa-shield-alt" style="font-size: 80px; color: var(--neon); margin-bottom: 20px;"></i>
    <h2 style="color: white;">تأكيد الجاهزية</h2>
    <p style="color: var(--tactical); margin-bottom: 30px;">يرجى تأكيد جاهزيتك لاستقبال النداءات الطارئة والاتصالات اللاسلكية.</p>
    <button class="btn-main" style="background: var(--neon); color: black; font-size: 1.2rem; padding: 15px;" onclick="enableAudioAndStart()">أؤكد جاهزيتي</button>
</div>

<div id="raidAlertUI">
    <i class="fas fa-exclamation-triangle alert-icon"></i>
    <h1 style="font-size: 3rem; color: white; margin: 0;">نداء مداهمة!</h1>
    <h3 id="raidAlertSender" style="color: white; margin-top: 10px;">بأمر من: --</h3>
    <p style="color: white; font-size: 1.2rem; margin-bottom: 40px;">الرجاء من جميع القوات الاستعداد فوراً</p>
    <button class="btn-main" style="background: #000; color: #fff; width: 250px; font-size: 1.2rem;" onclick="dismissRaidAlert()">علم (إيقاف الإنذار)</button>
</div>

<div id="callUI">
    <div id="callHeader">
        <div class="pulse"><i class="fas fa-phone-alt" id="statusIcon"></i></div>
        <h3 id="callStatusText" style="color: var(--neon); margin-bottom: 20px;">جاري الاتصال...</h3>
    </div>
    
    <img src="" id="peerImg" class="call-img">
    <video id="remoteVideo" autoplay playsinline class="call-img" style="display: none; background: #111;"></video>
    
    <div class="call-info">
        <h2 id="peerName">--</h2>
        <p id="peerRank">--</p>
        <p id="peerMilId">--</p>
    </div>

    <div id="activeCallTimer" class="timer" style="display: none;">00:00</div>

    <div class="call-btns" id="callActionBtns">
        <button id="acceptBtn" class="btn-call accept" onclick="handleAccept()"><i class="fas fa-phone"></i></button>
        <button class="btn-call reject" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
    </div>

    <div class="call-btns" id="activeCallBtns" style="display: none;">
        <button id="muteBtn" class="btn-call control" onclick="toggleMute()"><i class="fas fa-microphone"></i></button>
        <button class="btn-call reject" onclick="endCall()" style="width: 85px; height: 85px; font-size: 30px;"><i class="fas fa-phone-slash"></i></button>
        <button id="videoBtn" class="btn-call control" onclick="toggleVideo()"><i class="fas fa-video-slash"></i></button>
    </div>
</div>

<div id="loginPage">
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/ar/thumb/f/f6/Sharjah_Police_Logo.svg/1200px-Sharjah_Police_Logo.svg.png" style="width:100px; margin-bottom:10px; background:white; border-radius:50%; padding:5px;">
        <h2 style="color: #fff; margin-bottom: 20px;">العمليات الخاصة</h2>
        <input type="text" id="milId" list="personnelList" placeholder="الرقم العسكري أو الاسم" autocomplete="off">
        <datalist id="personnelList"></datalist>
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn-main" style="background: #968c83; color: #000; margin-top: 10px;" onclick="login()">دخول النظام</button>
    </div>
</div>

<div id="mainApp">
    <div style="padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between;">
        <div id="userDisplay" style="font-size: 13px; font-weight: bold;">--</div>
        <button onclick="logout()" style="background: none; border: 1px solid var(--danger); color: var(--danger); font-size: 10px; padding: 2px 8px; border-radius: 5px;">خروج</button>
    </div>

    <div id="homeSec" class="tab-content">
        <div id="adminPanel" style="display:none; background: #1c2126; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-right: 4px solid var(--neon);">
            <h4 style="margin:0 0 10px 0; color: var(--neon);"><i class="fas fa-shield-alt"></i> لوحة قيادة العمليات</h4>
            
            <input type="text" id="targetUser" list="adminPersonnelList" class="admin-select" placeholder="ابحث عن العسكري..." autocomplete="off">
            <datalist id="adminPersonnelList"></datalist>
            
            <select id="targetGroupAdmin" class="admin-select">
                <option value="المجموعة المشتركة">المجموعة المشتركة</option>
                <option value="المجموعة القتالية الأولى">القتالية الأولى</option>
                <option value="المجموعة القتالية الثانية">القتالية الثانية</option>
                <option value="المجموعة القتالية الثالثة">القتالية الثالثة</option>
                <option value="قلم القوة">قلم القوة</option>
            </select>
            
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button class="btn-main" style="flex: 1; font-size: 12px; padding: 10px;" onclick="manageMember('add')"><i class="fas fa-user-plus"></i> إضافة للمجموعة</button>
                <button class="btn-main" style="flex: 1; background: var(--danger); color: #fff; font-size: 12px; padding: 10px;" onclick="manageMember('remove')"><i class="fas fa-user-minus"></i> إزالة من المجموعة</button>
            </div>
            
            <button class="btn-main" style="background: var(--danger); color: #fff; margin-bottom: 10px; font-size: 14px;" onclick="triggerRaid()"><i class="fas fa-exclamation-triangle"></i> إطلاق نداء مداهمة (صوتي)</button>
            <button class="btn-main" style="background: transparent; border: 1px solid var(--danger); color: var(--danger); font-size: 14px;" onclick="clearChat()"><i class="fas fa-trash-alt"></i> مسح دردشة المجموعة المحددة</button>
        </div>

        <div style="text-align: center; margin-top: 40px; background: rgba(0, 255, 65, 0.05); padding: 30px; border-radius: 15px; border: 1px solid rgba(0, 255, 65, 0.2);">
            <h3 style="margin: 0; color: var(--tactical);">عدد الأشخاص المتصلين</h3>
            <div id="onlineCountDisplay" style="font-size: 4rem; color: var(--neon); font-weight: bold; margin-top: 10px;">0</div>
        </div>
    </div>

    <div id="callSec" class="tab-content" style="display: none;">
        <div style="background: var(--panel); padding: 20px; border-radius: 10px; border: 1px solid var(--tactical);">
            <h3>اتصال عسكري لايف</h3>
            <input type="text" id="targetId" list="callList" placeholder="الرقم العسكري أو اسم الزميل" style="width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; text-align: center;">
            <datalist id="callList"></datalist>
            <button class="btn-main" style="background: var(--neon);" onclick="startCall()">اطلب الآن</button>
        </div>
    </div>

    <div id="chatSec" class="tab-content" style="display: none; padding: 10px;">
        <div id="groupList">
            <button class="btn-main" style="margin-bottom: 10px;" onclick="openChat('المجموعة المشتركة')">المجموعة المشتركة</button>
            <button id="btn-g1" class="btn-main" style="display:none; margin-bottom: 10px;" onclick="openChat('المجموعة القتالية الأولى')">القتالية الأولى</button>
            <button id="btn-g2" class="btn-main" style="display:none; margin-bottom: 10px;" onclick="openChat('المجموعة القتالية الثانية')">القتالية الثانية</button>
            <button id="btn-g3" class="btn-main" style="display:none; margin-bottom: 10px;" onclick="openChat('المجموعة القتالية الثالثة')">القتالية الثالثة</button>
            <button id="btn-g4" class="btn-main" style="display:none; margin-bottom: 10px;" onclick="openChat('قلم القوة')">قلم القوة</button>
        </div>
        <div id="activeChat" style="display: none; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <strong id="currentGroupName">--</strong>
                <button onclick="backToGroups()" style="background:none; border: 1px solid #444; color: #fff; padding: 2px 10px; border-radius: 4px;">رجوع</button>
            </div>
            
            <div id="chatBox" class="chat-box"></div>
            
            <div class="chat-controls">
                <input type="file" id="chatFile" accept="image/*,.pdf,.doc,.docx" style="display:none;" onchange="uploadFile(event)">
                <button class="chat-btn" onclick="document.getElementById('chatFile').click()" title="إرفاق ملف/صورة"><i class="fas fa-paperclip"></i></button>
                <button class="chat-btn" onclick="insertRaidTemplate()" title="إدراج نموذج مداهمة"><i class="fas fa-file-alt"></i></button>
                <textarea id="msgInput" placeholder="أدخل البلاغ..."></textarea>
                <button class="chat-btn" style="color: var(--neon);" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="switchTab('call', this)"><i class="fas fa-phone-volume"></i></div>
        <div class="nav-item" onclick="switchTab('chat', this)"><i class="fas fa-comment-dots"></i></div>
    </nav>
</div>

    function login() {
        // تم حل مشكلة الدخول هنا (حتى لو كتب الرقم أو اختار من القائمة)
        let rawInput = document.getElementById('milId').value.trim();
        // تحويل أي أرقام عربية إلى إنجليزية
        rawInput = rawInput.replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d));
        
        let id = rawInput;
        // إذا كان الإدخال يحتوي على اسم (عن طريق الاختيار من القائمة)
        if(rawInput.includes('-')) {
            id = rawInput.split('-')[0].trim();
        } else {
            // إذا كتب الاسم فقط، نبحث عن الرقم
            for(let key in personnelDB) {
                if(personnelDB[key].name.includes(rawInput)) {
                    id = key;
                    break;
                }
            }
        }

        let pass = document.getElementById('pass').value.trim();
        let validPass = localStorage.getItem(id + '_pass') || "SHJ@123";

        if(personnelDB[id]) {
            if(pass === validPass) {
                currentUser = id; 
                localStorage.setItem('session_user', id); 
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('audioPermissionUI').style.display = 'flex';
            } else { alert("كلمة المرور غير صحيحة!"); }
        } else { alert("الرقم العسكري أو الاسم غير صحيح!"); }
    }

    function enableAudioAndStart() {
        let siren = document.getElementById('sirenSound');
        let ring = document.getElementById('ringtone');
        siren.play().then(() => { siren.pause(); siren.currentTime = 0; }).catch(e=>{});
        ring.play().then(() => { ring.pause(); ring.currentTime = 0; }).catch(e=>{});

        document.getElementById('audioPermissionUI').style.display = 'none';
        showMainApp();
    }

    function showMainApp() {
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('userDisplay').innerText = personnelDB[currentUser].rank + " / " + personnelDB[currentUser].name;
        
        if(officersList.includes(currentUser)) {
            document.getElementById('adminPanel').style.display = 'block';
        }
        
        setupPresence();
        checkGroups();
        listenForCalls();
        listenForRaidAlerts();
    }

    function setupPresence() {
        let connectedRef = db.ref(".info/connected");
        connectedRef.on("value", (snap) => {
            if (snap.val() === true && currentUser !== "") {
                let myOnlineRef = db.ref('online_users/' + currentUser);
                myOnlineRef.onDisconnect().remove();
                myOnlineRef.set(true);
            }
        });
        db.ref('online_users').on('value', snap => {
            document.getElementById('onlineCountDisplay').innerText = snap.numChildren();
        });
    }

    function notifyGroupsLogin() {
        if (sessionStorage.getItem('login_notified')) return;
        
        db.ref('users_groups/' + currentUser).once('value', snap => {
            const acc = snap.val() || {};
            const groupNames = { "g1": "المجموعة القتالية الأولى", "g2": "المجموعة القتالية الثانية", "g3": "المجموعة القتالية الثالثة", "g4": "قلم القوة" };
            const p = personnelDB[currentUser];
            
            Object.keys(acc).forEach(gCode => {
                if (acc[gCode] && groupNames[gCode]) {
                    db.ref('chats/' + groupNames[gCode]).push({
                        system: true,
                        text: `تم تسجيل دخول: ${p.rank} / ${p.name} - الرقم العسكري: ${currentUser}`,
                        time: Date.now()
                    });
                }
            });
            sessionStorage.setItem('login_notified', 'true');
        });
    }

    function manageMember(action) {
        let rawT = document.getElementById('targetUser').value.trim();
        let t = rawT.split('-')[0].trim();
        
        if(!personnelDB[t]) {
             // محاولة البحث بالاسم إذا لم يجد الرقم
            for(let key in personnelDB) {
                if(personnelDB[key].name.includes(rawT)) {
                    t = key;
                    break;
                }
            }
        }
        
        if(!personnelDB[t]) return alert("الرجاء اختيار عسكري صحيح من القائمة.");

        let g = document.getElementById('targetGroupAdmin').value;
        let gCode = g;
        if(g === "المجموعة القتالية الأولى") gCode = "g1";
        else if(g === "المجموعة القتالية الثانية") gCode = "g2";
        else if(g === "المجموعة القتالية الثالثة") gCode = "g3";
        else if(g === "قلم القوة") gCode = "g4";
        else if(g === "المجموعة المشتركة") return alert("المجموعة المشتركة أساسية للجميع ولا يمكن الإزالة منها.");

        if(action === 'add') {
            db.ref('users_groups/' + t + '/' + gCode).set(true).then(() => alert("تمت إضافة العسكري للمجموعة بنجاح."));
        } else {
            db.ref('users_groups/' + t + '/' + gCode).remove().then(() => alert("تمت إزالة العسكري من المجموعة بنجاح."));
        }
    }

    function checkGroups() {
        ['g1', 'g2', 'g3', 'g4'].forEach(g => {
            if(document.getElementById('btn-' + g)) document.getElementById('btn-' + g).style.display = 'none';
        });

        db.ref('users_groups/' + currentUser).on('value', snap => {
            const acc = snap.val();
            if(acc) {
                Object.keys(acc).forEach(g => {
                    if(acc[g] && document.getElementById('btn-' + g)) {
                        document.getElementById('btn-' + g).style.display = 'block';
                    }
                });
            }
            notifyGroupsLogin();
        });
    }

    function uploadFile(event) {
        const file = event.target.files[0];
        if(!file) return;
        
        if(file.size > 3 * 1024 * 1024) {
            return alert("حجم الملف أو الصورة كبير جداً! الحد الأقصى 3 ميجابايت.");
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64 = e.target.result;
            const isImage = file.type.startsWith('image/');
            
            db.ref('chats/' + document.getElementById('currentGroupName').innerText).push({
                id: currentUser,
                name: personnelDB[currentUser].name, 
                rank: personnelDB[currentUser].rank,
                type: isImage ? 'image' : 'file',
                fileName: file.name,
                content: base64,
                photo: localStorage.getItem(currentUser + '_photo') || "",
                time: Date.now()
            });
        };
        reader.readAsDataURL(file);
        event.target.value = '';
    }

    function openChat(n) {
        document.getElementById('groupList').style.display = 'none';
        document.getElementById('activeChat').style.display = 'flex';
        document.getElementById('currentGroupName').innerText = n;
        
        db.ref('chats/' + n).on('value', snap => {
            const box = document.getElementById('chatBox'); box.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                const key = c.key;
                
                if(m.system) {
                    box.innerHTML += `<div class="sys-msg">${m.text}</div>`;
                } else {
                    let delBtn = (m.id === currentUser) ? `<i class="fas fa-trash" style="color:var(--danger); cursor:pointer; margin-right:auto;" onclick="deleteMessage('${n}', '${key}')"></i>` : "";
                    
                    let contentHtml = "";
                    if(m.type === 'image') {
                        contentHtml = `<a href="${m.content}" target="_blank"><img src="${m.content}" style="max-width: 100%; max-height: 250px; border-radius: 5px; margin-top: 5px; border: 1px solid var(--tactical);"></a>`;
                    } else if (m.type === 'file') {
                        contentHtml = `<a href="${m.content}" download="${m.fileName}" style="color: var(--neon); text-decoration: none; display: flex; align-items: center; gap: 5px; margin-top: 5px; background: #222; padding: 10px; border-radius: 5px;"><i class="fas fa-file-download" style="font-size:20px;"></i> <span>تحميل المرفق:<br><small style="color:#aaa;">${m.fileName}</small></span></a>`;
                    } else {
                        contentHtml = `<div style="margin-top:5px; white-space: pre-wrap; font-size: 14px; line-height: 1.5; font-family: inherit;">${m.text}</div>`;
                    }

                    box.innerHTML += `
                        <div class="msg">
                            <img src="${m.photo || 'https://via.placeholder.com/150'}" class="profile-pic">
                            <div style="flex:1; overflow:hidden;">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <div style="color:var(--neon); font-size:11px; font-weight:bold;">${m.rank} / ${m.name}</div>
                                    ${delBtn}
                                </div>
                                ${contentHtml}
                            </div>
                        </div>`;
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msgInput'); 
        if(!inp.value.trim()) return;
        
        db.ref('chats/' + document.getElementById('currentGroupName').innerText).push({
            id: currentUser,
            type: 'text',
            name: personnelDB[currentUser].name, 
            rank: personnelDB[currentUser].rank,
            text: inp.value, 
            photo: localStorage.getItem(currentUser + '_photo') || "",
            time: Date.now()
        });
        inp.value = "";
        inp.style.height = '40px';
    }

    function deleteMessage(group, key) {
        if(confirm("هل أنت متأكد من مسح هذه الرسالة/المرفق؟")) {
            db.ref('chats/' + group + '/' + key).remove();
        }
    }

    function clearChat() { 
        let g = document.getElementById('targetGroupAdmin').value;
        if(confirm(`تحذير: مسح جميع رسائل (${g}) نهائياً من النظام؟`)) {
            db.ref('chats/' + g).remove(); 
        }
    }

    function backToGroups() { document.getElementById('groupList').style.display = 'block'; document.getElementById('activeChat').style.display = 'none'; }

    function triggerRaid() {
        if(confirm("تأكيد: إطلاق نداء مداهمة لجميع القوات؟")) {
            db.ref('alerts/raid').push({ time: Date.now(), byRank: personnelDB[currentUser].rank, byName: personnelDB[currentUser].name });
        }
    }

    function listenForRaidAlerts() {
        db.ref('alerts/raid').limitToLast(1).on('child_added', snap => {
            const data = snap.val();
            if(data && (Date.now() - data.time < 15000)) {
                document.getElementById('raidAlertSender').innerText = `بأمر من: ${data.byRank} / ${data.byName}`;
                document.getElementById('raidAlertUI').style.display = 'flex';
                let siren = document.getElementById('sirenSound');
                siren.currentTime = 0; siren.play().catch(e => console.log(e));
            }
        });
    }

    function dismissRaidAlert() {
        document.getElementById('raidAlertUI').style.display = 'none';
        let siren = document.getElementById('sirenSound'); siren.pause(); siren.currentTime = 0;
    }

    async function getMediaStream() {
        try { let stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true }); stream.getVideoTracks().forEach(t => t.enabled = false); return stream; } catch(e) { return await navigator.mediaDevices.getUserMedia({ audio: true }); }
    }

    function toggleMute() {
        if(localStream && localStream.getAudioTracks().length > 0) {
            isMuted = !isMuted; localStream.getAudioTracks()[0].enabled = !isMuted;
            let btn = document.getElementById('muteBtn');
            btn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
            btn.style.background = isMuted ? 'var(--danger)' : '#333';
        }
    }

    function toggleVideo() {
        if(localStream && localStream.getVideoTracks().length > 0) {
            isVideoOn = !isVideoOn; localStream.getVideoTracks()[0].enabled = isVideoOn;
            let btn = document.getElementById('videoBtn');
            btn.innerHTML = isVideoOn ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>';
            btn.style.background = isVideoOn ? 'var(--neon)' : '#333'; btn.style.color = isVideoOn ? '#000' : '#fff';
            if(currentCallRefId) { let field = (currentUser === currentCallRefId) ? 'receiverVideo' : 'callerVideo'; db.ref('calls/' + currentCallRefId + '/' + field).set(isVideoOn); }
        } else { alert("الكاميرا غير متوفرة"); }
    }

    async function startCall() {
        let rawInput = document.getElementById('targetId').value.trim(); let tid = rawInput.split('-')[0].trim();
        
        if(!personnelDB[tid]) {
             for(let key in personnelDB) {
                if(personnelDB[key].name.includes(rawInput)) {
                    tid = key; break;
                }
            }
        }
        
        if(!personnelDB[tid] || tid === currentUser) return alert("الرقم خطأ أو غير صالح");
        currentCallRefId = tid; setupCallUI(tid, 'calling');
        localStream = await getMediaStream(); peerConnection = new RTCPeerConnection(servers);
        peerConnection.ontrack = e => {
            if(e.track.kind === 'audio') document.getElementById('remoteAudio').srcObject = e.streams[0];
            if(e.track.kind === 'video') document.getElementById('remoteVideo').srcObject = e.streams[0];
        };
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        peerConnection.onicecandidate = e => { if(e.candidate) db.ref(`calls/${tid}/callerCandidates`).push(e.candidate.toJSON()); };
        const offer = await peerConnection.createOffer(); await peerConnection.setLocalDescription(offer);
        db.ref('calls/' + tid).set({ offer: { type: offer.type, sdp: offer.sdp }, callerId: currentUser, status: 'ringing', callerVideo: false, receiverVideo: false });
        db.ref(`calls/${tid}`).on('value', async snap => {
            const data = snap.val();
            if(data && data.status === 'accepted') {
                if(data.answer && !peerConnection.currentRemoteDescription) { await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer)); startActiveCallUI(); }
                if(data.receiverVideo) { document.getElementById('peerImg').style.display = 'none'; document.getElementById('remoteVideo').style.display = 'block'; } 
                else { document.getElementById('peerImg').style.display = 'block'; document.getElementById('remoteVideo').style.display = 'none'; }
            }
        });
        db.ref(`calls/${tid}/receiverCandidates`).on('child_added', snap => { peerConnection.addIceCandidate(new RTCIceCandidate(snap.val())); });
    }

    function listenForCalls() {
        db.ref('calls/' + currentUser).on('value', async snap => {
            const data = snap.val();
            if(data && data.status === 'ringing') {
                currentCallRefId = currentUser; setupCallUI(data.callerId, 'incoming'); document.getElementById('ringtone').play().catch(e=>console.log(e));
            } else if (data && data.status === 'accepted') {
                if(data.callerVideo) { document.getElementById('peerImg').style.display = 'none'; document.getElementById('remoteVideo').style.display = 'block'; } 
                else { document.getElementById('peerImg').style.display = 'block'; document.getElementById('remoteVideo').style.display = 'none'; }
            } else if (!data) { hideCallUI(); }
        });
    }

    async function handleAccept() {
        document.getElementById('ringtone').pause();
        const snap = await db.ref('calls/' + currentUser).get(); const data = snap.val();
        localStream = await getMediaStream(); peerConnection = new RTCPeerConnection(servers);
        peerConnection.ontrack = e => {
            if(e.track.kind === 'audio') document.getElementById('remoteAudio').srcObject = e.streams[0];
            if(e.track.kind === 'video') document.getElementById('remoteVideo').srcObject = e.streams[0];
        };
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        peerConnection.onicecandidate = e => { if(e.candidate) db.ref(`calls/${currentUser}/receiverCandidates`).push(e.candidate.toJSON()); };
        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer);
        await db.ref('calls/' + currentUser).update({ answer: { type: answer.type, sdp: answer.sdp }, status: 'accepted' });
        db.ref(`calls/${currentUser}/callerCandidates`).on('child_added', snap => { peerConnection.addIceCandidate(new RTCIceCandidate(snap.val())); });
        startActiveCallUI();
    }

    function setupCallUI(id, type) {
        document.getElementById('callUI').style.display = 'flex';
        document.getElementById('peerImg').src = localStorage.getItem(id + '_photo') || "https://via.placeholder.com/150";
        document.getElementById('peerName').innerText = personnelDB[id].name;
        document.getElementById('peerRank').innerText = personnelDB[id].rank;
        document.getElementById('peerMilId').innerText = "الرقم العسكري: " + id;
        if(type === 'incoming') { document.getElementById('callActionBtns').style.display = 'flex'; document.getElementById('acceptBtn').style.display = 'flex'; document.getElementById('callStatusText').innerText = "بلاغ اتصال وارد..."; } 
        else { document.getElementById('callActionBtns').style.display = 'flex'; document.getElementById('acceptBtn').style.display = 'none'; document.getElementById('callStatusText').innerText = "جاري تأمين الخط..."; }
    }

    function startActiveCallUI() {
        document.getElementById('callHeader').style.display = 'none'; document.getElementById('callActionBtns').style.display = 'none'; document.getElementById('activeCallBtns').style.display = 'flex'; document.getElementById('activeCallTimer').style.display = 'block';
        let sec = 0; clearInterval(callTimer);
        callTimer = setInterval(() => { sec++; let m = Math.floor(sec/60), s = sec%60; document.getElementById('activeCallTimer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }, 1000);
    }

    function endCall() { if(currentCallRefId) db.ref('calls/' + currentCallRefId).remove(); hideCallUI(); }

    function hideCallUI() {
        if(localStream) localStream.getTracks().forEach(t => t.stop()); if(peerConnection) peerConnection.close(); currentCallRefId = "";
        isMuted = false; isVideoOn = false;
        document.getElementById('muteBtn').innerHTML = '<i class="fas fa-microphone"></i>'; document.getElementById('muteBtn').style.background = '#333';
        document.getElementById('videoBtn').innerHTML = '<i class="fas fa-video-slash"></i>'; document.getElementById('videoBtn').style.background = '#333'; document.getElementById('videoBtn').style.color = '#fff';
        document.getElementById('callUI').style.display = 'none'; document.getElementById('callHeader').style.display = 'flex'; document.getElementById('activeCallTimer').style.display = 'none'; document.getElementById('activeCallBtns').style.display = 'none'; document.getElementById('peerImg').style.display = 'block'; document.getElementById('remoteVideo').style.display = 'none';
        document.getElementById('ringtone').pause(); clearInterval(callTimer);
    }

    function switchTab(t, el) { document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none'); document.getElementById(t + 'Sec').style.display = 'block'; document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
    
    function logout() { 
        db.ref('online_users/' + currentUser).remove(); 
        sessionStorage.removeItem('login_notified');
        localStorage.removeItem('session_user'); 
        location.reload(); 
    }
