<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>منظومة العمليات الخاصة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(20, 24, 28, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --primary: #00ff41;
            --primary-glow: rgba(0, 255, 65, 0.2);
            --danger: #ff3333;
            --danger-glow: rgba(255, 51, 51, 0.2);
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --glass-blur: blur(12px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1a2220 0%, var(--bg-color) 70%);
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Forms & Inputs */
        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--panel-border);
            color: white;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: #000; box-shadow: 0 4px 15px var(--primary-glow); }
        .btn-danger { background: var(--danger); color: #fff; box-shadow: 0 4px 15px var(--danger-glow); }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }

        /* Login Page */
        #loginPage {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-color);
            padding: 20px;
        }
        .login-box { width: 100%; max-width: 400px; padding: 30px 20px; text-align: center; }
        .logo-img { width: 90px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        
        /* Main App Header */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--panel-border);
            z-index: 100;
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 35px; height: 35px; background: var(--primary); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        /* Main Content Area */
        #mainApp { display: none; height: 100vh; flex-direction: column; }
        .tab-content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Home Tab */
        .stats-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-bottom: 15px; }
        .radar-container { height: 40vh; min-height: 250px; border-radius: 16px; overflow: hidden; border: 1px solid var(--panel-border); margin-bottom: 20px; position: relative;}
        #radarMap { width: 100%; height: 100%; z-index: 1; background: #000; }
        /* Custom map styling to hide borders and controls */
        .leaflet-control-zoom { display: none; }

        /* Requests List */
        .section-title { font-size: 14px; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .req-card { padding: 15px; margin-bottom: 12px; border-left: 3px solid transparent; }
        .req-pending { border-left-color: #ffeb3b; }
        .req-accepted { border-left-color: var(--primary); }
        .req-rejected { border-left-color: var(--danger); }
        .req-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .req-time { font-size: 11px; color: var(--text-muted); }
        .req-badge { font-size: 11px; padding: 4px 8px; border-radius: 20px; font-weight: bold; }
        .badge-pending { background: rgba(255, 235, 59, 0.1); color: #ffeb3b; }
        .badge-accepted { background: var(--primary-glow); color: var(--primary); }
        .badge-rejected { background: var(--danger-glow); color: var(--danger); }

        /* Chat Tab */
        .chat-groups { display: flex; flex-direction: column; gap: 10px; }
        .group-btn { padding: 20px; font-size: 16px; justify-content: flex-start; }
        .group-btn i { font-size: 20px; width: 30px; text-align: center; }
        
        #activeChat { display: none; height: 100%; flex-direction: column; }
        .chat-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--panel-border); }
        .back-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        
        .chat-messages { flex: 1; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .msg-bubble { max-width: 85%; padding: 12px 15px; border-radius: 16px; position: relative; word-wrap: break-word; font-size: 14px;}
        .msg-mine { background: rgba(0, 255, 65, 0.15); border: 1px solid rgba(0, 255, 65, 0.3); align-self: flex-start; border-top-right-radius: 4px; }
        .msg-other { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--panel-border); align-self: flex-end; border-top-left-radius: 4px; }
        .msg-sender { font-size: 11px; font-weight: bold; margin-bottom: 4px; opacity: 0.8; }
        .msg-mine .msg-sender { color: var(--primary); }
        .msg-time { font-size: 10px; opacity: 0.5; margin-top: 5px; text-align: right; }
        .msg-attachment { display: inline-flex; align-items: center; gap: 8px; margin-top: 8px; padding: 8px 12px; background: rgba(0,0,0,0.3); border-radius: 8px; color: #4fc3f7; text-decoration: none; font-size: 12px; border: 1px solid rgba(79, 195, 247, 0.3); }

        .chat-input-area { display: flex; gap: 10px; align-items: center; }
        .chat-input-area textarea { margin-bottom: 0; flex: 1; height: 50px; resize: none; padding-top: 15px; }
        .send-btn { width: 50px; height: 50px; border-radius: 50%; padding: 0; }

        /* Request Tab */
        .file-upload-wrapper { position: relative; margin-bottom: 15px; }
        .file-upload-input { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .file-upload-display { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; border: 2px dashed var(--panel-border); border-radius: 10px; color: var(--text-muted); transition: all 0.3s; }
        .file-upload-wrapper:hover .file-upload-display { border-color: var(--primary); background: rgba(0,255,65,0.05); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--panel-border);
            display: flex; justify-content: space-around;
            padding: 10px 0 25px 0; /* extra padding for iPhone indicator */
            z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            color: var(--text-muted); cursor: pointer; padding: 10px;
            transition: all 0.3s ease; flex: 1;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; transition: transform 0.3s; }
        .nav-item.active i { transform: translateY(-3px); }
        .nav-item span { font-size: 11px; font-weight: 600; }

        /* Toasts */
        #toastContainer { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px; pointer-events: none; }
        .toast { background: var(--panel-bg); backdrop-filter: blur(10px); border: 1px solid var(--panel-border); color: white; padding: 15px 20px; border-radius: 10px; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: toastIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); pointer-events: auto; }
        .toast.success { border-bottom: 3px solid var(--primary); }
        .toast.error { border-bottom: 3px solid var(--danger); }
        .toast.info { border-bottom: 3px solid #2196f3; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }

        /* Loaders */
        .loader { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .admin-actions { display: flex; gap: 10px; margin-top: 10px; }
        .admin-actions .btn { padding: 8px; font-size: 12px; }
        
        .req-details-text { margin-top: 8px; font-size: 13px; line-height: 1.5; color: #ddd;}
        .req-reason-text { margin-top: 8px; font-size: 12px; color: var(--danger); background: rgba(255,0,0,0.1); padding: 8px; border-radius: 6px;}

    </style>
</head>
<body>

<div id="toastContainer"></div>

<!-- Login Screen -->
<div id="loginPage">
    <div class="login-box glass-panel">
        <img src="https://upload.wikimedia.org/wikipedia/ar/thumb/f/f6/Sharjah_Police_Logo.svg/1200px-Sharjah_Police_Logo.svg.png" class="logo-img" alt="Logo">
        <h2 style="margin-bottom: 5px; font-weight: 700;">منظومة العمليات الخاصة</h2>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px;">تسجيل الدخول للأفراد والضباط</p>
        
        <input type="number" id="milId" placeholder="الرقم العسكري" autocomplete="off">
        <input type="password" id="pass" placeholder="كلمة المرور">
        
        <button class="btn btn-primary" onclick="login()" id="loginBtn">
            <span>تسجيل الدخول</span>
        </button>
    </div>
</div>

<!-- Main App -->
<div id="mainApp">
    <header class="app-header">
        <div class="user-info">
            <div class="user-avatar"><i class="fas fa-user-shield"></i></div>
            <div>
                <div id="userNameDisplay" style="font-size: 14px; font-weight: bold;">--</div>
                <div id="userRankDisplay" style="font-size: 11px; color: var(--primary);">--</div>
            </div>
        </div>
        <button onclick="logout()" style="background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 5px;"><i class="fas fa-sign-out-alt"></i></button>
    </header>

    <!-- Home Tab -->
    <div id="homeSec" class="tab-content active">
        <div class="stats-card glass-panel">
            <div style="display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-satellite-dish" style="color: var(--primary); animation: pulse 2s infinite;"></i>
                <span style="font-weight: 600; font-size: 14px;">تتبع القوات المباشر</span>
            </div>
            <div style="background: rgba(0,255,65,0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(0,255,65,0.3);">
                <i class="fas fa-users" style="font-size: 10px; margin-left: 4px;"></i>
                <span id="onlineCountDisplay" style="color:var(--primary); font-weight:bold; font-size: 14px;">0</span>
            </div>
        </div>

        <div class="radar-container">
            <div id="radarMap"></div>
        </div>

        <div class="section-title"><i class="fas fa-clipboard-list"></i> حالة طلباتي الإدارية</div>
        <div id="myReqList">
            <!-- Requests will be populated here -->
            <div style="text-align: center; color: var(--text-muted); font-size: 12px; padding: 20px;">جارِ تحميل الطلبات...</div>
        </div>
    </div>

    <!-- Chat Tab -->
    <div id="chatSec" class="tab-content">
        <div id="groupList" class="chat-groups">
            <button class="btn glass-panel group-btn" onclick="openChat('المجموعة المشتركة', 'fas fa-users')">
                <i class="fas fa-users" style="color: #4fc3f7;"></i>
                <span>المجموعة المشتركة</span>
            </button>
            <button id="btn-gSecret" class="btn glass-panel group-btn" style="display:none; border-left: 3px solid #ffca28;" onclick="openChat('رئيس القسم', 'fas fa-user-secret')">
                <i class="fas fa-user-secret" style="color: #ffca28;"></i>
                <span>مكتب رئيس القسم</span>
                <i class="fas fa-lock" style="margin-right: auto; font-size: 12px; color: var(--text-muted);"></i>
            </button>
        </div>

        <div id="activeChat">
            <div class="chat-header">
                <button class="back-btn" onclick="backToGroups()"><i class="fas fa-chevron-right"></i></button>
                <div>
                    <div id="chatTitle" style="font-weight: bold; font-size: 16px;">--</div>
                    <div style="font-size: 11px; color: var(--primary);">متصل - آمن</div>
                </div>
            </div>
            
            <div id="chatBox" class="chat-messages">
                <!-- Messages go here -->
            </div>
            
            <div class="chat-input-area">
                <textarea id="msgInput" placeholder="اكتب رسالتك هنا..."></textarea>
                <button class="btn btn-primary send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Request Tab -->
    <div id="reqSec" class="tab-content">
        <div class="glass-panel" style="padding: 20px;">
            <h3 style="margin-bottom: 20px; font-size: 16px; border-bottom: 1px solid var(--panel-border); padding-bottom: 10px;">تقديم طلب إداري جديد</h3>
            
            <label style="font-size: 12px; color: var(--text-muted); margin-bottom: 5px; display: block;">نوع الطلب</label>
            <select id="reqType">
                <option value="طلب إجازة سنوية">طلب إجازة سنوية</option>
                <option value="طلب إجازة دورية">طلب إجازة دورية</option>
                <option value="طلب ظرف طارئ">طلب ظرف طارئ</option>
                <option value="بلاغ نقص عتاد">بلاغ نقص عتاد أو صيانة</option>
                <option value="أخرى">أخرى</option>
            </select>
            
            <label style="font-size: 12px; color: var(--text-muted); margin-bottom: 5px; display: block;">تفاصيل الطلب</label>
            <textarea id="reqDetails" placeholder="يرجى كتابة كافة التفاصيل المتعلقة بالطلب..." style="height: 120px;"></textarea>
            
            <label style="font-size: 12px; color: var(--text-muted); margin-bottom: 5px; display: block;">المرفقات (اختياري)</label>
            <div class="file-upload-wrapper">
                <input type="file" id="reqFile" class="file-upload-input" accept="image/*,.pdf" onchange="updateFileName(this)">
                <div class="file-upload-display" id="fileDisplay">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 30px; margin-bottom: 10px;"></i>
                    <span id="fileNameText">اضغط هنا لإرفاق صورة أو ملف PDF</span>
                </div>
            </div>
            
            <button class="btn btn-primary" id="submitReqBtn" onclick="submitRequest()" style="margin-top: 20px;">
                <i class="fas fa-paper-plane"></i> إرسال الطلب
            </button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home', this)">
            <i class="fas fa-radar"></i>
            <span>الرئيسية</span>
        </div>
        <div class="nav-item" onclick="switchTab('chat', this)">
            <i class="fas fa-comment-dots"></i>
            <span>المراسلات</span>
        </div>
        <div class="nav-item" onclick="switchTab('req', this)">
            <i class="fas fa-file-signature"></i>
            <span>الطلبات</span>
        </div>
    </nav>
</div>

        "102955": { rank: "عريف أول", name: "محمد عبدالله صقر" }, "103034": { rank: "عريف أول", name: "سعود ايوب المازمي" },

        "103590": { rank: "عريف", name: "غريب سالم المازمي" }, "103599": { rank: "عريف", name: "خالد حسن النقبي" },
        "103604": { rank: "عريف", name: "عبيد محمد طارش الكعبي" }, "103615": { rank: "عريف", name: "عادل ابراهيم ال علي" },
        "103634": { rank: "عريف", name: "محمد عبدالله الظهوري" }, "103635": { rank: "عريف", name: "محمد عبدالله الهوتي" },
        "103636": { rank: "عريف", name: "سهيل سالم الكتبي" }, "103644": { rank: "عريف", name: "حميد سميح البلوشي" },
        "103774": { rank: "عريف", name: "محمد احمد سليمان" }, "103777": { rank: "عريف", name: "سالم احمد الحمادي" },
        "103778": { rank: "عريف", name: "محمد يونس المازمي" }, "103779": { rank: "عريف", name: "سالم عبدالله المهيري" },
        "103787": { rank: "عريف", name: "سالم ثاني الجلاف" }, "104317": { rank: "شرطي أول", name: "محمد طلعان البلوشي" },
        "104334": { rank: "شرطي أول", name: "محمد جاسم البلوشي" }, "104372": { rank: "شرطي أول", name: "ناصر عبدالله البلوشي" },
        "104803": { rank: "شرطي أول", name: "راشد ناصر النبهاني" }, "104528": { rank: "شرطي أول", name: "خالد راشد الكتبي" },
        "105042": { rank: "شرطي أول", name: "أحمد حمدان الطنيجي" }, "105061": { rank: "شرطي أول", name: "عبدالله علي القايدي" },
        "105364": { rank: "شرطي أول", name: "فهد سعيد الشحي" }, "105869": { rank: "شرطي أول", name: "حسن علي الرئيسي" }
    };

    let currentUser = "";
    let map = null;
    let markers = {};
    let currentChatRef = null;
    let watchId = null;

    // --- Utility Functions ---
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        
        let icon = 'fa-info-circle';
        if(type === 'success') icon = 'fa-check-circle';
        if(type === 'error') icon = 'fa-exclamation-circle';
        
        toast.innerHTML = `<i class="fas ${icon} fa-lg"></i><span>${message}</span>`;
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.style.animation = 'toastOut 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    function formatDate(ts) {
        const d = new Date(ts);
        const today = new Date();
        const isToday = d.getDate() === today.getDate() && d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
        
        const timeOpts = { hour: '2-digit', minute: '2-digit' };
        if (isToday) return `اليوم، ${d.toLocaleTimeString('ar-AE', timeOpts)}`;
        return `${d.toLocaleDateString('ar-AE')} ${d.toLocaleTimeString('ar-AE', timeOpts)}`;
    }

    // --- Auto Login Check ---
    window.onload = () => {
        const savedUser = localStorage.getItem('session_user');
        if(savedUser && personnelDB[savedUser]) {
            currentUser = savedUser;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            showMainApp();
        }
    };

    // --- Core App Logic ---
    function login() {
        const id = document.getElementById('milId').value.trim();
        const pass = document.getElementById('pass').value.trim();
        const btn = document.getElementById('loginBtn');
        
        if(!id || !pass) return showToast("الرجاء إدخال كافة البيانات", "error");
        
        btn.innerHTML = '<span class="loader"></span>';
        btn.disabled = true;

        setTimeout(() => {
            if(personnelDB[id] && pass === "SHJ@123") {
                currentUser = id; 
                localStorage.setItem('session_user', id);
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
                showMainApp();
                showToast(`مرحباً ${personnelDB[id].rank} / ${personnelDB[id].name}`, "success");
            } else {
                showToast("الرقم العسكري أو كلمة المرور خاطئة", "error");
            }
            btn.innerHTML = '<span>تسجيل الدخول</span>';
            btn.disabled = false;
        }, 800);
    }

    function showMainApp() {
        const user = personnelDB[currentUser];
        document.getElementById('userNameDisplay').textContent = user.name;
        document.getElementById('userRankDisplay').textContent = user.rank;
        
        initRadar(); 
        checkGroups(); 
        listenForMyRequests();
    }

    function logout() {
        if(watchId) navigator.geolocation.clearWatch(watchId);
        if(currentUser) db.ref('online_users/' + currentUser).remove();
        localStorage.removeItem('session_user');
        location.reload();
    }

    // --- UI Navigation ---
    function switchTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(tabId + 'Sec').classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        
        if(tabId === 'home' && map) setTimeout(() => map.invalidateSize(), 300);
    }

    function updateFileName(input) {
        const text = document.getElementById('fileNameText');
        if(input.files.length > 0) {
            text.innerHTML = `<span style="color:var(--primary)">${input.files[0].name}</span>`;
        } else {
            text.textContent = "اضغط هنا لإرفاق صورة أو ملف PDF";
        }
    }

    // --- Radar & Geolocation ---
    function initRadar() {
        if(!map) { 
            map = L.map('radarMap', { zoomControl: false, attributionControl: false }).setView([25.3462, 55.4209], 12); 
            // Dark map theme
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
        }

        if (navigator.geolocation) {
            watchId = navigator.geolocation.watchPosition(pos => {
                db.ref('online_users/' + currentUser).set({ 
                    lat: pos.coords.latitude, 
                    lng: pos.coords.longitude, 
                    name: personnelDB[currentUser].name, 
                    rank: personnelDB[currentUser].rank,
                    time: Date.now() 
                });
                db.ref('online_users/' + currentUser).onDisconnect().remove();
            }, err => {
                console.error(err);
                if(err.code === 1) showToast("تم رفض صلاحية الموقع. الرادار لن يعمل.", "error");
            }, { enableHighAccuracy: true, maximumAge: 10000 });
        }

        db.ref('online_users').on('value', snap => {
            const data = snap.val() || {};
            document.getElementById('onlineCountDisplay').innerText = Object.keys(data).length;
            
            // Remove old markers
            for(let id in markers) { 
                if(!data[id]) { map.removeLayer(markers[id]); delete markers[id]; } 
            }
            
            // Add/Update markers
            for(let id in data) {
                const u = data[id];
                if(markers[id]) {
                    markers[id].setLatLng([u.lat, u.lng]);
                } else {
                    const isMe = id === currentUser;
                    const color = isMe ? '#4fc3f7' : '#00ff41'; // Cyan for me, green for others
                    markers[id] = L.circleMarker([u.lat, u.lng], { 
                        radius: isMe ? 8 : 6, 
                        fillColor: color, 
                        color: "#000", 
                        weight: 2, 
                        fillOpacity: 0.9 
                    }).addTo(map)
                    .bindTooltip(`<b>${u.rank} / ${u.name}</b>`, {permanent: false, direction: 'top', className: 'glass-panel'});
                }
            }
        });
    }

    // --- Groups & Permissions ---
    function checkGroups() {
        const admins = ["1321", "1408", "1549"]; // Hardcoded admins
        db.ref('users_groups/' + currentUser).on('value', snap => {
            const acc = snap.val() || {};
            if(acc['رئيس القسم'] || admins.includes(currentUser)) {
                document.getElementById('btn-gSecret').style.display = 'flex';
            }
        });
    }

    // --- Requests System ---
    async function submitRequest() {
        const type = document.getElementById('reqType').value;
        const details = document.getElementById('reqDetails').value.trim();
        const fileInp = document.getElementById('reqFile');
        const btn = document.getElementById('submitReqBtn');
        
        if(!details) return showToast("يرجى كتابة تفاصيل الطلب", "error");

        btn.innerHTML = '<span class="loader"></span> جاري الإرسال...';
        btn.disabled = true;

        try {
            let fileUrl = null;
            let fileName = null;

            // Upload file to Firebase Storage if exists
            if(fileInp.files.length > 0) {
                const file = fileInp.files[0];
                fileName = file.name;
                const storageRef = storage.ref(`requests_attachments/${Date.now()}_${fileName}`);
                const snapshot = await storageRef.put(file);
                fileUrl = await snapshot.ref.getDownloadURL();
            }

            const reqRef = db.ref('all_requests').push();
            const reqId = reqRef.key;
            const reqObj = {
                id: reqId,
                senderId: currentUser,
                senderName: personnelDB[currentUser].name,
                senderRank: personnelDB[currentUser].rank,
                type: type,
                details: details,
                fileUrl: fileUrl,
                fileName: fileName,
                status: 'pending',
                time: Date.now()
            };

            // Save to DB
            await reqRef.set(reqObj);

            // Send notification to admin chat
            await db.ref('chats/رئيس القسم').push({
                isRequest: true,
                reqId: reqId,
                senderId: currentUser,
                text: `📥 طلب جديد: ${type}\nالتفاصيل: ${details}`,
                fileUrl: fileUrl,
                fileName: fileName,
                status: 'pending',
                time: Date.now()
            });

            showToast("تم إرسال الطلب بنجاح", "success");
            document.getElementById('reqDetails').value = "";
            fileInp.value = "";
            updateFileName(fileInp);
            
            // Switch to home to see status
            switchTab('home', document.querySelectorAll('.nav-item')[0]);

        } catch (error) {
            console.error("Upload error:", error);
            showToast("حدث خطأ أثناء إرسال الطلب", "error");
        } finally {
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال الطلب';
            btn.disabled = false;
        }
    }

    function listenForMyRequests() {
        db.ref('all_requests').orderByChild('senderId').equalTo(currentUser).on('value', snap => {
            const list = document.getElementById('myReqList');
            list.innerHTML = "";
            let hasReqs = false;
            
            // Iterate in reverse to show newest first
            const reqs = [];
            snap.forEach(c => { reqs.push(c.val()); });
            reqs.reverse();

            reqs.forEach(r => {
                hasReqs = true;
                const isPending = r.status === 'pending';
                const isAccepted = r.status === 'accepted';
                
                const cardClass = isPending ? 'req-pending' : (isAccepted ? 'req-accepted' : 'req-rejected');
                const badgeClass = isPending ? 'badge-pending' : (isAccepted ? 'badge-accepted' : 'badge-rejected');
                const statusText = isPending ? 'قيد المراجعة' : (isAccepted ? 'تم القبول' : 'مرفوض');
                const reasonHtml = r.rejectReason ? `<div class="req-reason-text">سبب الرفض: ${r.rejectReason}</div>` : '';
                
                const card = document.createElement('div');
                card.className = `glass-panel req-card ${cardClass}`;
                card.innerHTML = `
                    <div class="req-header">
                        <strong style="font-size: 14px;">${r.type}</strong>
                        <span class="req-badge ${badgeClass}">${statusText}</span>
                    </div>
                    <div class="req-time">${formatDate(r.time)}</div>
                    ${reasonHtml}
                `;
                list.appendChild(card);
            });

            if(!hasReqs) {
                list.innerHTML = '<div style="text-align: center; color: var(--text-muted); font-size: 12px; padding: 20px;">لا توجد طلبات سابقة</div>';
            }
        });
    }

    // --- Chat System ---
    function openChat(groupName, iconClass) {
        document.getElementById('groupList').style.display = 'none';
        document.getElementById('activeChat').style.display = 'flex';
        document.getElementById('chatTitle').innerHTML = `<i class="${iconClass}"></i> ${groupName}`;
        
        const box = document.getElementById('chatBox');
        box.innerHTML = '<div style="text-align:center; padding:20px;"><span class="loader"></span></div>';
        
        if(currentChatRef) db.ref(currentChatRef).off();
        currentChatRef = 'chats/' + groupName;

        db.ref(currentChatRef).on('value', snap => {
            box.innerHTML = "";
            
            snap.forEach(c => {
                const m = c.val();
                const key = c.key;
                const isMine = m.senderId === currentUser || m.name === personnelDB[currentUser].name;
                
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg-bubble ${isMine ? 'msg-mine' : 'msg-other'}`;
                
                const senderName = m.name || (personnelDB[m.senderId] ? personnelDB[m.senderId].name : 'غير معروف');
                
                let contentHTML = `<div class="msg-sender">${senderName}</div>`;
                
                // Text content (Safe from XSS)
                const textDiv = document.createElement('div');
                textDiv.textContent = m.text;
                contentHTML += textDiv.outerHTML;
                
                // Attachment
                if(m.fileUrl) {
                    const fName = m.fileName || 'مرفق';
                    contentHTML += `<br><a href="${m.fileUrl}" target="_blank" class="msg-attachment"><i class="fas fa-paperclip"></i> ${fName}</a>`;
                }

                // Admin Controls for Requests
                if(groupName === 'رئيس القسم' && m.isRequest) {
                    if(m.status === 'pending') {
                        contentHTML += `
                        <div class="admin-actions">
                            <button class="btn btn-primary" onclick="updateReqStatus('${key}', '${m.reqId}', 'accepted')"><i class="fas fa-check"></i> قبول</button>
                            <button class="btn btn-danger" onclick="updateReqStatus('${key}', '${m.reqId}', 'rejected')"><i class="fas fa-times"></i> رفض</button>
                        </div>`;
                    } else {
                        const sText = m.status === 'accepted' ? '<span style="color:var(--primary)">مقبول</span>' : '<span style="color:var(--danger)">مرفوض</span>';
                        contentHTML += `<div style="margin-top:8px; font-size:11px; background:rgba(0,0,0,0.3); padding:4px 8px; border-radius:4px;">حالة الطلب: ${sText}</div>`;
                    }
                }

                contentHTML += `<div class="msg-time">${formatDate(m.time)}</div>`;
                msgDiv.innerHTML = contentHTML;
                box.appendChild(msgDiv);
            });
            
            // Auto scroll to bottom
            setTimeout(() => { box.scrollTop = box.scrollHeight; }, 100);
        });
    }

    function backToGroups() {
        document.getElementById('groupList').style.display = 'flex';
        document.getElementById('activeChat').style.display = 'none';
        if(currentChatRef) db.ref(currentChatRef).off();
    }

    function sendMsg() {
        const input = document.getElementById('msgInput');
        const val = input.value.trim();
        if(val && currentChatRef) {
            db.ref(currentChatRef).push({ 
                senderId: currentUser,
                name: personnelDB[currentUser].name, 
                text: val, 
                time: Date.now() 
            });
            input.value = "";
        }
    }

    // Admin action
    function updateReqStatus(msgKey, reqId, newStatus) {
        let reason = "";
        if(newStatus === 'rejected') {
            reason = prompt("الرجاء كتابة سبب الرفض:");
            if(reason === null) return; // Cancelled
        }

        // Update main request log
        db.ref('all_requests/' + reqId).update({ status: newStatus, rejectReason: reason });
        
        // Update message in admin chat
        db.ref('chats/رئيس القسم/' + msgKey).update({ status: newStatus });
        
        showToast("تم تحديث حالة الطلب", "success");
    }

</script>
