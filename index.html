<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة العمليات الخاصة</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0b0e11; --panel: #15191c; 
            --tactical-dark: #968c83; --tactical-light: #b9b3ad; 
            --neon: #00ff41; --danger: #ff0000; 
        }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        #loginPage { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: var(--panel); padding: 25px; border-radius: 15px; width: 85%; max-width: 380px; text-align: center; border: 1px solid var(--tactical-dark); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #0b0e11; border: 1px solid var(--tactical-dark); color: var(--tactical-light); border-radius: 5px; box-sizing: border-box; text-align: center; }

        #mainApp { display: none; height: 100vh; flex-direction: column; }
        .header { background: var(--panel); padding: 10px 20px; border-bottom: 2px solid var(--tactical-dark); display: flex; justify-content: space-between; align-items: center; }

        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .chat-container { display: none; flex-direction: column; height: 100%; }
        .chat-box { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; border: 1px solid var(--tactical-dark); }
        
        .msg { background: #1c2126; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: flex; gap: 12px; border-right: 4px solid var(--tactical-dark); }
        .msg-sender-img { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--tactical-light); object-fit: cover; }
        .msg-name { color: var(--neon); font-weight: bold; font-size: 13px; }
        .msg-info { font-size: 11px; color: var(--tactical-light); }
        .chat-img { max-width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid #444; }

        .input-area { display: flex; gap: 8px; background: var(--panel); padding: 10px; border-top: 1px solid #333; align-items: center; }
        .attach-btn { background: #222; border: 1px solid var(--tactical-dark); color: white; width: 45px; height: 45px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main { background: var(--tactical-dark); color: black; }

        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--tactical-dark); }
        .nav-item { color: #555; font-size: 24px; cursor: pointer; }
        .nav-item.active { color: var(--tactical-light); }
    </style>
</head>
<body>

<audio id="alarmSound" src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3" loop></audio>

<div id="loginPage">
    <div class="login-box">
        <img src="logo.png" style="width:90px; margin-bottom:10px;">
        <h1 style="font-size:1.3rem;">العمليات الخاصة</h1>
        <input type="text" id="milId" placeholder="الرقم العسكري">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn btn-main" onclick="login()">دخول النظام</button>
    </div>
</div>

<div id="mainApp">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="" id="headerImg" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
            <div id="userDisplay" style="font-weight:bold; font-size:13px;">--</div>
        </div>
        <button onclick="logout()" style="background:none; border:1px solid #444; color:white; padding:5px; border-radius:5px; font-size:10px;">خروج</button>
    </div>

    <div class="content">
        <div id="homeSec" class="tab-content">
            <div id="adminPanel" style="display:none; background:#1c2126; padding:15px; border-radius:10px; margin-bottom:20px; border-right:4px solid var(--neon);">
                <h4 style="margin:0 0 10px 0;">الإدارة العسكرية</h4>
                <select id="targetUser"></select>
                <select id="targetGroup">
                    <option value="g1">القتالية الأولى</option>
                    <option value="g2">القتالية الثانية</option>
                    <option value="g3">القتالية الثالثة</option>
                    <option value="g4">قلم القوة</option>
                </select>
                <button class="btn btn-main" style="padding:8px; font-size:12px;" onclick="manageMember('add')">منح الصلاحية</button>
                <hr style="border:0; border-top:1px solid #444; margin:10px 0;">
                <button class="btn" style="background:var(--danger); color:white;" onclick="triggerRaid()">نداء مداهمة</button>
            </div>
            <div style="text-align:center;">
                <div id="timer" style="font-size:2.5rem; color:var(--neon); margin-bottom:10px;">00:00:00</div>
                <button class="btn btn-main" id="dutyBtn" onclick="toggleDuty()">بدء الخدمة</button>
            </div>
        </div>

        <div id="chatSec" class="tab-content" style="display:none; height:100%;">
            <div id="groupList">
                <div class="btn btn-main" style="margin-bottom:10px;" onclick="openChat('المجموعة المشتركة')">المجموعة المشتركة</div>
                <div id="btn-g1" class="btn btn-main" style="display:none; margin-bottom:10px;" onclick="openChat('المجموعة القتالية الأولى')">القتالية الأولى</div>
                <div id="btn-g2" class="btn btn-main" style="display:none; margin-bottom:10px;" onclick="openChat('المجموعة القتالية الثانية')">القتالية الثانية</div>
                <div id="btn-g3" class="btn btn-main" style="display:none; margin-bottom:10px;" onclick="openChat('المجموعة القتالية الثالثة')">القتالية الثالثة</div>
                <div id="btn-g4" class="btn btn-main" style="display:none; margin-bottom:10px;" onclick="openChat('قلم القوة')">قلم القوة</div>
            </div>

            <div id="activeChat" class="chat-container">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <strong id="currentGroupName"></strong>
                    <button onclick="backToGroups()" class="btn-outline">رجوع</button>
                </div>
                <div id="chatBox" class="chat-box"></div>
                <div class="input-area">
                    <input type="file" id="fileInp" style="display:none;" onchange="handleFileUpload(this)">
                    <button class="attach-btn" onclick="document.getElementById('fileInp').click()"><i class="fas fa-paperclip"></i></button>
                    <input type="text" id="msgInput" placeholder="أدخل البلاغ...">
                    <button onclick="sendMsg()" class="btn-main" style="width:50px; height:45px;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <div id="settingsSec" class="tab-content" style="display:none; text-align:center;">
             <img src="https://via.placeholder.com/150" id="profilePrev" style="width:120px; height:120px; border-radius:50%; object-fit:cover; margin-bottom:10px;">
             <br>
             <button class="btn btn-outline" style="margin:0 auto;" onclick="document.getElementById('profileInp').click()">تغيير الصورة الشخصية</button>
             <input type="file" id="profileInp" style="display:none;" onchange="updateProfilePhoto(this)">
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-house-user"></i></div>
        <div class="nav-item" onclick="switchTab('chat', this)"><i class="fas fa-tower-broadcast"></i></div>
        <div class="nav-item" onclick="switchTab('settings', this)"><i class="fas fa-user-circle"></i></div>
    </div>
</div>

    let currentUser = "";
    let currentGroup = "المجموعة المشتركة";

    window.onload = function() {
        let saved = localStorage.getItem('session_user');
        if (saved && personnelDB[saved]) {
            currentUser = saved;
            showMainApp();
            checkGroups();
        }
        // تعبئة قائمة الإدارة
        const sel = document.getElementById('targetUser');
        Object.keys(personnelDB).sort().forEach(id => {
            let o = document.createElement('option');
            o.value = id;
            o.innerText = id + " - " + personnelDB[id].name;
            sel.appendChild(o);
        });
    };

    function login() {
        let id = document.getElementById('milId').value.trim();
        let pass = document.getElementById('pass').value;
        let savedPass = localStorage.getItem(id + '_pass') || "SHJ@123";
        if(personnelDB[id] && pass === savedPass) {
            currentUser = id;
            localStorage.setItem('session_user', id);
            showMainApp();
            checkGroups();
        } else { alert("بيانات الدخول غير صحيحة."); }
    }

    function showMainApp() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        if(["1321", "1408", "1549"].includes(currentUser)) document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('userDisplay').innerText = personnelDB[currentUser].rank + " / " + personnelDB[currentUser].name;
        updateUIPhotos();
    }

    function openChat(n) {
        currentGroup = n;
        document.getElementById('groupList').style.display = 'none';
        document.getElementById('activeChat').style.display = 'flex';
        document.getElementById('currentGroupName').innerText = n;
        listenForMessages();
    }

    // الاستماع للرسايل لايف من Firebase
    function listenForMessages() {
        db.ref('chats/' + currentGroup).on('value', (snapshot) => {
            const box = document.getElementById('chatBox');
            box.innerHTML = "";
            snapshot.forEach((child) => {
                const m = child.val();
                box.innerHTML += `
                    <div class="msg">
                        <img src="${m.photo || 'https://via.placeholder.com/150'}" class="msg-sender-img">
                        <div>
                            <div class="msg-name">${m.rank} / ${m.name}</div>
                            <div class="msg-info">الرقم العسكري: ${m.id}</div>
                            <div style="margin-top:5px;">${m.text}</div>
                        </div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msgInput');
        if(!inp.value.trim()) return;
        const p = personnelDB[currentUser];
        db.ref('chats/' + currentGroup).push({
            id: currentUser,
            name: p.name,
            rank: p.rank,
            text: inp.value,
            photo: localStorage.getItem(currentUser + '_photo') || "",
            time: Date.now()
        });
        inp.value = "";
    }

    function handleFileUpload(input) {
        if (input.files && input.files[0]) {
            let file = input.files[0], r = new FileReader();
            r.onload = function(e) {
                let content = file.type.startsWith('image/') 
                    ? `<img src="${e.target.result}" class="chat-img">` 
                    : `<a href="${e.target.result}" download="${file.name}" class="file-link"><i class="fas fa-file-download"></i> ${file.name}</a>`;
                
                const p = personnelDB[currentUser];
                db.ref('chats/' + currentGroup).push({
                    id: currentUser,
                    name: p.name,
                    rank: p.rank,
                    text: content,
                    photo: localStorage.getItem(currentUser + '_photo') || "",
                    time: Date.now()
                });
            };
            r.readAsDataURL(file);
        }
    }

    function updateProfilePhoto(input) {
        if (input.files && input.files[0]) {
            let r = new FileReader();
            r.onload = e => {
                localStorage.setItem(currentUser + '_photo', e.target.result);
                updateUIPhotos();
                alert("تم تحديث هويتك العسكرية.");
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    function updateUIPhotos() {
        let photo = localStorage.getItem(currentUser + '_photo') || "https://via.placeholder.com/150";
        document.getElementById('headerImg').src = photo;
        document.getElementById('profilePrev').src = photo;
    }

    function checkGroups() {
        let acc = JSON.parse(localStorage.getItem(currentUser + '_groups') || "[]");
        acc.forEach(g => { if(document.getElementById('btn-' + g)) document.getElementById('btn-' + g).style.display = 'block'; });
    }

    function manageMember(action) {
        let t = document.getElementById('targetUser').value, g = document.getElementById('targetGroup').value;
        let acc = JSON.parse(localStorage.getItem(t + '_groups') || "[]");
        if(action === 'add' && !acc.includes(g)) acc.push(g);
        localStorage.setItem(t + '_groups', JSON.stringify(acc));
        alert("تم تحديث صلاحيات " + t);
    }

    function backToGroups() { document.getElementById('groupList').style.display = 'block'; document.getElementById('activeChat').style.display = 'none'; }
    function switchTab(t, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById(t + 'Sec').style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }
    function logout() { localStorage.removeItem('session_user'); location.reload(); }
