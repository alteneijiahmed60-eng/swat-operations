<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة العمليات الخاصة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #000; --panel: #15191c; --neon: #00ff41; --danger: #ff0000; --tactical: #968c83; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* واجهة المكالمة */
        #callUI { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; }
        #remoteVideo { width: 100%; height: 100%; position: absolute; object-fit: cover; z-index: 10; background: #111; }
        #localVideo { width: 90px; height: 130px; position: absolute; top: 10px; right: 10px; object-fit: cover; z-index: 30; border: 2px solid var(--neon); border-radius: 8px; transform: scaleX(-1); }
        .call-overlay { z-index: 20; position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
        .timer { font-size: 2.2rem; color: var(--neon); font-family: monospace; margin: 15px 0; }
        .btn-call { width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; }
        .accept { background: var(--neon); color: #000; }
        .reject { background: var(--danger); color: #fff; }

        /* الرادار والوحدات */
        .radar-container { display: flex; height: 350px; margin-top: 10px; gap: 5px; }
        #radarMap { flex: 2; border-radius: 10px; border: 1px solid var(--tactical); filter: invert(100%) hue-rotate(180deg); }
        .units-list { flex: 1; background: var(--panel); border-radius: 10px; border: 1px solid #333; overflow-y: auto; padding: 8px; font-size: 10px; }
        .unit-item { display: flex; align-items: center; gap: 5px; padding: 5px 0; border-bottom: 1px solid #222; }
        .color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

        /* الشاشات والواجهة */
        #loginPage { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: var(--panel); padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; border: 1px solid #333; }
        .login-box input, .login-box select { width: 100%; padding: 12px; margin: 8px 0; background: #0b0e11; border: 1px solid #444; color: #fff; border-radius: 5px; text-align: center; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; background: var(--tactical); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        
        #mainApp { display: none; height: 100vh; flex-direction: column; }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 100; }
        .nav-item { color: #555; font-size: 22px; cursor: pointer; }
        .nav-item.active { color: var(--neon); }
        .tab-content { padding: 15px; flex: 1; overflow-y: auto; padding-bottom: 80px; }
        
        /* الشات والطلبات */
        .chat-box { height: calc(100vh - 300px); overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; border: 1px solid #333; margin-bottom: 10px; }
        .msg { background: #1c2126; padding: 8px; border-radius: 10px; margin-bottom: 10px; border-right: 3px solid var(--tactical); }
        .chat-controls { display: flex; gap: 8px; align-items: flex-end; background: #0b0e11; padding: 8px; border-radius: 8px; }
        #msgInput { flex: 1; padding: 8px; background: #15191c; border: 1px solid #444; color: #fff; border-radius: 5px; resize: none; min-height: 40px; font-size: 14px; }
        
        #audioPermissionUI, #raidAlertUI { display: none; position: fixed; inset: 0; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; background: #000; text-align: center; padding: 20px; }
        
        .req-box { background: #1c2126; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
    </style>
</head>
<body>

<audio id="ringtone" src="https://www.soundjay.com/phone/sounds/phone-calling-1.mp3" loop></audio>
<audio id="sirenSound" src="https://www.soundjay.com/mechanical/sounds/alarm-clock-01.mp3" loop></audio>
<audio id="remoteAudio" autoplay></audio>

<div id="audioPermissionUI">
    <i class="fas fa-satellite-dish" style="font-size: 60px; color: var(--neon); margin-bottom: 20px;"></i>
    <h2>تفعيل المنظومة الإدارية</h2>
    <button class="btn-main" style="background: var(--neon);" onclick="enableAndStart()">دخول</button>
</div>

<div id="raidAlertUI" style="background:rgba(255,0,0,0.9);">
    <i class="fas fa-exclamation-triangle" style="font-size: 80px; color: white;"></i>
    <h1>نداء مداهمة!</h1>
    <h3 id="raidAlertSender"></h3>
    <button class="btn-main" style="background:#000; color:#fff; width:150px;" onclick="dismissRaidAlert()">علم</button>
</div>

<div id="callUI">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="call-overlay">
        <h3 id="callStatusText" style="color: var(--neon);">اتصال لاسلكي...</h3>
        <h2 id="peerName">--</h2>
        <div id="activeCallTimer" class="timer" style="display: none;">00:00</div>
        <div class="call-btns" id="callActionBtns">
            <button id="acceptBtn" class="btn-call accept" onclick="handleAccept()"><i class="fas fa-phone"></i></button>
            <button class="btn-call reject" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
        </div>
        <div class="call-btns" id="activeCallBtns" style="display: none;">
            <button id="muteBtn" class="btn-call control" onclick="toggleMute()"><i class="fas fa-microphone"></i></button>
            <button class="btn-call reject" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
            <button id="videoBtn" class="btn-call control" onclick="toggleVideo()"><i class="fas fa-video"></i></button>
        </div>
    </div>
</div>

<div id="loginPage">
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/ar/thumb/f/f6/Sharjah_Police_Logo.svg/1200px-Sharjah_Police_Logo.svg.png" style="width:80px; margin-bottom:10px; background:white; border-radius:50%; padding:5px;">
        <h2>العمليات الخاصة</h2>
        <input type="text" id="milId" placeholder="الرقم العسكري">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn-main" onclick="login()">دخول</button>
    </div>
</div>

<div id="mainApp">
    <div style="padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;">
        <div id="userDisplay" style="font-size: 11px; font-weight: bold; color: var(--tactical);">--</div>
        <button onclick="logout()" style="background: none; border: 1px solid var(--danger); color: var(--danger); font-size: 9px; padding: 2px 8px;">خروج</button>
    </div>

    <div id="homeSec" class="tab-content">
        <div id="adminPanel" style="display:none; background: #1c2126; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-right: 4px solid var(--neon);">
            <h5 style="margin:0 0 8px 0; color: var(--neon);">لوحة التحكم</h5>
            <input type="text" id="targetUser" class="btn-main" style="background:#000; text-align:right; color:#fff;" placeholder="رقم العسكري">
            <select id="targetGroupAdmin" class="btn-main" style="background:#000; color:#fff;">
                <option value="المجموعة المشتركة">المجموعة المشتركة</option>
                <option value="المجموعة القتالية الأولى">القتالية الأولى</option>
                <option value="قلم القوة">قلم القوة</option>
                <option value="رئيس القسم">شات رئيس القسم</option>
            </select>
            <div style="display: flex; gap: 5px;">
                <button class="btn-main" style="flex: 1;" onclick="manageMember('add')">توزيع</button>
                <button class="btn-main" style="flex: 1; background: var(--danger); color: #fff;" onclick="manageMember('remove')">إزالة</button>
            </div>
            <button class="btn-main" style="background: var(--danger); color: #fff;" onclick="triggerRaid()">نداء مداهمة</button>
        </div>

        <div style="background: rgba(0, 255, 65, 0.05); padding: 10px; border-radius: 10px; display: flex; justify-content: space-between;">
            <h3 style="margin:0; font-size:0.8rem;">رادار تعقب القوات</h3>
            <span id="onlineCountDisplay" style="color:var(--neon); font-weight:bold;">0</span>
        </div>
        <div class="radar-container">
            <div id="radarMap"></div>
            <div class="units-list" id="unitsList"></div>
        </div>
    </div>

    <div id="chatSec" class="tab-content" style="display: none; padding: 10px;">
        <div id="groupList">
            <button class="btn-main" onclick="openChat('المجموعة المشتركة')">المجموعة المشتركة</button>
            <button id="btn-g1" class="btn-main" style="display:none;" onclick="openChat('المجموعة القتالية الأولى')">القتالية الأولى</button>
            <button id="btn-g4" class="btn-main" style="display:none;" onclick="openChat('قلم القوة')">قلم القوة</button>
            <button id="btn-gSecret" class="btn-main" style="display:none; background: goldenrod; color: black;" onclick="openChat('رئيس القسم')">شات رئيس القسم 🔒</button>
        </div>
        <div id="activeChat" style="display: none; flex-direction: column;">
            <div id="chatBox" class="chat-box"></div>
            <div class="chat-controls">
                <textarea id="msgInput" placeholder="اكتب..."></textarea>
                <button class="chat-btn" style="color: var(--neon);" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
            <button onclick="backToGroups()" class="btn-main" style="margin-top:10px;">رجوع</button>
        </div>
    </div>

    <div id="reqSec" class="tab-content" style="display: none; padding: 15px;">
        <h3 style="color: var(--neon); border-bottom: 1px solid #333; padding-bottom: 10px;">تقديم طلب إداري</h3>
        <div class="req-box">
            <label>نوع الطلب:</label>
            <select id="reqType" class="btn-main" style="background:#000; color:#fff;">
                <option value="طلب إجازة سنوية">طلب إجازة سنوية</option>
                <option value="طلب مهمة إدارية">طلب مهمة إدارية</option>
                <option value="طلب ظرف طارئ">طلب ظرف طارئ</option>
                <option value="بلاغ نقص تسليح">بلاغ نقص تسليح</option>
            </select>
            <label>تفاصيل الطلب:</label>
            <textarea id="reqDetails" class="btn-main" style="background:#000; color:#fff; height: 100px; text-align: right;" placeholder="اشرح طلبك هنا..."></textarea>
            <button class="btn-main" style="background: var(--neon); color: black;" onclick="submitRequest()">إرسال الطلب لرئيس القسم</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="switchTab('chat', this)"><i class="fas fa-comment-dots"></i></div>
        <div class="nav-item" onclick="switchTab('req', this)"><i class="fas fa-file-signature"></i></div>
        <div class="nav-item" onclick="switchTab('call', this)"><i class="fas fa-phone-volume"></i></div>
    </nav>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCWP-8J8GoZDl-0u22ArnZ1F4QdrY6_EbY",
        authDomain: "al-amaliat-system.firebaseapp.com",
        projectId: "al-amaliat-system",
        storageBucket: "al-amaliat-system.firebasestorage.app",
        messagingSenderId: "970481180924",
        appId: "1:970481180924:web:4966d13c0ec48b8a3db779"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const personnelDB = {
        "1321": "مبارك محمد عبدالله", "1408": "محمد عبدالله المهيري", "1549": "راشد احمد عبدالرحمن",
        "1565": "طلال حسن شهيل", "105042": "أحمد حمدان الطنيجي", "105869": "حسن علي الرئيسي"
    };

    let currentUser = "", map, markers = {}, localStream, peerConnection, currentCallRefId, callTimer;
    const colors = ["#00ff41", "#ff0000", "#007bff", "#ffeb3b", "#e91e63", "#9c27b0", "#00bcd4", "#ff9800"];

    function login() {
        let id = document.getElementById('milId').value.trim();
        if(personnelDB[id] && document.getElementById('pass').value.trim()==="SHJ@123") {
            currentUser = id; localStorage.setItem('session_user', id);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('audioPermissionUI').style.display = 'flex';
        } else alert("خطأ");
    }

    async function enableAndStart() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
            document.getElementById('localVideo').srcObject = localStream;
            localStream.getTracks().forEach(t => t.enabled = false);
        } catch(e) { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
        document.getElementById('audioPermissionUI').style.display = 'none';
        showMainApp();
    }

    function showMainApp() {
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('userDisplay').innerText = personnelDB[currentUser];
        if(["1321", "1408", "1549"].includes(currentUser)) document.getElementById('adminPanel').style.display = 'block';
        initRadar(); listenForCalls(); listenForRaidAlerts(); checkGroups();
    }

    // --- نظام الطلبات الإدارية ---
    function submitRequest() {
        const type = document.getElementById('reqType').value;
        const details = document.getElementById('reqDetails').value.trim();
        if(!details) return alert("الرجاء كتابة تفاصيل الطلب");

        const msg = `📥 طلب جديد مقدم من: ${personnelDB[currentUser]} (${currentUser})\nنوع الطلب: ${type}\nالتفاصيل: ${details}\nالتوقيت: ${new Date().toLocaleString()}`;
        
        // إرسال الطلب لشات رئيس القسم
        db.ref('chats/رئيس القسم').push({ name: "النظام الإداري", text: msg, time: Date.now() }).then(() => {
            alert("تم إرسال طلبك لرئيس القسم بنجاح.");
            document.getElementById('reqDetails').value = "";
            switchTab('chat', document.querySelectorAll('.nav-item')[1]);
        });
    }

    // --- الرادار ---
    function initRadar() {
        if(!map) { map = L.map('radarMap').setView([25.3462, 55.4209], 13); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); }
        navigator.geolocation.watchPosition(pos => {
            db.ref('online_users/' + currentUser).set({ lat: pos.coords.latitude, lng: pos.coords.longitude, name: personnelDB[currentUser], color: colors[parseInt(currentUser)%8] });
        }, null, { enableHighAccuracy: true });

        db.ref('online_users').on('value', snap => {
            const data = snap.val() || {};
            const list = document.getElementById('unitsList'); list.innerHTML = "";
            document.getElementById('onlineCountDisplay').innerText = Object.keys(data).length;
            for(let id in markers) { if(!data[id]) { map.removeLayer(markers[id]); delete markers[id]; } }
            for(let id in data) {
                const u = data[id];
                list.innerHTML += `<div class="unit-item"><div class="color-dot" style="background:${u.color}"></div><span>${u.name}</span></div>`;
                if(markers[id]) markers[id].setLatLng([u.lat, u.lng]);
                else markers[id] = L.circleMarker([u.lat, u.lng], { radius: 7, fillColor: u.color, color: "#fff", weight: 2, fillOpacity: 1 }).addTo(map);
            }
        });
    }

    // --- الشات والمجموعات ---
    function openChat(n) {
        document.getElementById('groupList').style.display='none'; document.getElementById('activeChat').style.display='flex';
        document.getElementById('currentGroupName').innerText = n;
        db.ref('chats/'+n).on('value', snap => {
            const box = document.getElementById('chatBox'); box.innerHTML = "";
            snap.forEach(c => { box.innerHTML += `<div class="msg"><div style="font-size:10px; color:var(--neon);">${c.val().name}</div><div style="font-size:13px; white-space:pre-wrap;">${c.val().text}</div></div>`; });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const val = document.getElementById('msgInput').value.trim(); if(!val) return;
        db.ref('chats/' + document.getElementById('currentGroupName').innerText).push({ name: personnelDB[currentUser], text: val, time: Date.now() });
        document.getElementById('msgInput').value = "";
    }

    function checkGroups() {
        db.ref('users_groups/' + currentUser).on('value', snap => {
            const acc = snap.val() || {};
            if(acc['g1']) document.getElementById('btn-g1').style.display = 'block';
            if(acc['g4']) document.getElementById('btn-g4').style.display = 'block';
            if(acc['رئيس القسم']) document.getElementById('btn-gSecret').style.display = 'block';
        });
    }

    function manageMember(a) {
        let t = document.getElementById('targetUser').value.trim();
        let g = document.getElementById('targetGroupAdmin').value;
        if(a==='add') db.ref('users_groups/'+t+'/'+g).set(true); else db.ref('users_groups/'+t+'/'+g).remove();
        alert("تم التحديث");
    }

    // --- الاتصال (WebRTC) ---
    async function startCall() {
        let tid = document.getElementById('targetId').value.trim();
        currentCallRefId = tid; setupCallUI(tid, 'calling');
        peerConnection = new RTCPeerConnection(servers);
        localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
        peerConnection.ontrack = e => { document.getElementById('remoteAudio').srcObject=e.streams[0]; document.getElementById('remoteVideo').srcObject=e.streams[0]; };
        const offer = await peerConnection.createOffer(); await peerConnection.setLocalDescription(offer);
        db.ref('calls/'+tid).set({ offer:{type:offer.type, sdp:offer.sdp}, callerId:currentUser, status:'ringing' });
        db.ref(`calls/${tid}`).on('value', async s => { if(!s.val()) return hideCallUI(); if(s.val().status==='accepted'&&s.val().answer&&!peerConnection.currentRemoteDescription) { await peerConnection.setRemoteDescription(new RTCSessionDescription(s.val().answer)); startActiveCallUI(); } });
    }
    function listenForCalls() { db.ref('calls/'+currentUser).on('value', async s => { if(s.val()&&s.val().status==='ringing') { currentCallRefId=currentUser; setupCallUI(s.val().callerId, 'incoming'); document.getElementById('ringtone').play(); } else if(!s.val()&&currentCallRefId===currentUser) hideCallUI(); }); }
    async function handleAccept() { document.getElementById('ringtone').pause(); const snap = await db.ref('calls/'+currentUser).get(); peerConnection = new RTCPeerConnection(servers); localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream)); peerConnection.ontrack = e => { document.getElementById('remoteAudio').srcObject=e.streams[0]; document.getElementById('remoteVideo').srcObject=e.streams[0]; }; await peerConnection.setRemoteDescription(new RTCSessionDescription(snap.val().offer)); const answer = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer); await db.ref('calls/'+currentUser).update({ answer:{type:answer.type, sdp:answer.sdp}, status:'accepted' }); startActiveCallUI(); }

    function switchTab(t, el) { document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none'); document.getElementById(t + 'Sec').style.display = 'block'; document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); if(t==='home' && map) setTimeout(()=>map.invalidateSize(), 200); }
    function logout() { db.ref('online_users/'+currentUser).remove(); localStorage.removeItem('session_user'); location.reload(); }
    function backToGroups() { document.getElementById('groupList').style.display = 'block'; document.getElementById('activeChat').style.display = 'none'; }
    function triggerRaid() { db.ref('alerts/raid').push({ by: personnelDB[currentUser], time: Date.now() }); }
    function listenForRaidAlerts() { db.ref('alerts/raid').limitToLast(1).on('child_added', snap => { if(Date.now()-snap.val().time < 15000) { document.getElementById('raidAlertSender').innerText=snap.val().by; document.getElementById('raidAlertUI').style.display='flex'; document.getElementById('sirenSound').play(); } }); }
    function dismissRaidAlert() { document.getElementById('raidAlertUI').style.display = 'none'; document.getElementById('sirenSound').pause(); }
    function endCall() { if(currentCallRefId) db.ref('calls/'+currentCallRefId).remove(); hideCallUI(); }
    function hideCallUI() { if(peerConnection) peerConnection.close(); document.getElementById('callUI').style.display='none'; document.getElementById('activeCallBtns').style.display='none'; document.getElementById('remoteVideo').style.display='none'; document.getElementById('ringtone').pause(); clearInterval(callTimer); currentCallRefId=""; }
    function setupCallUI(id, type) { document.getElementById('callUI').style.display='flex'; document.getElementById('peerName').innerText = personnelDB[id]||"عسكري"; document.getElementById('callActionBtns').style.display = type==='incoming'?'flex':'none'; }
    function startActiveCallUI() { document.getElementById('callActionBtns').style.display='none'; document.getElementById('activeCallBtns').style.display='flex'; document.getElementById('activeCallTimer').style.display='block'; let sec = 0; clearInterval(callTimer); callTimer = setInterval(() => { sec++; let m=Math.floor(sec/60), s=sec%60; document.getElementById('activeCallTimer').innerText=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }, 1000); }
    function toggleVideo() { isVideoOn=!isVideoOn; localStream.getVideoTracks()[0].enabled=isVideoOn; document.getElementById('remoteVideo').style.display=isVideoOn?'block':'none'; }
    function toggleMute() { isMuted=!isMuted; localStream.getAudioTracks()[0].enabled=!isMuted; document.getElementById('muteBtn').style.background=isMuted?'red':'rgba(0,0,0,0.6)'; }
</script>
</body>
</html>
