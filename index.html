<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة العمليات الخاصة</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e11; --panel: #15191c; --tactical-dark: #968c83; --tactical-light: #b9b3ad; --neon: #00ff41; --danger: #ff0000; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* شاشات الاتصال المتطورة */
        #incomingCall, #callingStatus, #inCallUI { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        .call-profile-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--neon); object-fit: cover; margin-bottom: 20px; }
        .call-anim { width: 80px; height: 80px; border-radius: 50%; background: var(--neon); animation: pulse 1.5s infinite; display: flex; align-items: center; justify-content: center; font-size: 30px; color: black; margin-bottom: 20px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); } 70% { box-shadow: 0 0 0 30px rgba(0, 255, 65, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); } }

        /* تسجيل الدخول */
        #loginPage { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: var(--panel); padding: 25px; border-radius: 15px; width: 85%; max-width: 380px; text-align: center; border: 1px solid var(--tactical-dark); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0b0e11; border: 1px solid var(--tactical-dark); color: var(--tactical-light); border-radius: 5px; box-sizing: border-box; text-align: center; }

        /* التطبيق الرئيسي */
        #mainApp { display: none; height: 100vh; flex-direction: column; }
        .header { background: var(--panel); padding: 10px 20px; border-bottom: 2px solid var(--tactical-dark); display: flex; justify-content: space-between; align-items: center; }
        .header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        
        .chat-box { height: calc(100vh - 250px); overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; border: 1px solid var(--tactical-dark); }
        .msg { background: #1c2126; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: flex; gap: 12px; border-right: 4px solid var(--tactical-dark); text-align: right; }
        .msg img { width: 40px; height: 40px; border-radius: 50%; }

        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--tactical-dark); }
        .nav-item { color: #555; font-size: 24px; cursor: pointer; }
        .nav-item.active { color: var(--tactical-light); }
        .btn-main { background: var(--tactical-dark); color: black; font-weight: bold; width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<audio id="ringtone" src="https://www.soundjay.com/phone/sounds/phone-calling-1.mp3" loop></audio>
<audio id="remoteAudio" autoplay></audio>

<div id="incomingCall">
    <img src="" id="callerImg" class="call-profile-img">
    <h2 id="callerNameDisplay">--</h2>
    <p id="callerInfoDisplay" style="color:var(--tactical-light);"></p>
    <div class="call-anim"><i class="fas fa-phone-alt"></i></div>
    <div style="display:flex; gap:30px; margin-top:20px;">
        <button class="btn-main" style="background:var(--neon); width:70px; height:70px; border-radius:50%;" onclick="acceptCall()"><i class="fas fa-phone"></i></button>
        <button class="btn-main" style="background:var(--danger); width:70px; height:70px; border-radius:50%;" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<div id="callingStatus">
    <img src="" id="targetImg" class="call-profile-img">
    <h2 id="targetNameDisplay">جاري الاتصال...</h2>
    <div class="call-anim" style="background:var(--tactical-dark);"><i class="fas fa-signal"></i></div>
    <button class="btn-main" style="background:var(--danger); width:70px; height:70px; border-radius:50%; margin-top:30px;" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
</div>

<div id="inCallUI">
    <img src="" id="activeCallImg" class="call-profile-img" style="border-color:var(--neon);">
    <h2 id="activeCallName">خط آمن</h2>
    <p id="activeCallInfo" style="color:var(--tactical-light);"></p>
    <div style="font-size: 2.5rem; color: var(--neon); margin: 20px 0; font-family: monospace;" id="callDuration">00:00</div>
    <button class="btn-main" style="background:var(--danger); width:70px; height:70px; border-radius:50%;" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
</div>

<div id="loginPage">
    <div class="login-box">
        <img src="logo.png" style="width:90px; margin-bottom:10px;">
        <h2>العمليات الخاصة</h2>
        <input type="number" id="milId" placeholder="الرقم العسكري">
        <button class="btn-main" onclick="login()">دخول</button>
    </div>
</div>

<div id="mainApp">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="" id="headerImg">
            <div id="userDisplay" style="font-weight:bold; font-size:13px;">--</div>
        </div>
        <button onclick="logout()" style="background:none; color:white; border:1px solid #444; padding:5px; border-radius:5px;">خروج</button>
    </div>

    <div class="content">
        <div id="homeSec" class="tab-content">
            <div style="text-align:center; padding-top:30px;">
                <div id="timer" style="font-size:3rem; color:var(--neon);">00:00:00</div>
                <p>سجل الخدمة نشط</p>
            </div>
        </div>

        <div id="callSec" class="tab-content" style="display:none;">
            <div style="background:var(--panel); padding:20px; border-radius:15px; border:1px solid #333;">
                <h3>اتصال عسكري</h3>
                <input type="number" id="targetMilId" placeholder="الرقم العسكري للزميل">
                <button class="btn-main" style="background:var(--neon);" onclick="startCall()"><i class="fas fa-phone-alt"></i> طلب اتصال</button>
            </div>
        </div>

        <div id="chatSec" class="tab-content" style="display:none; height:100%;">
            <div id="groupList">
                <button class="btn-main" style="margin-bottom:10px;" onclick="openChat('المجموعة المشتركة')">المجموعة المشتركة</button>
            </div>
            <div id="activeChat" style="display:none; flex-direction:column; height:100%;">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <strong id="currentGroupName"></strong>
                    <button onclick="backToGroups()" style="background:none; color:white; border:1px solid #444;">رجوع</button>
                </div>
                <div id="chatBox" class="chat-box"></div>
                <div style="display:flex; padding:10px; gap:5px;">
                    <input type="text" id="msgInput" placeholder="رسالة..." style="flex:1; margin:0;">
                    <button onclick="sendMsg()" style="width:50px; background:none; color:var(--neon); border:none;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-house-user"></i></div>
        <div class="nav-item" onclick="switchTab('call', this)"><i class="fas fa-phone-volume"></i></div>
        <div class="nav-item" onclick="switchTab('chat', this)"><i class="fas fa-tower-broadcast"></i></div>
        <div class="nav-item" onclick="switchTab('settings', this)"><i class="fas fa-user-cog"></i></div>
    </div>
</div>

        "105364": { rank: "شرطي أول", name: "فهد سعيد كشيش" },
        "105869": { rank: "شرطي أول", name: "حسن علي درويش الرئيسي" }
    };

    let currentUser = "";
    let callTimerInterval;

    function login() {
        let id = document.getElementById('milId').value.trim();
        if(personnelDB[id]) { currentUser = id; localStorage.setItem('session_user', id); showMainApp(); listenForCalls(); }
    }

    function showMainApp() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('userDisplay').innerText = personnelDB[currentUser].rank + " / " + personnelDB[currentUser].name;
        document.getElementById('headerImg').src = localStorage.getItem(currentUser + '_photo') || "https://via.placeholder.com/150";
    }

    // --- نظام الاتصال المطور ---
    function startCall() {
        const target = document.getElementById('targetMilId').value;
        if(!target || !personnelDB[target]) return alert("الرقم العسكري غير صحيح!");
        
        const targetData = personnelDB[target];
        document.getElementById('targetNameDisplay').innerText = targetData.rank + " / " + targetData.name;
        document.getElementById('targetImg').src = localStorage.getItem(target + '_photo') || "https://via.placeholder.com/150";
        document.getElementById('callingStatus').style.display = 'flex';

        db.ref('calls/' + target).set({
            callerId: currentUser,
            callerName: personnelDB[currentUser].name,
            callerRank: personnelDB[currentUser].rank,
            callerPhoto: localStorage.getItem(currentUser + '_photo') || "",
            status: 'ringing'
        });

        // مراقبة الرد
        db.ref('calls/' + target + '/status').on('value', snap => {
            if(snap.val() === 'accepted') {
                document.getElementById('callingStatus').style.display = 'none';
                openInCallUI(targetData, target);
            }
        });
    }

    function listenForCalls() {
        db.ref('calls/' + currentUser).on('value', snapshot => {
            const call = snapshot.val();
            if(call && call.status === 'ringing') {
                document.getElementById('incomingCall').style.display = 'flex';
                document.getElementById('callerImg').src = call.callerPhoto || "https://via.placeholder.com/150";
                document.getElementById('callerNameDisplay').innerText = call.callerRank + " / " + call.callerName;
                document.getElementById('callerInfoDisplay').innerText = "الرقم العسكري: " + call.callerId;
                document.getElementById('ringtone').play();
            } else if (!call) { endCallLocally(); }
        });
    }

    function acceptCall() {
        db.ref('calls/' + currentUser).update({ status: 'accepted' });
        const callData = personnelDB[currentUser]; // افتراضي للتبسيط
        openInCallUI(callData, currentUser);
    }

    function openInCallUI(data, id) {
        document.getElementById('incomingCall').style.display = 'none';
        document.getElementById('callingStatus').style.display = 'none';
        document.getElementById('inCallUI').style.display = 'flex';
        document.getElementById('activeCallImg').src = localStorage.getItem(id + '_photo') || "https://via.placeholder.com/150";
        document.getElementById('activeCallName').innerText = data.rank + " / " + data.name;
        document.getElementById('activeCallInfo').innerText = "الرقم العسكري: " + id;
        document.getElementById('ringtone').pause();
        startCallTimer();
    }

    function startCallTimer() {
        let sec = 0;
        clearInterval(callTimerInterval);
        callTimerInterval = setInterval(() => {
            sec++;
            let m = Math.floor(sec/60), s = sec%60;
            document.getElementById('callDuration').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);
    }

    function endCall() {
        db.ref('calls/' + currentUser).remove();
        let target = document.getElementById('targetMilId').value;
        if(target) db.ref('calls/' + target).remove();
        endCallLocally();
    }

    function endCallLocally() {
        document.getElementById('incomingCall').style.display = 'none';
        document.getElementById('callingStatus').style.display = 'none';
        document.getElementById('inCallUI').style.display = 'none';
        document.getElementById('ringtone').pause();
        clearInterval(callTimerInterval);
        document.getElementById('callDuration').innerText = "00:00";
    }

    // --- الملاحة ---
    function switchTab(t, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById(t + 'Sec').style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }
    function logout() { localStorage.removeItem('session_user'); location.reload(); }
</script>
</body>
</html>
