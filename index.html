<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة العمليات الخاصة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #000; --panel: #15191c; --neon: #00ff41; --danger: #ff0000; --tactical: #968c83; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* واجهة المكالمة */
        #callUI { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; }
        #remoteVideo { width: 100%; height: 100%; position: absolute; object-fit: cover; z-index: 10; background: #111; }
        #localVideo { width: 90px; height: 130px; position: absolute; top: 10px; right: 10px; object-fit: cover; z-index: 30; border: 2px solid var(--neon); border-radius: 8px; transform: scaleX(-1); }
        .call-overlay { z-index: 20; position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); }

        /* الرادار المطور */
        .radar-container { display: flex; height: 320px; margin-top: 10px; gap: 5px; direction: ltr; }
        #radarMap { flex: 2.5; border-radius: 10px; border: 1px solid var(--tactical); filter: invert(100%) hue-rotate(180deg); }
        .units-sidebar { flex: 1; background: var(--panel); border-radius: 10px; border: 1px solid #333; overflow-y: auto; padding: 8px; direction: rtl; }
        .unit-row { display: flex; align-items: center; gap: 6px; padding: 6px 0; border-bottom: 1px solid #222; font-size: 10px; font-weight: bold; }
        .dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #fff; }

        /* الشات */
        #mainApp { display: none; height: 100vh; flex-direction: column; }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 100; }
        .tab-content { padding: 15px; flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .chat-box { height: calc(100vh - 350px); overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 12px; }
        .msg { display: flex; gap: 10px; align-items: flex-start; max-width: 95%; }
        .msg-content { background: #1c2126; padding: 10px; border-radius: 12px; border-right: 3px solid var(--tactical); width: 100%; }
        .msg-header { font-size: 11px; margin-bottom: 4px; display: flex; justify-content: space-between; color: var(--neon); }
        .msg-text { font-size: 14px; white-space: pre-wrap; line-height: 1.4; color: #eee; }
        
        .chat-media { max-width: 100%; border-radius: 8px; margin-top: 8px; }
        .chat-controls-wrapper { background: #0b0e11; padding: 8px; border-radius: 12px; border: 1px solid #333; }
        .chat-toolbar { display: flex; gap: 15px; padding: 5px 10px; }
        .chat-toolbar i { color: var(--tactical); cursor: pointer; font-size: 18px; }

        /* تسجيل الدخول */
        #loginPage { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0b0e11; border: 1px solid #444; color: #fff; border-radius: 5px; text-align: center; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; background: var(--tactical); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<audio id="ringtone" src="https://www.soundjay.com/phone/sounds/phone-calling-1.mp3" loop></audio>
<audio id="remoteAudio" autoplay></audio>

<div id="loginPage">
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/ar/thumb/f/f6/Sharjah_Police_Logo.svg/1200px-Sharjah_Police_Logo.svg.png" style="width:80px; margin-bottom:10px; background:white; border-radius:50%; padding:5px;">
        <h2>العمليات الخاصة</h2>
        <input type="text" id="milId" placeholder="الرقم العسكري">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn-main" onclick="login()">دخول</button>
    </div>
</div>

<div id="mainApp">
    <div style="padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;">
        <div id="userDisplay" style="font-size: 11px; font-weight: bold;">--</div>
        <button onclick="logout()" style="background: none; border: 1px solid var(--danger); color: var(--danger); font-size: 9px; padding: 2px 8px;">خروج</button>
    </div>

    <div id="homeSec" class="tab-content">
        <div style="background: rgba(0, 255, 65, 0.05); padding: 10px; border-radius: 10px; display: flex; justify-content: space-between;">
            <h3 style="margin:0; font-size:0.8rem;">رادار القوات لايف</h3>
            <span id="onlineCountDisplay" style="color:var(--neon); font-weight:bold;">0</span>
        </div>
        <div class="radar-container">
            <div id="radarMap"></div>
            <div class="units-sidebar" id="unitsList"></div>
        </div>
    </div>

    <div id="chatSec" class="tab-content" style="display: none; padding: 10px;">
        <div id="groupList">
            <button class="btn-main" onclick="openChat('المجموعة المشتركة')">المجموعة المشتركة</button>
            <button id="btn-gSecret" class="btn-main" style="display:none; background: goldenrod; color: #000;" onclick="openChat('رئيس القسم')">شات رئيس القسم 🔒</button>
        </div>
        <div id="activeChat" style="display: none; flex-direction: column;">
            <div id="chatBox" class="chat-box"></div>
            <div class="chat-controls-wrapper">
                <div class="chat-toolbar">
                    <label for="mediaFile"><i class="fas fa-camera"></i></label>
                    <label for="mediaVideo"><i class="fas fa-video"></i></label>
                    <input type="file" id="mediaFile" hidden accept="image/*" onchange="uploadMedia(this, 'image')">
                    <input type="file" id="mediaVideo" hidden accept="video/*" onchange="uploadMedia(this, 'video')">
                </div>
                <div style="display: flex; gap: 5px;">
                    <textarea id="msgInput" placeholder="اكتب..."></textarea>
                    <button class="btn-main" style="width: 50px; margin: 0;" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
            <button onclick="backToGroups()" class="btn-main" style="margin-top:10px;">رجوع</button>
        </div>
    </div>

    <div id="callSec" class="tab-content" style="display: none;">
        <div style="background: var(--panel); padding: 25px; border-radius: 15px; text-align: center;">
            <h3>اتصال لاسلكي مرئي</h3>
            <input type="text" id="targetId" placeholder="رقم العسكري للزميل">
            <button class="btn-main" style="background: var(--neon);" onclick="startCall()">اطلب الآن</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="switchTab('chat', this)"><i class="fas fa-comment-dots"></i></div>
        <div class="nav-item" onclick="switchTab('call', this)"><i class="fas fa-phone-volume"></i></div>
    </nav>
</div>

<div id="callUI">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="call-overlay">
        <h2 id="peerName">--</h2>
        <div class="call-btns">
            <button id="acceptBtn" class="btn-call accept" onclick="handleAccept()"><i class="fas fa-phone"></i></button>
            <button class="btn-call reject" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    // تهيئة Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCWP-8J8GoZDl-0u22ArnZ1F4QdrY6_EbY",
        authDomain: "al-amaliat-system.firebaseapp.com",
        projectId: "al-amaliat-system",
        storageBucket: "al-amaliat-system.firebasestorage.app",
        messagingSenderId: "970481180924",
        appId: "1:970481180924:web:4966d13c0ec48b8a3db779"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // القائمة الكاملة
    const personnelDB = {
        "1321": { rank: "رائد", name: "مبارك محمد عبدالله" },
        "1408": { rank: "رائد", name: "محمد عبدالله المهيري" },
        "1549": { rank: "نقيب", name: "راشد احمد عبدالرحمن" },
        "1565": { rank: "نقيب", name: "طلال حسن شهيل" },
        "1587": { rank: "نقيب", name: "محمد علي الدرمكي" },
        "105042": { rank: "شرطي أول", name: "أحمد حمدان الطنيجي" },
        "105869": { rank: "شرطي أول", name: "حسن علي الرئيسي" }
        // أضف الباقي هنا...
    };

    let currentUser = "", map, markers = {}, localStream, currentCallRefId;
    const colors = ["#00ff41", "#ff0000", "#007bff", "#ffeb3b", "#e91e63", "#9c27b0", "#00bcd4", "#ff9800"];

    function login() {
        let id = document.getElementById('milId').value.trim();
        let pass = document.getElementById('pass').value.trim();
        if(personnelDB[id] && pass === "SHJ@123") {
            currentUser = id;
            localStorage.setItem('session_user', id);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            startApp();
        } else {
            alert("خطأ في البيانات");
        }
    }

    function startApp() {
        document.getElementById('userDisplay').innerText = `${personnelDB[currentUser].rank} / ${personnelDB[currentUser].name}`;
        
        // طلب إذن الموقع والكاميرا بشكل تدريجي لمنع الشاشة السوداء
        initRadar();
        openChat('المجموعة المشتركة');
        listenForCalls();

        // فحص صلاحيات رئيس القسم
        db.ref('users_groups/'+currentUser).on('value', s => {
            if(s.val() && s.val()['رئيس القسم']) document.getElementById('btn-gSecret').style.display='block';
        });

        // تشغيل الميديا في الخلفية عند الحاجة
        navigator.mediaDevices.getUserMedia({audio:true, video:true}).then(s => {
            localStream = s;
            document.getElementById('localVideo').srcObject = s;
        }).catch(e => console.log("Media blocked or not found"));
    }

    function initRadar() {
        if(!map) {
            map = L.map('radarMap').setView([25.3462, 55.4209], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        navigator.geolocation.watchPosition(pos => {
            db.ref('online_users/' + currentUser).set({
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                name: personnelDB[currentUser].name,
                color: colors[parseInt(currentUser)%8]
            });
        }, null, {enableHighAccuracy: true});

        db.ref('online_users').on('value', snap => {
            const data = snap.val() || {};
            const list = document.getElementById('unitsList');
            list.innerHTML = "";
            document.getElementById('onlineCountDisplay').innerText = Object.keys(data).length;

            for(let id in markers) { if(!data[id]) { map.removeLayer(markers[id]); delete markers[id]; } }

            for(let id in data) {
                const u = data[id];
                list.innerHTML += `<div class="unit-row"><div class="dot" style="background:${u.color}"></div><span>${u.name}</span></div>`;
                if(markers[id]) {
                    markers[id].setLatLng([u.lat, u.lng]);
                } else {
                    markers[id] = L.circleMarker([u.lat, u.lng], { radius: 7, fillColor: u.color, color: "#fff", weight: 2, fillOpacity: 1 }).addTo(map);
                }
            }
        });
    }

    function openChat(n) {
        document.getElementById('groupList').style.display='none';
        document.getElementById('activeChat').style.display='flex';
        document.getElementById('currentGroupName').innerText = n;
        db.ref('chats/'+n).on('value', snap => {
            const box = document.getElementById('chatBox');
            box.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                let media = m.type==='image' ? `<img src="${m.url}" class="chat-media">` : m.type==='video' ? `<video src="${m.url}" class="chat-media" controls></video>` : "";
                box.innerHTML += `<div class="msg"><div class="msg-content"><div class="msg-header"><span>${m.rank} / ${m.name}</span></div><div class="msg-text">${m.text||""}</div>${media}</div></div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const val = document.getElementById('msgInput').value.trim();
        if(!val) return;
        db.ref('chats/' + document.getElementById('currentGroupName').innerText).push({
            id: currentUser, rank: personnelDB[currentUser].rank, name: personnelDB[currentUser].name,
            text: val, time: Date.now()
        });
        document.getElementById('msgInput').value = "";
    }

    function uploadMedia(inp, type) {
        const file = inp.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = e => db.ref('chats/' + document.getElementById('currentGroupName').innerText).push({
            id: currentUser, rank: personnelDB[currentUser].rank, name: personnelDB[currentUser].name,
            url: e.target.result, type: type, time: Date.now()
        });
        reader.readAsDataURL(file);
    }

    function startCall() {
        let tid = document.getElementById('targetId').value.trim();
        currentCallRefId = tid;
        document.getElementById('callUI').style.display='block';
        db.ref('calls/'+tid).set({ callerId: currentUser, status:'ringing' });
    }

    function listenForCalls() {
        db.ref('calls/'+currentUser).on('value', s => {
            if(s.val() && s.val().status==='ringing') {
                currentCallRefId = currentUser;
                document.getElementById('callUI').style.display='block';
                document.getElementById('peerName').innerText = s.val().callerId;
                document.getElementById('ringtone').play();
            } else if(!s.val()) {
                endCall();
            }
        });
    }

    function handleAccept() {
        document.getElementById('ringtone').pause();
        db.ref('calls/'+currentUser).update({ status: 'accepted' });
    }

    function endCall() {
        if(currentCallRefId) db.ref('calls/'+currentCallRefId).remove();
        document.getElementById('callUI').style.display='none';
        document.getElementById('ringtone').pause();
        currentCallRefId = "";
    }

    function switchTab(t, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById(t + 'Sec').style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        if(t==='home' && map) setTimeout(()=>map.invalidateSize(), 200);
    }

    function backToGroups() { document.getElementById('groupList').style.display = 'block'; document.getElementById('activeChat').style.display = 'none'; }
    function logout() { db.ref('online_users/'+currentUser).remove(); localStorage.removeItem('session_user'); location.reload(); }
</script>
</body>
</html>
