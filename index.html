<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة العمليات الخاصة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #000; --panel: #15191c; --neon: #00ff41; --danger: #ff0000; --tactical: #968c83; --wait: #ffeb3b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* واجهة المكالمة */
        #callUI { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; }
        #remoteVideo { width: 100%; height: 100%; position: absolute; object-fit: cover; z-index: 10; background: #111; }
        #localVideo { width: 90px; height: 130px; position: absolute; top: 10px; right: 10px; object-fit: cover; z-index: 30; border: 2px solid var(--neon); border-radius: 8px; transform: scaleX(-1); }
        .call-overlay { z-index: 20; position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); }

        /* الرادار */
        .radar-container { display: flex; height: 300px; margin-top: 10px; gap: 5px; }
        #radarMap { flex: 2; border-radius: 10px; border: 1px solid var(--tactical); filter: invert(100%) hue-rotate(180deg); }
        .units-list { flex: 1; background: var(--panel); border-radius: 10px; border: 1px solid #333; overflow-y: auto; padding: 8px; font-size: 10px; }

        /* الطلبات في الصفحة الرئيسية */
        .my-requests { margin-top: 15px; background: #111; padding: 10px; border-radius: 10px; border: 1px solid #222; max-height: 200px; overflow-y: auto; }
        .req-status-card { background: #1c2126; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-right: 4px solid var(--tactical); font-size: 12px; }
        .status-wait { color: var(--wait); }
        .status-ok { color: var(--neon); }
        .status-no { color: var(--danger); }

        /* واجهة الشات والطلبات */
        #mainApp { display: none; height: 100vh; flex-direction: column; }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 100; }
        .tab-content { padding: 15px; flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .chat-box { height: calc(100vh - 320px); overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; }
        .msg { background: #1c2126; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-right: 3px solid var(--tactical); }
        
        /* أزرار رئيس القسم */
        .admin-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-action { flex: 1; padding: 8px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        .btn-main { width: 100%; padding: 12px; background: var(--tactical); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        #loginPage { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: var(--panel); padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #0b0e11; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<audio id="ringtone" src="https://www.soundjay.com/phone/sounds/phone-calling-1.mp3" loop></audio>
<audio id="sirenSound" src="https://www.soundjay.com/mechanical/sounds/alarm-clock-01.mp3" loop></audio>
<audio id="remoteAudio" autoplay></audio>

<div id="loginPage">
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/ar/thumb/f/f6/Sharjah_Police_Logo.svg/1200px-Sharjah_Police_Logo.svg.png" style="width:80px; margin-bottom:10px; background:white; border-radius:50%; padding:5px;">
        <h2 style="color: #fff;">العمليات الخاصة</h2>
        <input type="text" id="milId" placeholder="الرقم العسكري">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn-main" onclick="login()">دخول</button>
    </div>
</div>

<div id="mainApp">
    <div style="padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;">
        <div id="userDisplay" style="font-size: 11px; font-weight: bold;">--</div>
        <button onclick="logout()" style="background: none; border: 1px solid var(--danger); color: var(--danger); font-size: 9px; padding: 2px 8px;">خروج</button>
    </div>

    <div id="homeSec" class="tab-content">
        <div style="background: rgba(0, 255, 65, 0.05); padding: 10px; border-radius: 10px; display: flex; justify-content: space-between;">
            <h3 style="margin:0; font-size:0.8rem;">رادار تعقب القوات لايف</h3>
            <span id="onlineCountDisplay" style="color:var(--neon); font-weight:bold;">0</span>
        </div>
        <div class="radar-container">
            <div id="radarMap"></div>
            <div class="units-list" id="unitsList"></div>
        </div>

        <div class="my-requests">
            <h4 style="margin:0 0 10px 0; font-size: 12px; color: var(--tactical);">📋 حالة طلباتك الإدارية:</h4>
            <div id="myReqList"></div>
        </div>
    </div>

    <div id="chatSec" class="tab-content" style="display: none; padding: 10px;">
        <div id="groupList">
            <button class="btn-main" onclick="openChat('المجموعة المشتركة')">المجموعة المشتركة</button>
            <button id="btn-gSecret" class="btn-main" style="display:none; background: goldenrod; color: black;" onclick="openChat('رئيس القسم')">شات رئيس القسم 🔒</button>
        </div>
        <div id="activeChat" style="display: none; flex-direction: column;">
            <div id="chatBox" class="chat-box"></div>
            <div style="display: flex; gap: 5px;">
                <textarea id="msgInput" placeholder="اكتب..."></textarea>
                <button class="btn-main" style="width: 50px; margin: 0;" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
            <button onclick="backToGroups()" class="btn-main" style="margin-top:10px;">رجوع</button>
        </div>
    </div>

    <div id="reqSec" class="tab-content" style="display: none;">
        <h3>تقديم طلب إداري</h3>
        <div style="background: #1c2126; padding: 15px; border-radius: 10px;">
            <select id="reqType">
                <option value="طلب إجازة سنوية">طلب إجازة سنوية</option>
                <option value="طلب ظرف طارئ">طلب ظرف طارئ</option>
                <option value="بلاغ نقص عتاد">بلاغ نقص عتاد</option>
            </select>
            <textarea id="reqDetails" placeholder="تفاصيل الطلب..." style="height: 100px;"></textarea>
            
            <label style="font-size: 12px; color: var(--tactical);">إرفاق صورة/ملف (اختياري):</label>
            <input type="file" id="reqFile" accept="image/*,.pdf">
            
            <button class="btn-main" style="background: var(--neon); color: black; margin-top: 10px;" onclick="submitRequest()">إرسال الطلب</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item" onclick="switchTab('home', this)"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="switchTab('chat', this)"><i class="fas fa-comment-dots"></i></div>
        <div class="nav-item" onclick="switchTab('req', this)"><i class="fas fa-file-invoice"></i></div>
    </nav>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCWP-8J8GoZDl-0u22ArnZ1F4QdrY6_EbY",
        authDomain: "al-amaliat-system.firebaseapp.com",
        projectId: "al-amaliat-system",
        storageBucket: "al-amaliat-system.firebasestorage.app",
        messagingSenderId: "970481180924",
        appId: "1:970481180924:web:4966d13c0ec48b8a3db779"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const personnelDB = {
        "1321": "مبارك محمد عبدالله", "1408": "محمد عبدالله المهيري", "1549": "راشد احمد عبدالرحمن",
        "105042": "أحمد حمدان الطنيجي", "105869": "حسن علي الرئيسي"
    };

    let currentUser = "", map, markers = {};

    function login() {
        let id = document.getElementById('milId').value.trim();
        if(personnelDB[id] && document.getElementById('pass').value.trim()==="SHJ@123") {
            currentUser = id; localStorage.setItem('session_user', id);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            showMainApp();
        } else alert("خطأ");
    }

    function showMainApp() {
        document.getElementById('userDisplay').innerText = personnelDB[currentUser];
        initRadar(); checkGroups(); listenForMyRequests();
    }

    // --- نظام الطلبات والمرفقات ---
    function submitRequest() {
        const type = document.getElementById('reqType').value;
        const details = document.getElementById('reqDetails').value.trim();
        const fileInp = document.getElementById('reqFile');
        
        if(!details) return alert("اكتب التفاصيل");

        const sendData = (fileBase64 = null, fileName = null) => {
            const reqRef = db.ref('all_requests').push();
            const reqId = reqRef.key;
            const reqObj = {
                id: reqId,
                senderId: currentUser,
                senderName: personnelDB[currentUser],
                type: type,
                details: details,
                file: fileBase64,
                fileName: fileName,
                status: 'pending',
                time: Date.now()
            };

            // 1. حفظ في سجل الطلبات العام
            reqRef.set(reqObj);

            // 2. إرسال إشعار لشات رئيس القسم
            db.ref('chats/رئيس القسم').push({
                isRequest: true,
                reqId: reqId,
                text: `📥 طلب جديد: ${type}\nمن: ${personnelDB[currentUser]}\nالتفاصيل: ${details}`,
                file: fileBase64,
                status: 'pending',
                time: Date.now()
            });

            alert("تم الإرسال لرئيس القسم");
            document.getElementById('reqDetails').value = "";
            switchTab('home', document.querySelectorAll('.nav-item')[0]);
        };

        if(fileInp.files[0]) {
            const reader = new FileReader();
            reader.onload = e => sendData(e.target.result, fileInp.files[0].name);
            reader.readAsDataURL(fileInp.files[0]);
        } else {
            sendData();
        }
    }

    // --- استلام حالة الطلبات (للصفحة الرئيسية) ---
    function listenForMyRequests() {
        db.ref('all_requests').orderByChild('senderId').equalTo(currentUser).on('value', snap => {
            const list = document.getElementById('myReqList');
            list.innerHTML = "";
            snap.forEach(child => {
                const r = child.val();
                let statusText = r.status === 'pending' ? '⏳ قيد الانتظار' : r.status === 'accepted' ? '✅ تم القبول' : '❌ مرفوض';
                let statusClass = r.status === 'pending' ? 'status-wait' : r.status === 'accepted' ? 'status-ok' : 'status-no';
                let reason = r.rejectReason ? `<br><small style="color:red">السبب: ${r.rejectReason}</small>` : "";

                list.innerHTML += `
                    <div class="req-status-card">
                        <strong>${r.type}</strong> - <span class="${statusClass}">${statusText}</span>
                        ${reason}
                        <div style="font-size:9px; color:#555; margin-top:4px;">${new Date(r.time).toLocaleString()}</div>
                    </div>`;
            });
        });
    }

    // --- شات رئيس القسم (مع أزرار التحكم) ---
    function openChat(n) {
        document.getElementById('groupList').style.display='none'; document.getElementById('activeChat').style.display='flex';
        db.ref('chats/'+n).on('value', snap => {
            const box = document.getElementById('chatBox'); box.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                const key = c.key;
                let html = `<div class="msg"><div style="font-size:10px; color:var(--neon);">${m.name || personnelDB[m.id]}</div><div style="font-size:13px; white-space:pre-wrap;">${m.text}</div>`;
                
                if(m.file) html += `<div style="margin-top:5px;"><a href="${m.file}" target="_blank" style="color:cyan; font-size:11px;">📎 عرض المرفق</a></div>`;

                // إذا كان طلب وفي شات رئيس القسم، تظهر أزرار التحكم
                if(n === 'رئيس القسم' && m.isRequest && m.status === 'pending') {
                    html += `
                    <div class="admin-actions">
                        <button class="btn-action" style="background:var(--neon); color:#000;" onclick="updateReqStatus('${key}', '${m.reqId}', 'accepted')">قبول</button>
                        <button class="btn-action" style="background:var(--danger); color:#fff;" onclick="updateReqStatus('${key}', '${m.reqId}', 'rejected')">رفض</button>
                    </div>`;
                } else if (m.isRequest && m.status !== 'pending') {
                    html += `<div style="margin-top:8px; font-size:11px; color:#777;">(تم اتخاذ إجراء: ${m.status})</div>`;
                }

                html += `</div>`;
                box.innerHTML += html;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function updateReqStatus(msgKey, reqId, newStatus) {
        let reason = "";
        if(newStatus === 'rejected') {
            reason = prompt("اكتب سبب الرفض:");
            if(reason === null) return;
        }

        // تحديث في سجل الطلبات
        db.ref('all_requests/' + reqId).update({ status: newStatus, rejectReason: reason });
        
        // تحديث الرسالة في شات رئيس القسم
        db.ref('chats/رئيس القسم/' + msgKey).update({ status: newStatus });
        
        alert("تم تحديث حالة الطلب");
    }

    // --- الرادار والمجموعات (وظائف أساسية) ---
    function initRadar() {
        if(!map) { map = L.map('radarMap').setView([25.3462, 55.4209], 12); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); }
        navigator.geolocation.watchPosition(pos => {
            db.ref('online_users/' + currentUser).set({ lat: pos.coords.latitude, lng: pos.coords.longitude, name: personnelDB[currentUser], time: Date.now() });
            db.ref('online_users/' + currentUser).onDisconnect().remove();
        }, null, { enableHighAccuracy: true });

        db.ref('online_users').on('value', snap => {
            const data = snap.val() || {};
            document.getElementById('onlineCountDisplay').innerText = Object.keys(data).length;
            for(let id in markers) { if(!data[id]) { map.removeLayer(markers[id]); delete markers[id]; } }
            for(let id in data) {
                const u = data[id];
                if(markers[id]) markers[id].setLatLng([u.lat, u.lng]);
                else markers[id] = L.circleMarker([u.lat, u.lng], { radius: 7, fillColor: "lime", color: "#fff", weight: 2, fillOpacity: 1 }).addTo(map).bindTooltip(u.name, {permanent:true, direction:'top', className:'user-label'}).openTooltip();
            }
        });
    }

    function checkGroups() {
        db.ref('users_groups/' + currentUser).on('value', snap => {
            const acc = snap.val() || {};
            if(acc['رئيس القسم'] || ["1321", "1408", "1549"].includes(currentUser)) document.getElementById('btn-gSecret').style.display = 'block';
        });
    }

    function switchTab(t, el) { 
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none'); 
        document.getElementById(t + 'Sec').style.display = 'block'; 
        if(t==='home' && map) setTimeout(()=>map.invalidateSize(), 200);
    }
    function sendMsg() { const val = document.getElementById('msgInput').value.trim(); if(val) db.ref('chats/المجموعة المشتركة').push({ name: personnelDB[currentUser], text: val, time: Date.now() }); document.getElementById('msgInput').value = ""; }
    function backToGroups() { document.getElementById('groupList').style.display = 'block'; document.getElementById('activeChat').style.display = 'none'; }
    function logout() { db.ref('online_users/'+currentUser).remove(); localStorage.removeItem('session_user'); location.reload(); }
    function manageMember(a) { let t = document.getElementById('targetUser').value; let g = document.getElementById('targetGroupAdmin').value; if(a==='add') db.ref('users_groups/'+t+'/'+g).set(true); else db.ref('users_groups/'+t+'/'+g).remove(); alert("تم"); }
</script>
</body>
</html>
