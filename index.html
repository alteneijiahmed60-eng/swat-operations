<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة العمليات الخاصة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --main: #968c83; --light: #b9b3ad; --bg: #000; --panel: #111; --danger: #ff0000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* تسجيل الدخول */
        #loginPage { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 5000; padding: 20px; }
        .login-box { background: var(--panel); padding: 30px; border: 1px solid var(--main); width: 100%; max-width: 380px; text-align: center; border-radius: 8px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: var(--light); border-radius: 4px; text-align: center; outline: none; }
        .btn-main { background: var(--main); color: #000; padding: 12px; border: none; font-weight: bold; cursor: pointer; width: 100%; border-radius: 4px; }

        /* الهيدر */
        .app-header { padding: 12px 15px; background: var(--panel); border-bottom: 1px solid var(--main); display: flex; justify-content: space-between; align-items: center; }

        /* الرادار والشاشات */
        #mainApp { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .tab-content { flex: 1; overflow-y: auto; padding: 15px; display: none; padding-bottom: 90px; }
        
        .radar-container { display: flex; flex-direction: column; gap: 10px; height: 100%; }
        @media (min-width: 769px) { .radar-container { flex-direction: row; height: 450px; } }
        #radarMap { flex: 2; height: 320px; border: 1px solid var(--main); filter: grayscale(1) invert(1); }
        .units-sidebar { flex: 1; background: var(--panel); border: 1px solid var(--main); overflow-y: auto; padding: 10px; max-height: 350px; }
        .unit-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid #222; font-size: 12px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #fff; }

        /* شاشة الشات المحدثة */
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-box { flex: 1; overflow-y: auto; background: #080808; border: 1px solid var(--main); padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: var(--panel); padding: 10px; border-radius: 8px; border-right: 4px solid var(--main); max-width: 90%; align-self: flex-start; }
        .msg-header { font-size: 11px; color: var(--main); font-weight: bold; margin-bottom: 4px; display: flex; flex-direction: column; }
        .msg-text { font-size: 14px; white-space: pre-wrap; line-height: 1.5; }
        .msg-time { font-size: 9px; color: #555; text-align: left; margin-top: 5px; }
        .chat-media { max-width: 100%; border-radius: 5px; margin-top: 8px; }

        .chat-input-area { background: var(--panel); padding: 10px; border: 1px solid var(--main); border-radius: 8px; margin-top: 5px; }
        .chat-toolbar { display: flex; gap: 15px; padding-bottom: 8px; border-bottom: 1px solid #222; margin-bottom: 8px; }
        .chat-toolbar label { color: var(--main); cursor: pointer; font-size: 18px; }
        .chat-input-row { display: flex; gap: 10px; align-items: flex-end; }
        #msgInput { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 5px; resize: none; min-height: 40px; font-family: inherit; }

        /* التنقل السفلي */
        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--main); z-index: 1000; }
        .nav-item { color: var(--main); font-size: 24px; cursor: pointer; opacity: 0.4; }
        .nav-item.active { opacity: 1; }

        /* واجهة المكالمة */
        #callUI { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; }
        #remoteVideo { width: 100%; height: 100%; position: absolute; object-fit: cover; }
        #localVideo { width: 100px; height: 140px; position: absolute; top: 20px; right: 20px; border: 1px solid var(--main); z-index: 100; transform: scaleX(-1); }
        .call-overlay { position: relative; z-index: 50; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); }

        #audioPermissionUI { display: none; position: fixed; inset: 0; z-index: 10000; background: #000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<audio id="ringtone" src="https://www.soundjay.com/phone/sounds/phone-calling-1.mp3" loop></audio>
<audio id="remoteAudio" autoplay></audio>

<div id="audioPermissionUI">
    <i class="fas fa-shield-alt" style="font-size: 60px; color: var(--main); margin-bottom: 20px;"></i>
    <h2>تأكيد الجاهزية</h2>
    <button class="btn-main" style="width: 200px;" onclick="enableAndStart()">دخول</button>
</div>

<div id="loginPage">
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/ar/thumb/f/f6/Sharjah_Police_Logo.svg/1200px-Sharjah_Police_Logo.svg.png" style="width:80px; margin-bottom:15px; filter: grayscale(1);">
        <h2 style="color: var(--main);">دخول المنظومة</h2>
        <input type="text" id="milId" placeholder="الرقم العسكري">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn-main" onclick="login()">تأكيد الهوية</button>
    </div>
</div>

<div id="mainApp">
    <header class="app-header">
        <div id="userDisplay" style="color: var(--main); font-weight: bold; font-size: 12px;">--</div>
        <button onclick="logout()" style="background:none; border:1px solid var(--danger); color:var(--danger); padding:4px 10px; font-size:10px;">خروج</button>
    </header>

    <div id="homeSec" class="tab-content" style="display: block;">
        <div id="adminPanel" style="display:none; background: #1c2126; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--main);">
            <h4 style="color: var(--main); margin-top:0;">لوحة القيادة</h4>
            <input type="text" id="targetUser" placeholder="رقم العسكري للتوزيع">
            <select id="targetGroupAdmin">
                <option value="المجموعة المشتركة">المجموعة المشتركة</option>
                <option value="المجموعة القتالية الأولى">القتالية الأولى</option>
                <option value="رئيس القسم">شات رئيس القسم</option>
            </select>
            <button class="btn-main" onclick="manageMember('add')">تحديث الصلاحية</button>
            <button class="btn-main" style="background:var(--danger); color:#fff; margin-top:10px;" onclick="triggerRaid()">نداء مداهمة</button>
        </div>

        <div class="radar-container">
            <div id="radarMap"></div>
            <div class="units-sidebar" id="unitsList"></div>
        </div>
    </div>

    <div id="chatSec" class="tab-content">
        <div id="groupList">
            <button class="btn-main" style="margin-bottom:10px;" onclick="openChat('المجموعة المشتركة')">المجموعة المشتركة</button>
            <button id="btn-gSecret" class="btn-main" style="display:none; background: var(--light); color:#000;" onclick="openChat('رئيس القسم')">مكتب رئيس القسم 🔒</button>
        </div>
        <div id="activeChat" style="display:none; height:100%; flex-direction:column;">
            <div id="chatBox" class="chat-box"></div>
            <div class="chat-input-area">
                <div class="chat-toolbar">
                    <label for="mediaFile"><i class="fas fa-camera"></i></label>
                    <label for="mediaVideo"><i class="fas fa-video"></i></label>
                    <input type="file" id="mediaFile" hidden accept="image/*" onchange="uploadMedia(this, 'image')">
                    <input type="file" id="mediaVideo" hidden accept="video/*" onchange="uploadMedia(this, 'video')">
                    <i class="fas fa-file-invoice" onclick="insertRaidTemplate()"></i>
                </div>
                <div class="chat-input-row">
                    <textarea id="msgInput" placeholder="رسالة..."></textarea>
                    <button class="btn-main" style="width:60px;" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
            <button class="btn-main" style="margin-top:10px; background:none; border:1px solid var(--main); color:var(--main);" onclick="backToGroups()">رجوع</button>
        </div>
    </div>

    <div id="callTabSec" class="tab-content">
        <div style="padding:25px; border:1px solid var(--main); text-align:center;">
            <h3>اتصال مرئي مؤمن</h3>
            <input type="text" id="targetId" placeholder="رقم العسكري للزميل">
            <button class="btn-main" style="margin-top:15px;" onclick="startCall()">اطلب الآن</button>
        </div>
    </div>

    <div id="callUI">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="call-overlay">
            <h2 id="peerName">--</h2>
            <button class="btn-main" style="width:80px; background:var(--danger); color:white;" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
            <button id="acceptBtn" class="btn-main" style="width:80px; margin-top:10px;" onclick="handleAccept()">رد</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-satellite-dish"></i></div>
        <div class="nav-item" onclick="switchTab('chat', this)"><i class="fas fa-comment-dots"></i></div>
        <div class="nav-item" onclick="switchTab('callTab', this)"><i class="fas fa-video"></i></div>
    </nav>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCWP-8J8GoZDl-0u22ArnZ1F4QdrY6_EbY",
        authDomain: "al-amaliat-system.firebaseapp.com",
        projectId: "al-amaliat-system",
        storageBucket: "al-amaliat-system.firebasestorage.app",
        messagingSenderId: "970481180924",
        appId: "1:970481180924:web:4966d13c0ec48b8a3db779"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // القائمة الكاملة للأفراد
    const personnelDB = {
        "1321": "مبارك عبدالله", "1408": "محمد المهيري", "1549": "راشد عبدالرحمن",
        "1565": "طلال شهيل", "1886": "صالح غريب", "105042": "أحمد الطنيجي", "105869": "حسن الرئيسي"
    };

    let currentUser = "", map, markers = {}, localStream, peerConnection, currentCallRefId;
    const colors = ["#968c83", "#b9b3ad", "#ffffff", "#888888", "#555555"];

    function login() {
        let id = document.getElementById('milId').value.trim();
        if(personnelDB[id] && document.getElementById('pass').value.trim()==="SHJ@123") {
            currentUser = id; localStorage.setItem('session_user', id);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('audioPermissionUI').style.display = 'flex';
        } else alert("خطأ");
    }

    async function enableAndStart() {
        try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true }); document.getElementById('localVideo').srcObject = localStream; } catch(e){}
        document.getElementById('audioPermissionUI').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        initApp();
    }

    function initApp() {
        document.getElementById('userDisplay').innerText = personnelDB[currentUser];
        if(["1321", "1408", "1549"].includes(currentUser)) document.getElementById('adminPanel').style.display = 'block';
        initRadar(); listenForCalls(); openChat('المجموعة المشتركة');
        db.ref('users_groups/'+currentUser).on('value', s => { if(s.val() && s.val()['رئيس القسم']) document.getElementById('btn-gSecret').style.display='block'; });
    }

    function initRadar() {
        if(!map) { map = L.map('radarMap').setView([25.3462, 55.4209], 15); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); }
        navigator.geolocation.watchPosition(pos => {
            db.ref('online_users/' + currentUser).set({ lat: pos.coords.latitude, lng: pos.coords.longitude, name: personnelDB[currentUser], color: colors[parseInt(currentUser)%5] });
        }, null, { enableHighAccuracy: true, maximumAge: 0 });

        db.ref('online_users').on('value', snap => {
            const data = snap.val() || {};
            const list = document.getElementById('unitsList'); list.innerHTML = "";
            for(let id in markers) { if(!data[id]) { map.removeLayer(markers[id]); delete markers[id]; } }
            for(let id in data) {
                const u = data[id];
                list.innerHTML += `<div class="unit-row"><div class="dot" style="background:${u.color}"></div><span>${u.name}</span></div>`;
                if(markers[id]) markers[id].setLatLng([u.lat, u.lng]);
                else markers[id] = L.circleMarker([u.lat, u.lng], { radius: 7, fillColor: u.color, color: "#fff", weight: 1, fillOpacity: 1 }).addTo(map);
            }
        });
    }

    // --- إصلاح الشات ---
    function openChat(n) {
        document.getElementById('groupList').style.display='none'; document.getElementById('activeChat').style.display='flex';
        document.getElementById('currentGroupName').innerText = n;
        db.ref('chats/'+n).on('value', snap => {
            const box = document.getElementById('chatBox'); box.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                let media = m.type==='image' ? `<img src="${m.url}" class="chat-media">` : m.type==='video' ? `<video src="${m.url}" class="chat-media" controls></video>` : "";
                box.innerHTML += `<div class="msg"><div class="msg-header"><span>${m.name}</span><span>${new Date(m.time).toLocaleTimeString()}</span></div><div class="msg-text">${m.text||""}</div>${media}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msgInput');
        const val = inp.value.trim();
        if(!val) return;
        db.ref('chats/' + document.getElementById('currentGroupName').innerText).push({ name: personnelDB[currentUser], text: val, time: Date.now() });
        inp.value = "";
    }

    function uploadMedia(inp, type) {
        const file = inp.files[0]; if(!file) return;
        const r = new FileReader(); r.onload = e => db.ref('chats/' + document.getElementById('currentGroupName').innerText).push({ name: personnelDB[currentUser], url: e.target.result, type: type, time: Date.now() });
        r.readAsDataURL(file);
    }

    // --- الاتصال ---
    function startCall() {
        let tid = document.getElementById('targetId').value.trim();
        currentCallRefId = tid; document.getElementById('callUI').style.display='block';
        db.ref('calls/'+tid).set({ callerId: currentUser, status:'ringing' });
    }
    function listenForCalls() { db.ref('calls/'+currentUser).on('value', s => { if(s.val() && s.val().status==='ringing') { currentCallRefId=currentUser; document.getElementById('callUI').style.display='block'; document.getElementById('peerName').innerText = s.val().callerId; document.getElementById('ringtone').play(); } else if(!s.val()) endCall(); }); }
    function handleAccept() { document.getElementById('ringtone').pause(); db.ref('calls/'+currentUser).update({ status: 'accepted' }); }
    function endCall() { if(currentCallRefId) db.ref('calls/'+currentCallRefId).remove(); document.getElementById('callUI').style.display='none'; document.getElementById('ringtone').pause(); currentCallRefId=""; }
    
    function switchTab(t, el) { 
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none'); 
        document.getElementById(t + 'Sec').style.display = 'block'; 
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); 
        if(t==='home' && map) setTimeout(()=>map.invalidateSize(), 200);
    }
    function backToGroups() { document.getElementById('groupList').style.display='block'; document.getElementById('activeChat').style.display='none'; }
    function triggerRaid() { db.ref('alerts/raid').push({ by: personnelDB[currentUser], time: Date.now() }); }
    function manageMember(a) { db.ref('users_groups/'+document.getElementById('targetUser').value.trim()+'/'+document.getElementById('targetGroupAdmin').value).set(a==='add'?true:null); alert("تم التحديث"); }
    function logout() { db.ref('online_users/'+currentUser).remove(); localStorage.removeItem('session_user'); location.reload(); }
    function insertRaidTemplate() { document.getElementById('msgInput').value = "الموضوع : مداهمة\nالتحرك : ( )\nالمنطقة : ( )\nبدأ المداهمة: ( )\nعدد الرجال : ( )"; }
</script>
</body>
</html>
