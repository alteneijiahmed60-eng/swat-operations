<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --panel: #15191c; --neon: #00ff41; --danger: #ff0000; --tactical: #968c83; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* واجهة المكالمة الموحدة */
        #callUI { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .call-img { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--neon); object-fit: cover; margin-bottom: 20px; box-shadow: 0 0 15px var(--neon); }
        .call-info h2 { margin: 10px 0; font-size: 1.4rem; }
        .call-info p { margin: 2px 0; color: var(--tactical); }
        .timer { font-size: 2.8rem; color: var(--neon); font-family: monospace; margin: 25px 0; }
        
        .pulse { width: 70px; height: 70px; background: var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; color: #000; animation: pulse-anim 1.5s infinite; margin-bottom: 20px; }
        @keyframes pulse-anim { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); } 70% { box-shadow: 0 0 0 25px rgba(0, 255, 65, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); } }

        .call-btns { display: flex; gap: 35px; margin-top: 20px; }
        .btn-call { width: 75px; height: 75px; border-radius: 50%; border: none; cursor: pointer; font-size: 25px; display: flex; align-items: center; justify-content: center; }
        .accept { background: var(--neon); color: #000; }
        .reject { background: var(--danger); color: #fff; }

        /* تسجيل الدخول والواجهة - تم التعديل حسب طلبك */
        #loginPage { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 15px; width: 85%; max-width: 380px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #0b0e11; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; text-align: center; }
        .btn-main { width: 100%; padding: 12px; background: var(--tactical); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #mainApp { display: none; height: 100vh; flex-direction: column; }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-item { color: #555; font-size: 22px; cursor: pointer; }
        .nav-item.active { color: var(--neon); }
        .tab-content { padding: 15px; flex: 1; overflow-y: auto; }
        
        .chat-box { height: calc(100vh - 280px); overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; border: 1px solid #333; margin-bottom: 10px; }
        .msg { background: #1c2126; padding: 10px; border-radius: 10px; margin-bottom: 12px; display: flex; gap: 10px; border-right: 3px solid var(--tactical); }
        .msg img { width: 35px; height: 35px; border-radius: 50%; }
    </style>
</head>

    function login() {

    // --- نظام الاتصال (WebRTC) ---
    async function startCall() {
        let tid = document.getElementById('targetId').value.trim();
        if(!personnelDB[tid] || tid === currentUser) return alert("الرقم خطأ أو غير صالح");

        setupCallUI(tid, 'calling');

        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        peerConnection = new RTCPeerConnection(servers);

        peerConnection.ontrack = e => {
            document.getElementById('remoteAudio').srcObject = e.streams[0];
        };

        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

        peerConnection.onicecandidate = e => {
            if(e.candidate) db.ref(`calls/${tid}/callerCandidates`).push(e.candidate.toJSON());
        };

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);

        db.ref('calls/' + tid).set({
            offer: { type: offer.type, sdp: offer.sdp },
            callerId: currentUser,
            status: 'ringing'
        });

        db.ref(`calls/${tid}`).on('value', async snap => {
            const data = snap.val();
            if(data && data.status === 'accepted' && data.answer && !peerConnection.currentRemoteDescription) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                startActiveCallUI();
            }
        });

        db.ref(`calls/${tid}/receiverCandidates`).on('child_added', snap => {
            peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
        });
    }

    function listenForCalls() {
        db.ref('calls/' + currentUser).on('value', async snap => {
            const data = snap.val();
            if(data && data.status === 'ringing') {
                setupCallUI(data.callerId, 'incoming');
                document.getElementById('ringtone').play();
            } else if (!data) { hideCallUI(); }
        });
    }

    async function handleAccept() {
        document.getElementById('ringtone').pause();
        const snap = await db.ref('calls/' + currentUser).get();
        const data = snap.val();

        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        peerConnection = new RTCPeerConnection(servers);
        
        peerConnection.ontrack = e => {
            document.getElementById('remoteAudio').srcObject = e.streams[0];
        };

        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

        peerConnection.onicecandidate = e => {
            if(e.candidate) db.ref(`calls/${currentUser}/receiverCandidates`).push(e.candidate.toJSON());
        };

        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        await db.ref('calls/' + currentUser).update({
            answer: { type: answer.type, sdp: answer.sdp },
            status: 'accepted'
        });

        db.ref(`calls/${currentUser}/callerCandidates`).on('child_added', snap => {
            peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
        });

        startActiveCallUI();
    }

    function setupCallUI(id, type) {
        document.getElementById('callUI').style.display = 'flex';
        document.getElementById('peerImg').src = localStorage.getItem(id + '_photo') || "https://via.placeholder.com/150";
        document.getElementById('peerName').innerText = personnelDB[id].name;
        document.getElementById('peerRank').innerText = personnelDB[id].rank;
        document.getElementById('peerMilId').innerText = "الرقم العسكري: " + id;
        
        if(type === 'incoming') {
            document.getElementById('acceptBtn').style.display = 'flex';
            document.getElementById('callStatusText').innerText = "بلاغ اتصال وارد...";
        } else {
            document.getElementById('acceptBtn').style.display = 'none';
            document.getElementById('callStatusText').innerText = "جاري تأمين الخط...";
        }
    }

    function startActiveCallUI() {
        document.getElementById('callStatusText').innerText = "خط اتصال آمن";
        document.getElementById('acceptBtn').style.display = 'none';
        document.getElementById('activeCallTimer').style.display = 'block';
        
        let sec = 0;
        clearInterval(callTimer);
        callTimer = setInterval(() => {
            sec++;
            let m = Math.floor(sec/60), s = sec%60;
            document.getElementById('activeCallTimer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);
    }

    function endCall() {
        db.ref('calls/' + currentUser).remove();
        let tid = document.getElementById('targetId').value.trim();
        if(tid) db.ref('calls/' + tid).remove();
        hideCallUI();
    }

    function hideCallUI() {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        if(peerConnection) peerConnection.close();
        document.getElementById('callUI').style.display = 'none';
        document.getElementById('activeCallTimer').style.display = 'none';
        document.getElementById('ringtone').pause();
        clearInterval(callTimer);
    }

    // --- الشات ---
    function openChat(n) {
        document.getElementById('groupList').style.display = 'none';
        document.getElementById('activeChat').style.display = 'flex';
        document.getElementById('currentGroupName').innerText = n;
        db.ref('chats/' + n).on('value', snap => {
            const box = document.getElementById('chatBox'); box.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                box.innerHTML += `<div class="msg"><img src="${m.photo || 'https://via.placeholder.com/150'}"><div><div style="color:var(--neon); font-size:10px;">${m.rank} / ${m.name}</div><div>${m.text}</div></div></div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msgInput'); if(!inp.value.trim()) return;
        db.ref('chats/' + document.getElementById('currentGroupName').innerText).push({
            name: personnelDB[currentUser].name, rank: personnelDB[currentUser].rank,
            text: inp.value, photo: localStorage.getItem(currentUser + '_photo') || ""
        });
        inp.value = "";
    }

    function backToGroups() { document.getElementById('groupList').style.display = 'block'; document.getElementById('activeChat').style.display = 'none'; }
    function switchTab(t, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById(t + 'Sec').style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
    function logout() { localStorage.removeItem('session_user'); location.reload(); }
    
    window.onload = function() {
        let saved = localStorage.getItem('session_user');
        if (saved && personnelDB[saved]) { currentUser = saved; showMainApp(); }
    };
</script>
</body>
</html>
