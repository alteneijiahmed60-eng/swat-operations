<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة العمليات الخاصة</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0b0e11; --panel: #15191c; 
            --tactical-dark: #968c83; --tactical-light: #b9b3ad; 
            --neon: #00ff41; --danger: #ff0000; 
        }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* شاشات الاتصال */
        #incomingCall { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
        .call-anim { width: 100px; height: 100px; border-radius: 50%; background: var(--neon); animation: pulse 1.5s infinite; display: flex; align-items: center; justify-content: center; font-size: 40px; color: black; margin-bottom: 20px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); } 70% { box-shadow: 0 0 0 30px rgba(0, 255, 65, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); } }

        /* تسجيل الدخول */
        #loginPage { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: var(--panel); padding: 25px; border-radius: 15px; width: 85%; max-width: 380px; text-align: center; border: 1px solid var(--tactical-dark); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #0b0e11; border: 1px solid var(--tactical-dark); color: var(--tactical-light); border-radius: 5px; box-sizing: border-box; text-align: center; }

        #mainApp { display: none; height: 100vh; flex-direction: column; }
        .header { background: var(--panel); padding: 10px 20px; border-bottom: 2px solid var(--tactical-dark); display: flex; justify-content: space-between; align-items: center; }
        .header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--tactical-light); }

        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .chat-container { display: none; flex-direction: column; height: 100%; }
        .chat-box { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; border: 1px solid var(--tactical-dark); }
        
        /* الرسائل */
        .msg { background: #1c2126; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: flex; gap: 12px; border-right: 4px solid var(--tactical-dark); }
        .msg-sender-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid var(--tactical-light); }
        .msg-name { color: var(--neon); font-weight: bold; font-size: 13px; }
        .msg-info { font-size: 11px; color: var(--tactical-light); margin-bottom: 5px; }
        .chat-img { max-width: 100%; border-radius: 8px; margin-top: 8px; }

        .input-area { display: flex; gap: 8px; background: var(--panel); padding: 10px; border-top: 1px solid #333; }
        .btn-main { background: var(--tactical-dark); color: black; font-weight: bold; width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; }
        .btn-danger { background: var(--danger); color: white; }

        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--tactical-dark); }
        .nav-item { color: #555; font-size: 24px; cursor: pointer; }
        .nav-item.active { color: var(--tactical-light); }
    </style>
</head>
<body>

    <div class="call-anim"><i class="fas fa-phone-alt"></i></div>
    <h2 id="callerName">--</h2>
    <p id="callTypeText">مكالمة تكتيكية واردة</p>
    <div style="display:flex; gap:20px; margin-top:30px;">
        <button class="btn-main" style="background:var(--neon); width:70px; height:70px; border-radius:50%;" onclick="acceptCall()"><i class="fas fa-video"></i></button>
        <button class="btn-main" style="background:var(--danger); width:70px; height:70px; border-radius:50%;" onclick="rejectCall()"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<div id="loginPage">
    <div class="login-box">

            </div>
            
            <div style="text-align:center;">
                <div id="timer" style="font-size:2.5rem; color:var(--neon); margin:20px 0;">00:00:00</div>

            </div>
        </div>

        <div id="callSec" class="tab-content" style="display:none;">
            <div style="background:var(--panel); padding:20px; border-radius:15px; border:1px solid #333;">
                <h3>اتصال عسكري</h3>
                <input type="number" id="targetMilId" placeholder="الرقم العسكري للمستلم">
                <div style="display:flex; gap:10px;">
                    <button class="btn-main" onclick="startCall('voice')"><i class="fas fa-phone"></i> صوتي</button>
                    <button class="btn-main" style="background:var(--neon);" onclick="startCall('video')"><i class="fas fa-video"></i> فيديو</button>
                </div>
            </div>
        </div>

        <div id="chatSec" class="tab-content" style="display:none; height:100%;">
            <div id="groupList">
                <button class="btn-main" style="margin-bottom:10px;" onclick="openChat('المجموعة المشتركة')">المجموعة المشتركة</button>
                <button id="btn-g1" class="btn-main" style="display:none; margin-bottom:10px;" onclick="openChat('المجموعة القتالية الأولى')">القتالية الأولى</button>
                <button id="btn-g2" class="btn-main" style="display:none; margin-bottom:10px;" onclick="openChat('المجموعة القتالية الثانية')">القتالية الثانية</button>
                <button id="btn-g3" class="btn-main" style="display:none; margin-bottom:10px;" onclick="openChat('المجموعة القتالية الثالثة')">القتالية الثالثة</button>
                <button id="btn-g4" class="btn-main" style="display:none; margin-bottom:10px;" onclick="openChat('قلم القوة')">قلم القوة</button>
            </div>

            <div id="activeChat" class="chat-container">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <strong id="currentGroupName"></strong>
                    <button onclick="backToGroups()">رجوع</button>
                </div>
                <div id="chatBox" class="chat-box"></div>
                <div class="input-area">
                    <input type="file" id="fileInp" style="display:none;" onchange="handleFile(this)">
                    <button onclick="document.getElementById('fileInp').click()"><i class="fas fa-paperclip"></i></button>
                    <input type="text" id="msgInput" placeholder="بلاغ...">
                    <button onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-house-user"></i></div>
        <div class="nav-item" onclick="switchTab('call', this)"><i class="fas fa-phone-volume"></i></div>
        <div class="nav-item" onclick="switchTab('chat', this)"><i class="fas fa-tower-broadcast"></i></div>
    </div>
</div>

    let currentUser = "";
    let currentGroup = "المجموعة المشتركة";

    window.onload = function() {
        let saved = localStorage.getItem('session_user');
        if (saved && personnelDB[saved]) {
            currentUser = saved; showMainApp(); listenForCalls();
        }
        const sel = document.getElementById('targetUser');
        Object.keys(personnelDB).sort().forEach(id => {
            let o = document.createElement('option'); o.value = id; o.innerText = id + " - " + personnelDB[id].name;
            sel.appendChild(o);
        });
    };

    function login() {
        let id = document.getElementById('milId').value.trim();
        if(personnelDB[id]) { currentUser = id; localStorage.setItem('session_user', id); showMainApp(); listenForCalls(); }
    }

    function showMainApp() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        if(["1321", "1408", "1549"].includes(currentUser)) document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('userDisplay').innerText = personnelDB[currentUser].rank + " / " + personnelDB[currentUser].name;
        document.getElementById('headerImg').src = localStorage.getItem(currentUser + '_photo') || "https://via.placeholder.com/150";
    }

    function openChat(n) {
        currentGroup = n;
        document.getElementById('groupList').style.display = 'none';
        document.getElementById('activeChat').style.display = 'flex';
        document.getElementById('currentGroupName').innerText = n;
        db.ref('chats/' + currentGroup).on('value', (snapshot) => {
            const box = document.getElementById('chatBox'); box.innerHTML = "";
            snapshot.forEach((child) => {
                const m = child.val();
                box.innerHTML += `
                    <div class="msg">
                        <img src="${m.photo || 'https://via.placeholder.com/150'}" class="msg-sender-img">
                        <div>
                            <div class="msg-name">${m.rank} / ${m.name}</div>
                            <div class="msg-info">الرقم العسكري: ${m.id}</div>
                            <div>${m.text}</div>
                        </div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msgInput');
        if(!inp.value.trim()) return;
        const p = personnelDB[currentUser];
        db.ref('chats/' + currentGroup).push({
            id: currentUser, name: p.name, rank: p.rank,
            text: inp.value, photo: localStorage.getItem(currentUser + '_photo') || "",
            time: Date.now()
        });
        inp.value = "";
    }

    function startCall(type) {
        let target = document.getElementById('targetMilId').value;
        if(!target || !personnelDB[target]) return alert("الرقم خاطئ!");
        db.ref('calls/' + target).set({ callerName: personnelDB[currentUser].name, type: type, status: 'ringing' });
        alert("جاري الاتصال...");
    }

    function listenForCalls() {
        db.ref('calls/' + currentUser).on('value', (snapshot) => {
            const call = snapshot.val();
            if(call && call.status === 'ringing') {
                document.getElementById('incomingCall').style.display = 'flex';
                document.getElementById('callerName').innerText = call.callerName;
                document.getElementById('ringtone').play();
            } else if (!call) { document.getElementById('incomingCall').style.display = 'none'; document.getElementById('ringtone').pause(); }
        });
    }

    function rejectCall() { db.ref('calls/' + currentUser).remove(); }
    function clearFullChat() { let g = document.getElementById('targetGroupAdmin').value; if(confirm("مسح؟")) db.ref('chats/' + g).remove(); }
    function backToGroups() { document.getElementById('groupList').style.display = 'block'; document.getElementById('activeChat').style.display = 'none'; db.ref('chats/' + currentGroup).off(); }
    function switchTab(t, el) { 
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none'); 
        document.getElementById(t + 'Sec').style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active');
    }
    function logout() { localStorage.removeItem('session_user'); location.reload(); }
