<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة العمليات الخاصة</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --panel: #15191c; --neon: #00ff41; --danger: #ff0000; --tactical: #968c83; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* واجهة المكالمة الموحدة */
        #callUI { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .call-img { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--neon); object-fit: cover; margin-bottom: 20px; box-shadow: 0 0 15px var(--neon); }
        .call-info h2 { margin: 10px 0; font-size: 1.4rem; }
        .call-info p { margin: 2px 0; color: var(--tactical); }
        .timer { font-size: 2.8rem; color: var(--neon); font-family: monospace; margin: 25px 0; }
        
        .pulse { width: 70px; height: 70px; background: var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; color: #000; animation: pulse-anim 1.5s infinite; margin-bottom: 20px; }
        @keyframes pulse-anim { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); } 70% { box-shadow: 0 0 0 25px rgba(0, 255, 65, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); } }

        .call-btns { display: flex; gap: 35px; margin-top: 20px; }
        .btn-call { width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; font-size: 25px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .accept { background: var(--neon); color: #000; }
        .reject { background: var(--danger); color: #fff; }

        /* تسجيل الدخول والواجهة */
        #loginPage { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 15px; width: 85%; max-width: 380px; text-align: center; border: 1px solid var(--tactical); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--tactical); color: #fff; border-radius: 8px; text-align: center; }
        .btn-main { width: 100%; padding: 12px; background: var(--tactical); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #mainApp { display: none; height: 100vh; flex-direction: column; }
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .chat-box { height: calc(100vh - 280px); overflow-y: auto; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 10px; }
        .msg { background: #1c2126; padding: 10px; border-radius: 10px; margin-bottom: 12px; display: flex; gap: 10px; border-right: 3px solid var(--tactical); }
        .msg img { width: 35px; height: 35px; border-radius: 50%; }

        .nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-item { color: #555; font-size: 22px; cursor: pointer; }
        .nav-item.active { color: var(--neon); }
    </style>
</head>
<body>

<audio id="ringtone" src="https://www.soundjay.com/phone/sounds/phone-calling-1.mp3" loop></audio>

<div id="callUI">
    <div id="ringingHeader">
        <div class="pulse" id="statusIcon"><i class="fas fa-phone-alt"></i></div>
        <h3 id="callStatusText" style="color: var(--neon); margin-bottom: 20px;">جاري الاتصال...</h3>
    </div>
    
    <img src="" id="peerImg" class="call-img">
    
    <div class="call-info">
        <h2 id="peerName">--</h2>
        <p id="peerRank">--</p>
        <p id="peerMilId">--</p>
    </div>

    <div id="activeCallTimer" class="timer" style="display: none;">00:00</div>

    <div class="call-btns">
        <button id="acceptBtn" class="btn-call accept" onclick="acceptCall()" style="display: none;"><i class="fas fa-phone"></i></button>
        <button class="btn-call reject" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<div id="loginPage">
    <div class="login-box">
        <img src="logo.png" style="width:90px; margin-bottom:10px;">
        <h2 style="color: var(--neon); margin-bottom: 20px;">العمليات الخاصة</h2>
        <input type="number" id="milId" placeholder="الرقم العسكري">
        <button class="btn-main" onclick="login()">دخول المنظومة</button>
    </div>
</div>

<div id="mainApp">
    <div style="padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;">
        <div id="userDisplay" style="font-size: 12px; font-weight: bold;">--</div>
        <button onclick="logout()" style="background: none; border: 1px solid var(--danger); color: var(--danger); font-size: 10px; padding: 2px 8px; border-radius: 4px;">خروج</button>
    </div>

    <div class="content">
        <div id="homeSec" class="tab-content">
            <div id="adminPanel" style="display:none; background: #1c2126; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-right: 4px solid var(--neon);">
                <h4 style="margin:0 0 10px 0;">لوحة الإدارة</h4>
                <button class="btn-main" style="background: var(--danger); color: #fff;" onclick="clearChat()">مسح دردشة المشترك</button>
            </div>
            <div style="text-align: center; margin-top: 50px;">
                <div id="mainTimer" style="font-size: 3rem; color: var(--neon);">00:00:00</div>
                <p>الحالة: جاهز للعمليات</p>
            </div>
        </div>

        <div id="callSec" class="tab-content" style="display: none;">
            <div style="background: var(--panel); padding: 20px; border-radius: 10px; border: 1px solid var(--tactical);">
                <h3>اتصال عسكري مؤمن</h3>
                <input type="number" id="targetId" placeholder="الرقم العسكري للمستلم">
                <button class="btn-main" style="background: var(--neon);" onclick="startCall()">اطلب الآن</button>
            </div>
        </div>

        <div id="chatSec" class="tab-content" style="display: none; height: 100%;">
            <div id="groupList">
                <button class="btn-main" style="margin-bottom: 10px;" onclick="openChat('المجموعة المشتركة')">المجموعة المشتركة</button>
            </div>
            <div id="activeChat" style="display: none; flex-direction: column; height: 100%;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <strong id="currentGroupName">--</strong>
                    <button onclick="backToGroups()" style="background:none; border: 1px solid #444; color: #fff; padding: 2px 10px; border-radius: 4px;">رجوع</button>
                </div>
                <div id="chatBox" class="chat-box"></div>
                <div style="display: flex; padding: 10px; gap: 5px;">
                    <input type="text" id="msgInput" placeholder="بلاغ..." style="flex: 1; margin: 0;">
                    <button onclick="sendMsg()" style="background: none; border: none; color: var(--neon); font-size: 20px;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="switchTab('call', this)"><i class="fas fa-phone-volume"></i></div>
        <div class="nav-item" onclick="switchTab('chat', this)"><i class="fas fa-tower-broadcast"></i></div>
    </nav>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

        "103778": { rank: "عريف", name: "محمد يونس محمد" },
        "103779": { rank: "عريف", name: "سالم عبدالله محمد" },
        "103787": { rank: "عريف", name: "سالم ثاني مبارك" },
        "104317": { rank: "شرطي أول", name: "محمد طلعان نوبي" },
        "104334": { rank: "شرطي أول", name: "محمد جاسم مطر" },
        "104372": { rank: "شرطي أول", name: "ناصر عبدالله سليمان" },
        "104803": { rank: "شرطي أول", name: "راشد ناصر الزري" },
        "104528": { rank: "شرطي أول", name: "خالد راشد عبدالله" },
        "105042": { rank: "شرطي أول", name: "أحمد حمدان راشد" },
        "105061": { rank: "شرطي أول", name: "عبدالله علي القايدي" },
        "105364": { rank: "شرطي أول", name: "فهد سعيد كشيش" },
        "105869": { rank: "شرطي أول", name: "حسن علي الرئيسي" }
    };

    let currentUser = "";
    let activeCallPeer = "";
    let callTimer;

    function login() {
        let id = document.getElementById('milId').value;
        if(personnelDB[id]) { 
            currentUser = id; 
            localStorage.setItem('session_user', id); 
            showMainApp(); 
        } else { alert("الرقم العسكري غير مسجل!"); }
    }

    function showMainApp() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('userDisplay').innerText = personnelDB[currentUser].rank + " / " + personnelDB[currentUser].name;
        if(["1321", "1408", "1549", "105042"].includes(currentUser)) document.getElementById('adminPanel').style.display = 'block';
        listenForCalls();
    }

    // --- نظام الاتصال الموحد ---
    function startCall() {
        let tid = document.getElementById('targetId').value;
        if(!personnelDB[tid] || tid === currentUser) return alert("الرقم خطأ!");
        
        activeCallPeer = tid;
        updateCallUI(tid, 'calling');

        db.ref('calls/' + tid).set({
            callerId: currentUser,
            callerName: personnelDB[currentUser].name,
            callerRank: personnelDB[currentUser].rank,
            status: 'ringing'
        });

        // مراقبة رد المستلم
        db.ref('calls/' + tid + '/status').on('value', snap => {
            if(snap.val() === 'accepted') {
                activateCallMode();
            }
        });
    }

    function listenForCalls() {
        db.ref('calls/' + currentUser).on('value', snap => {
            const data = snap.val();
            if(data && data.status === 'ringing') {
                activeCallPeer = data.callerId;
                updateCallUI(data.callerId, 'incoming');
                document.getElementById('ringtone').play();
            } else if (!data) {
                resetCallUI();
            }
        });
    }

    function updateCallUI(peerId, type) {
        const peer = personnelDB[peerId];
        document.getElementById('callUI').style.display = 'flex';
        document.getElementById('peerImg').src = localStorage.getItem(peerId + '_photo') || "https://via.placeholder.com/150";
        document.getElementById('peerName').innerText = peer.name;
        document.getElementById('peerRank').innerText = peer.rank;
        document.getElementById('peerMilId').innerText = "الرقم العسكري: " + peerId;
        
        if(type === 'incoming') {
            document.getElementById('acceptBtn').style.display = 'flex';
            document.getElementById('callStatusText').innerText = "مكالمة واردة...";
        } else {
            document.getElementById('acceptBtn').style.display = 'none';
            document.getElementById('callStatusText').innerText = "جاري الاتصال...";
        }
    }

    function acceptCall() {
        // طلب إذن الميكروفون
        navigator.mediaDevices.getUserMedia({ audio: true }).then(() => {
            db.ref('calls/' + currentUser).update({ status: 'accepted' });
            activateCallMode();
        });
    }

    function activateCallMode() {
        document.getElementById('ringtone').pause();
        document.getElementById('ringingHeader').style.display = 'none';
        document.getElementById('acceptBtn').style.display = 'none';
        document.getElementById('activeCallTimer').style.display = 'block';
        
        let sec = 0;
        clearInterval(callTimer);
        callTimer = setInterval(() => {
            sec++;
            let m = Math.floor(sec/60), s = sec%60;
            document.getElementById('activeCallTimer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);
    }

    function endCall() {
        db.ref('calls/' + currentUser).remove();
        if(activeCallPeer) db.ref('calls/' + activeCallPeer).remove();
        resetCallUI();
    }

    function resetCallUI() {
        document.getElementById('callUI').style.display = 'none';
        document.getElementById('ringingHeader').style.display = 'block';
        document.getElementById('activeCallTimer').style.display = 'none';
        document.getElementById('ringtone').pause();
        clearInterval(callTimer);
        document.getElementById('activeCallTimer').innerText = "00:00";
    }

    // --- الشات والإدارة ---
    function openChat(n) {
        document.getElementById('groupList').style.display = 'none';
        document.getElementById('activeChat').style.display = 'flex';
        document.getElementById('currentGroupName').innerText = n;
        db.ref('chats/' + n).on('value', snap => {
            const box = document.getElementById('chatBox'); box.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                box.innerHTML += `<div class="msg"><img src="${m.photo || 'https://via.placeholder.com/150'}"><div><div style="color:var(--neon); font-size:10px;">${m.rank} / ${m.name}</div><div>${m.text}</div></div></div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msgInput'); if(!inp.value.trim()) return;
        db.ref('chats/' + document.getElementById('currentGroupName').innerText).push({
            name: personnelDB[currentUser].name, rank: personnelDB[currentUser].rank,
            text: inp.value, photo: localStorage.getItem(currentUser + '_photo') || ""
        });
        inp.value = "";
    }

    function clearChat() { if(confirm("مسح المشترك؟")) db.ref('chats/المجموعة المشتركة').remove(); }
    function backToGroups() { document.getElementById('groupList').style.display = 'block'; document.getElementById('activeChat').style.display = 'none'; }
    function switchTab(t, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById(t + 'Sec').style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
    function logout() { localStorage.removeItem('session_user'); location.reload(); }

    // فحص الجلسة عند التحميل
    window.onload = function() {
        let saved = localStorage.getItem('session_user');
        if (saved && personnelDB[saved]) { currentUser = saved; showMainApp(); }
    };
</script>
</body>
</html>
