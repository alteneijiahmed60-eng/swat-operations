<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>منظومة العمليات الخاصة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            /* الهوية الجديدة للعمليات الخاصة */
            --bg-color: #080808; 
            --panel-bg: rgba(22, 22, 22, 0.85); 
            --panel-border: rgba(150, 140, 131, 0.15); 
            --primary: #968c83; /* اللون التكتيكي الأساسي */
            --primary-glow: rgba(150, 140, 131, 0.25);
            --secondary: #b9b3ad; /* اللون التكتيكي الثانوي */
            --danger: #d32f2f;
            --danger-glow: rgba(211, 47, 47, 0.2);
            --success: #388e3c;
            --text-main: #f5f5f5;
            --text-muted: #b9b3ad; 
            --glass-blur: blur(20px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #151413 0%, var(--bg-color) 80%);
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        /* Forms & Inputs */
        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--panel-border);
            color: white;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--primary); color: #000; box-shadow: 0 4px 15px var(--primary-glow); }
        .btn-danger { background: var(--danger); color: #fff; box-shadow: 0 4px 15px var(--danger-glow); }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }

        /* Login Page */
        #loginPage {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-color);
            background-image: linear-gradient(45deg, #0a0a0a 0%, #1a1816 100%);
            padding: 20px;
        }
        .login-box { width: 100%; max-width: 400px; padding: 35px 25px; text-align: center; border: 1px solid rgba(150, 140, 131, 0.3);}
        .logo-img { width: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--primary-glow)); }
        
        /* Main App Header */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--panel-border);
            z-index: 100;
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; box-shadow: 0 0 10px var(--primary-glow);}
        
        /* Main Content Area */
        #mainApp { display: none; height: 100vh; flex-direction: column; }
        .tab-content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Home Tab */
        .stats-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--primary);}
        .radar-container { height: 35vh; min-height: 250px; border-radius: 16px; overflow: hidden; border: 1px solid var(--panel-border); margin-bottom: 20px; position: relative;}
        #radarMap { width: 100%; height: 100%; z-index: 1; background: #000; filter: contrast(1.2) brightness(0.9);}
        .leaflet-control-zoom { display: none; }

        /* Admin Panel */
        .admin-panel { border: 2px solid var(--danger); padding: 15px; margin-bottom: 20px; border-radius: 12px; background: rgba(211, 47, 47, 0.05); }

        /* Raid Alert */
        #raidAlertModal {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(211, 47, 47, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            animation: flashAlert 0.8s infinite alternate;
        }
        @keyframes flashAlert { from { background: rgba(211, 47, 47, 0.95); } to { background: rgba(150, 0, 0, 0.95); } }
        .raid-text { font-size: 30px; font-weight: 900; color: white; margin-bottom: 20px; text-shadow: 0 0 15px black; text-align:center;}

        /* Requests List */
        .section-title { font-size: 15px; color: var(--secondary); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; font-weight: bold;}
        .req-card { padding: 15px; margin-bottom: 12px; border-right: 4px solid transparent; } 
        .req-pending { border-right-color: #ffb300; }
        .req-accepted { border-right-color: var(--success); }
        .req-rejected { border-right-color: var(--danger); }
        .req-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .req-time { font-size: 11px; color: var(--text-muted); }
        .req-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: bold; }
        .badge-pending { background: rgba(255, 179, 0, 0.15); color: #ffb300; }
        .badge-accepted { background: rgba(56, 142, 60, 0.15); color: var(--success); }
        .badge-rejected { background: var(--danger-glow); color: var(--danger); }

        /* WhatsApp Style Chat */
        .chat-groups { display: flex; flex-direction: column; gap: 12px; }
        .group-btn { padding: 20px; font-size: 16px; justify-content: flex-start; gap: 15px; border: 1px solid rgba(150, 140, 131, 0.2);}
        .group-btn i { font-size: 24px; width: 40px; height: 40px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:rgba(0,0,0,0.3); }
        
        #activeChat { display: none; height: 100%; flex-direction: column; }
        .chat-header { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; padding-bottom: 15px; border-bottom: 1px solid var(--panel-border); }
        .back-btn { background: rgba(255,255,255,0.05); width:35px; height:35px; border-radius:50%; border: none; color: white; font-size: 18px; cursor: pointer; display:flex; align-items:center; justify-content:center; transition:0.3s;}
        .back-btn:hover { background: rgba(255,255,255,0.1); }

        .chat-messages { 
            flex: 1; overflow-y: auto; padding: 15px 10px; display: flex; flex-direction: column; gap: 15px; 
            margin-bottom: 15px; background: rgba(0,0,0,0.3); border-radius: 16px;
            background-image: radial-gradient(rgba(150, 140, 131, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .msg-bubble { 
            max-width: 90%; padding: 12px 15px; border-radius: 16px; position: relative; 
            word-wrap: break-word; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .msg-mine { 
            background: rgba(150, 140, 131, 0.15); border: 1px solid rgba(150, 140, 131, 0.4); 
            align-self: flex-start; border-top-right-radius: 4px; 
        }
        .msg-other { 
            background: rgba(30, 30, 30, 0.9); border: 1px solid var(--panel-border); 
            align-self: flex-end; border-top-left-radius: 4px; 
        }
        
        .msg-user-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid rgba(255,255,255,0.05); }
        .msg-avatar { width:30px; height:30px; border-radius:50%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--primary); border:1px solid var(--primary-glow); }
        .msg-name-rank { font-size: 13px; font-weight: bold; line-height:1.2; }
        .msg-id { font-size: 10px; color: var(--text-muted); }
        
        .msg-text { line-height: 1.5; }
        .msg-time { font-size: 10px; opacity: 0.6; margin-top: 8px; text-align: left; display:flex; justify-content:flex-end; align-items:center; gap:4px; color:var(--text-muted);}
        
        .chat-input-area { display: flex; gap: 8px; align-items: flex-end; position: relative;}
        .chat-input-area textarea { 
            margin-bottom: 0; flex: 1; height: 50px; min-height: 50px; max-height:120px; 
            resize: none; padding: 14px 20px; border-radius:25px; 
            background: rgba(20, 20, 20, 0.9); border: 1px solid var(--primary-glow);
        }
        .send-btn, .attach-btn { 
            width: 50px; height: 50px; border-radius: 50%; padding: 0; 
            flex-shrink: 0; display:flex; justify-content:center; align-items:center; font-size:18px;
        }
        .attach-btn { border: 1px solid rgba(150, 140, 131, 0.5); color: var(--primary); background: rgba(0, 0, 0, 0.5); }
        .attach-btn:hover { background: var(--primary-glow); }

        #chatFilePreview {
            position: absolute; bottom: 65px; right: 60px; left: 10px;
            background: var(--panel-bg); backdrop-filter: blur(10px);
            padding: 12px; border-radius: 12px; border: 1px solid var(--primary);
            display: none; align-items: center; justify-content: space-between; z-index: 10;
        }

        /* Request Tab */
        .file-upload-wrapper { position: relative; margin-bottom: 15px; }
        .file-upload-input { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .file-upload-display { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; border: 2px dashed rgba(150, 140, 131, 0.4); border-radius: 12px; color: var(--text-muted); transition: all 0.3s; background: rgba(0,0,0,0.2); }
        .file-upload-wrapper:hover .file-upload-display { border-color: var(--primary); background: rgba(150, 140, 131, 0.05); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(150, 140, 131, 0.1);
            display: flex; justify-content: space-around;
            padding: 12px 0 25px 0;
            z-index: 1000;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            color: #666; cursor: pointer; padding: 5px 15px;
            transition: all 0.3s ease; border-radius: 10px;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; transition: transform 0.3s; }
        .nav-item.active i { transform: translateY(-3px); text-shadow: 0 0 10px var(--primary-glow); }
        .nav-item span { font-size: 11px; font-weight: 700; }

        /* Toasts */
        #toastContainer { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px; pointer-events: none; }
        .toast { background: rgba(20,20,20,0.95); backdrop-filter: blur(10px); border: 1px solid var(--panel-border); color: white; padding: 15px 20px; border-radius: 12px; display: flex; align-items: center; gap: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); animation: toastIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); pointer-events: auto; }
        .toast.success { border-right: 4px solid var(--success); }
        .toast.error { border-right: 4px solid var(--danger); }
        .toast.info { border-right: 4px solid var(--primary); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }

        /* Loaders */
        .loader { display: inline-block; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .admin-actions { display: flex; gap: 10px; margin-top: 10px; background: rgba(0,0,0,0.2); padding:10px; border-radius:8px;}
        .admin-actions .btn { padding: 8px; font-size: 12px; }

        .req-reason-text { margin-top: 8px; font-size: 12px; color: #ff8a80; background: rgba(211, 47, 47, 0.15); padding: 8px 10px; border-radius: 6px; border-right: 2px solid var(--danger);}
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(150, 140, 131, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(150, 140, 131, 0.5); }
    </style>
</head>
<body>

<div id="toastContainer"></div>

<!-- Audio Elements -->
<audio id="sirenSound" src="https://www.soundjay.com/mechanical/sounds/alarm-clock-01.mp3" loop></audio>

<!-- Raid Alert Modal -->
<div id="raidAlertModal">
    <i class="fas fa-exclamation-triangle fa-5x" style="color:yellow; margin-bottom: 25px; animation: pulse 1s infinite;"></i>
    <div class="raid-text">إنذار مداهمة طارئ!</div>
    <div id="raidSenderText" style="color:white; margin-bottom: 40px; font-size:20px; font-weight:bold;"></div>
    <button class="btn" onclick="acknowledgeRaid()" style="width: 250px; height: 60px; font-size: 22px; background:white; color:var(--danger); border-radius:30px; box-shadow: 0 0 20px rgba(255,255,255,0.5);">استلام النداء</button>
</div>

<!-- Login Screen -->
<div id="loginPage">
    <div class="login-box glass-panel">
        <img src="https://upload.wikimedia.org/wikipedia/ar/thumb/f/f6/Sharjah_Police_Logo.svg/1200px-Sharjah_Police_Logo.svg.png" class="logo-img" alt="Logo">
        <h2 style="margin-bottom: 5px; font-weight: 700; color: var(--primary);">منظومة العمليات الخاصة</h2>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 30px;">بوابة الدخول الموحدة للأفراد والضباط</p>
        
        <input type="number" id="milId" placeholder="الرقم العسكري" autocomplete="off">
        <input type="password" id="pass" placeholder="كلمة المرور">
        
        <button class="btn btn-primary" onclick="login()" id="loginBtn" style="margin-top: 10px;">
            <span>تسجيل الدخول</span>
        </button>
    </div>
</div>

<!-- Main App -->
<div id="mainApp">
    <header class="app-header">
        <div class="user-info">
            <div class="user-avatar"><i class="fas fa-shield-alt"></i></div>
            <div>
                <div id="userNameDisplay" style="font-size: 14px; font-weight: bold;">--</div>
                <div id="userRankDisplay" style="font-size: 12px; color: var(--primary);">--</div>
            </div>
        </div>
        <button onclick="logout()" style="background: rgba(255,255,255,0.05); border: none; color: var(--text-muted); width:35px; height:35px; border-radius:8px; cursor: pointer; display:flex; align-items:center; justify-content:center;"><i class="fas fa-sign-out-alt"></i></button>
    </header>

    <!-- Home Tab -->
    <div id="homeSec" class="tab-content active">
        
        <!-- Admin Command Panel -->
        <div id="adminPanelSec" style="display:none;">
            <div class="section-title" style="color:var(--danger);"><i class="fas fa-user-shield"></i> لوحة القيادة العليا</div>
            <div class="admin-panel glass-panel">
                <button class="btn btn-danger" onclick="triggerRaidAlert()" style="margin-bottom:20px; font-size:16px; height:55px;">
                    <i class="fas fa-bullhorn fa-lg"></i> إطلاق نداء مداهمة عام للجميع
                </button>
                
                <h4 style="margin-bottom:10px; font-size:14px; color:var(--text-main);"><i class="fas fa-users-cog"></i> إدارة المجموعات القتالية</h4>
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input type="number" id="targetMilId" placeholder="الرقم العسكري للفرد" style="margin-bottom:0; flex:1;">
                    <select id="targetGroup" style="margin-bottom:0; flex:1;">
                        <option value="المجموعة القتالية الأولى">المجموعة القتالية الأولى</option>
                        <option value="المجموعة القتالية الثانية">المجموعة القتالية الثانية</option>
                        <option value="المجموعة القتالية الثالثة">المجموعة القتالية الثالثة</option>
                        <option value="قلم القوة">قلم القوة</option>
                        <option value="رئيس القسم">مكتب رئيس القسم</option>
                    </select>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-primary" onclick="manageGroup('add')" style="flex:1;"><i class="fas fa-plus"></i> إضافة للمجموعة</button>
                    <button class="btn btn-outline" onclick="manageGroup('remove')" style="flex:1; border-color:var(--danger); color:var(--danger);"><i class="fas fa-minus"></i> إزالة</button>
                </div>
            </div>
        </div>

        <div class="stats-card glass-panel">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="width:35px; height:35px; background:rgba(150, 140, 131, 0.15); border-radius:8px; display:flex; align-items:center; justify-content:center;">
                    <i class="fas fa-satellite-dish" style="color: var(--primary); font-size:16px; animation: pulse 2s infinite;"></i>
                </div>
                <span style="font-weight: 700; font-size: 15px;">تتبع القوات المباشر</span>
            </div>
            <div style="background: rgba(0,0,0,0.5); padding: 6px 15px; border-radius: 20px; border: 1px solid var(--panel-border);">
                <i class="fas fa-users" style="font-size: 12px; margin-left: 6px; color:var(--text-muted);"></i>
                <span id="onlineCountDisplay" style="color:var(--primary); font-weight:bold; font-size: 15px;">0</span>
            </div>
        </div>

        <div class="radar-container">
            <div id="radarMap"></div>
        </div>

        <div class="section-title"><i class="fas fa-clipboard-check" style="color:var(--primary);"></i> حالة طلباتي الإدارية</div>
        <div id="myReqList">
            <div style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 30px; background: rgba(0,0,0,0.2); border-radius:12px;">جارِ تحميل الطلبات...</div>
        </div>
    </div>

    <!-- Chat Tab -->
    <div id="chatSec" class="tab-content">
        <div id="groupList" class="chat-groups">
            <button class="btn glass-panel group-btn" onclick="openChat('المجموعة المشتركة', 'fas fa-users')">
                <i class="fas fa-users" style="color: var(--primary);"></i>
                <div style="text-align:right;">
                    <div style="font-weight:bold; font-size:15px;">المجموعة المشتركة</div>
                    <div style="font-size:11px; color:var(--text-muted); margin-top:3px;">مراسلات عامة لكافة القوة</div>
                </div>
            </button>
            <div id="dynamicGroupsContainer"></div>
        </div>

        <div id="activeChat">
            <div class="chat-header">
                <button class="back-btn" onclick="backToGroups()"><i class="fas fa-arrow-right"></i></button>
                <div style="display:flex; align-items:center; gap:10px; flex:1;">
                    <div style="width:35px; height:35px; background:var(--primary-glow); border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--primary);"><i id="chatHeaderIcon" class="fas fa-users"></i></div>
                    <div>
                        <div id="chatTitle" style="font-weight: bold; font-size: 16px;">--</div>
                        <div style="font-size: 11px; color: var(--success); display:flex; align-items:center; gap:4px;"><span style="width:6px;height:6px;background:var(--success);border-radius:50%;display:inline-block;"></span> متصل - مشفر E2E</div>
                    </div>
                </div>
                <button id="chatClearBtn" class="back-btn" style="background:rgba(211,47,47,0.2); color:var(--danger); display:none;" onclick="clearGroupChat()"><i class="fas fa-broom"></i></button>
            </div>
            
            <div id="chatBox" class="chat-messages">
                <!-- Messages go here -->
            </div>
            
            <div class="chat-input-area">
                <input type="file" id="chatFileInput" style="display: none;" onchange="handleChatFileSelect(this)" accept="image/*,video/*,.pdf,.doc,.docx">
                <button class="btn attach-btn" onclick="document.getElementById('chatFileInput').click()">
                    <i class="fas fa-paperclip"></i>
                </button>
                
                <div id="chatFilePreview">
                    <div style="display:flex; align-items:center; gap:10px; overflow:hidden;">
                        <i class="fas fa-file-alt" style="color:var(--primary); font-size:20px;"></i>
                        <span id="chatFileName" style="font-size:12px; white-space:nowrap; text-overflow:ellipsis; overflow:hidden; max-width:150px;"></span>
                    </div>

    function formatDateWhatsApp(ts) {
        const d = new Date(ts);
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        const isToday = d.getDate() === today.getDate() && d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
        const isYesterday = d.getDate() === yesterday.getDate() && d.getMonth() === yesterday.getMonth() && d.getFullYear() === yesterday.getFullYear();
        
        const timeOpts = { hour: '2-digit', minute: '2-digit' };
        if (isToday) return `اليوم، ${d.toLocaleTimeString('ar-AE', timeOpts)}`;
        if (isYesterday) return `أمس، ${d.toLocaleTimeString('ar-AE', timeOpts)}`;
        return `${d.toLocaleDateString('ar-AE')} ${d.toLocaleTimeString('ar-AE', timeOpts)}`;
    }

    // --- Radar & Geolocation ---
    function initRadar() {
        if(!map) { 
            map = L.map('radarMap', { zoomControl: false, attributionControl: false }).setView([25.3462, 55.4209], 12); 
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
        }

        if (navigator.geolocation) {
            watchId = navigator.geolocation.watchPosition(pos => {
                db.ref('online_users/' + currentUser).set({ 
                    lat: pos.coords.latitude, 
                    lng: pos.coords.longitude, 
                    name: personnelDB[currentUser].name, 
                    rank: personnelDB[currentUser].rank,
                    time: Date.now() 
                });
                db.ref('online_users/' + currentUser).onDisconnect().remove();
            }, err => {
                console.error(err);
                if(err.code === 1) showToast("تم رفض صلاحية الموقع. التتبع متوقف.", "error");
            }, { enableHighAccuracy: true, maximumAge: 10000 });
        }

        db.ref('online_users').on('value', snap => {
            const data = snap.val() || {};
            document.getElementById('onlineCountDisplay').innerText = Object.keys(data).length;
            
            for(let id in markers) { 
                if(!data[id]) { map.removeLayer(markers[id]); delete markers[id]; } 
            }
            
            for(let id in data) {
                const u = data[id];
                if(markers[id]) {
                    markers[id].setLatLng([u.lat, u.lng]);
                } else {
                    const isMe = id === currentUser;
                    const color = isMe ? '#968c83' : '#b9b3ad'; 
                    markers[id] = L.circleMarker([u.lat, u.lng], { 
                        radius: isMe ? 8 : 6, 
                        fillColor: color, 
                        color: "#000", 
                        weight: 2, 
                        fillOpacity: 0.9 
                    }).addTo(map)
                    .bindTooltip(`<div style="text-align:center;"><b>${u.rank} / ${u.name}</b><br><span style="font-size:10px; color:#aaa;">رقم: ${id}</span></div>`, {permanent: false, direction: 'top', className: 'glass-panel'});
                }
            }
        });
    }

            let fileName = null;

            if(fileInp.files.length > 0) {
                const file = fileInp.files[0];
                fileName = file.name;
                const storageRef = storage.ref(`requests_attachments/${Date.now()}_${fileName}`);
                const snapshot = await storageRef.put(file);
                fileUrl = await snapshot.ref.getDownloadURL();
            }

            const reqRef = db.ref('all_requests').push();
            const reqId = reqRef.key;
            const reqObj = {
                id: reqId,
                senderId: currentUser,
                senderName: personnelDB[currentUser].name,
                senderRank: personnelDB[currentUser].rank,
                type: type,
                details: details,
                fileUrl: fileUrl,
                fileName: fileName,
                status: 'pending',
                time: Date.now()
            };

            await reqRef.set(reqObj);

            await db.ref('chats/رئيس القسم').push({
                isRequest: true,
                reqId: reqId,
                senderId: currentUser,
                text: `📥 طلب إداري جديد:\nالنوع: ${type}\nالتفاصيل: ${details}`,
                fileUrl: fileUrl,
                fileName: fileName,
                fileType: fileUrl ? 'document' : null,
                status: 'pending',
                time: Date.now()
            });

            showToast("تم إرسال الطلب بنجاح للقيادة", "success");
            document.getElementById('reqDetails').value = "";
            fileInp.value = "";
            updateFileName(fileInp, 'reqFileNameText');
            
            switchTab('home', document.querySelectorAll('.nav-item')[0]);

        } catch (error) {
            console.error("Upload error:", error);
            showToast("فشل الاتصال بالخادم، حاول مجدداً", "error");
        } finally {
            btn.innerHTML = 'إرسال الطلب للقيادة';
            btn.disabled = false;
        }
    }

    function listenForMyRequests() {
        db.ref('all_requests').orderByChild('senderId').equalTo(currentUser).on('value', snap => {
            const list = document.getElementById('myReqList');
            list.innerHTML = "";
            let hasReqs = false;
            
            const reqs = [];
            snap.forEach(c => { reqs.push(c.val()); });
            reqs.reverse();

            reqs.forEach(r => {
                hasReqs = true;
                const isPending = r.status === 'pending';
                const isAccepted = r.status === 'accepted';
                
                const cardClass = isPending ? 'req-pending' : (isAccepted ? 'req-accepted' : 'req-rejected');
                const badgeClass = isPending ? 'badge-pending' : (isAccepted ? 'badge-accepted' : 'badge-rejected');
                const statusText = isPending ? 'قيد المراجعة' : (isAccepted ? 'تم الاعتماد' : 'تم الرفض');
                const reasonHtml = r.rejectReason ? `<div class="req-reason-text"><i class="fas fa-exclamation-triangle"></i> سبب الرفض: ${r.rejectReason}</div>` : '';
                
                const card = document.createElement('div');
                card.className = `glass-panel req-card ${cardClass}`;
                card.innerHTML = `
                    <div class="req-header">
                        <strong style="font-size: 14px; color:var(--text-main);">${r.type}</strong>
                        <span class="req-badge ${badgeClass}">${statusText}</span>
                    </div>
                    <div class="req-time"><i class="far fa-clock"></i> ${formatDateWhatsApp(r.time)}</div>
                    ${reasonHtml}
                `;
                list.appendChild(card);
            });

            if(!hasReqs) {
                list.innerHTML = '<div style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 30px; background: rgba(0,0,0,0.2); border-radius:12px;">لا توجد طلبات سابقة في سجلك</div>';
            }
        });
    }

    // --- WhatsApp Style Chat System ---
    function handleChatFileSelect(input) {
        if(input.files.length > 0) {
            pendingChatFile = input.files[0];
            document.getElementById('chatFilePreview').style.display = 'flex';
            document.getElementById('chatFileName').textContent = pendingChatFile.name;
        }
    }

    function clearChatFile() {
        pendingChatFile = null;
        document.getElementById('chatFileInput').value = "";
        document.getElementById('chatFilePreview').style.display = 'none';
    }

    function openChat(groupName, iconClass) {
        document.getElementById('groupList').style.display = 'none';
        document.getElementById('activeChat').style.display = 'flex';
        document.getElementById('chatTitle').textContent = groupName;
        document.getElementById('chatHeaderIcon').className = iconClass;
        
        const box = document.getElementById('chatBox');
        box.innerHTML = '<div style="text-align:center; padding:30px;"><span class="loader"></span></div>';
        
        if(currentChatRef) db.ref(currentChatRef).off();
        currentChatRef = 'chats/' + groupName;

        db.ref(currentChatRef).on('value', snap => {
            box.innerHTML = "";
            
            snap.forEach(c => {
                const m = c.val();
                const key = c.key;
                
                const msgSenderId = m.senderId || '1321'; 
                const isMine = msgSenderId === currentUser;
                const senderData = personnelDB[msgSenderId] || {name: m.name || 'غير معروف', rank: ''};
                
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg-bubble ${isMine ? 'msg-mine' : 'msg-other'}`;
                
                let deleteBtnHtml = '';
                if(isMine) {
                    deleteBtnHtml = `<button onclick="deleteMsg('${key}')" style="background:none; border:none; color:var(--danger); cursor:pointer; opacity:0.7; padding:5px;"><i class="fas fa-trash-alt"></i></button>`;
                }

                let contentHTML = `
                    <div class="msg-user-meta">
                        <div style="display:flex; align-items:center; gap:8px;">
                            <div class="msg-avatar"><i class="fas fa-shield-alt"></i></div>
                            <div>
                                <div class="msg-name-rank" style="color:${isMine ? 'var(--text-main)' : 'var(--primary)'};">${senderData.rank} / ${senderData.name}</div>
                                <div class="msg-id">رقم عسكري: ${msgSenderId}</div>
                            </div>
                        </div>
                        ${deleteBtnHtml}
                    </div>`;
                
                if(m.text) {
                    const textDiv = document.createElement('div');
                    textDiv.className = "msg-text";
                    textDiv.textContent = m.text;
                    contentHTML += textDiv.outerHTML;
                }
                
                if(m.fileUrl) {
                    const fName = m.fileName || 'مرفق';
                    if(m.fileType === 'image') {
                        contentHTML += `<div style="margin-top:10px;"><img src="${m.fileUrl}" style="width:100%; border-radius:8px; border:1px solid rgba(255,255,255,0.1);" onclick="window.open('${m.fileUrl}', '_blank')"></div>`;
                    } else if (m.fileType === 'video') {
                        contentHTML += `<div style="margin-top:10px;"><video src="${m.fileUrl}" controls style="width:100%; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:#000;"></video></div>`;
                    } else {
                        contentHTML += `<a href="${m.fileUrl}" target="_blank" style="display:flex; align-items:center; gap:12px; margin-top:10px; padding:12px; background:rgba(0,0,0,0.4); border-radius:8px; text-decoration:none; border:1px solid var(--panel-border);">
                            <i class="fas fa-file-download fa-2x" style="color:var(--primary);"></i>
                            <div style="overflow:hidden;">
                                <div style="font-size:13px; color:var(--text-main); white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">${fName}</div>
                                <div style="font-size:11px; color:var(--text-muted); margin-top:3px;">اضغط للتحميل</div>
                            </div>
                        </a>`;
                    }
                }

                if(groupName === 'رئيس القسم' && m.isRequest) {
                    if(m.status === 'pending') {
                        contentHTML += `
                        <div class="admin-actions">
                            <button class="btn btn-primary" onclick="updateReqStatus('${key}', '${m.reqId}', 'accepted')"><i class="fas fa-check-circle"></i> اعتماد</button>
                            <button class="btn btn-danger" onclick="updateReqStatus('${key}', '${m.reqId}', 'rejected')"><i class="fas fa-times-circle"></i> رفض</button>
                        </div>`;
                    } else {
                        const sText = m.status === 'accepted' ? '<span style="color:var(--success)"><i class="fas fa-check"></i> معتمد</span>' : '<span style="color:var(--danger)"><i class="fas fa-times"></i> مرفوض</span>';
                        contentHTML += `<div style="margin-top:10px; font-size:12px; font-weight:bold; background:rgba(0,0,0,0.4); padding:8px 12px; border-radius:6px; text-align:center;">حالة الطلب: ${sText}</div>`;
                    }
                }

                contentHTML += `<div class="msg-time">${formatDateWhatsApp(m.time)} <i class="fas fa-check-double" style="color: ${isMine ? 'var(--primary)' : 'var(--text-muted)'}; margin-right:4px; font-size:11px;"></i></div>`;
                
                msgDiv.innerHTML = contentHTML;
                box.appendChild(msgDiv);
            });
            
            setTimeout(() => { box.scrollTop = box.scrollHeight; }, 100);
        });
    }

    function backToGroups() {
        document.getElementById('groupList').style.display = 'flex';
        document.getElementById('activeChat').style.display = 'none';
        if(currentChatRef) db.ref(currentChatRef).off();
    }

    document.getElementById('msgInput').addEventListener('input', function() {
        this.style.height = '50px';
        this.style.height = (this.scrollHeight) + 'px';
        if(this.value.trim() === "") this.style.height = '50px';
    });

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const val = input.value.trim();
        const sendBtn = document.getElementById('chatSendBtn');
        
        if((!val && !pendingChatFile) || !currentChatRef) return;

        sendBtn.innerHTML = '<span class="loader" style="width:18px;height:18px;border-width:2px;"></span>';
        sendBtn.disabled = true;

        try {
            let fileUrl = null;
            let fileName = null;
            let fileType = null;

            if (pendingChatFile) {
                fileName = pendingChatFile.name;
                if (pendingChatFile.type.startsWith('image/')) fileType = 'image';
                else if (pendingChatFile.type.startsWith('video/')) fileType = 'video';
                else fileType = 'document';

                const storageRef = storage.ref(`chat_attachments/${Date.now()}_${fileName}`);
                const snapshot = await storageRef.put(pendingChatFile);
                fileUrl = await snapshot.ref.getDownloadURL();
            }

            await db.ref(currentChatRef).push({ 
                senderId: currentUser,
                time: Date.now(),
                text: val, 
                fileUrl: fileUrl,
                fileName: fileName,
                fileType: fileType
            });

            input.value = "";
            input.style.height = '50px';
            clearChatFile();
            
            const box = document.getElementById('chatBox');
            setTimeout(() => { box.scrollTop = box.scrollHeight; }, 100);

        } catch (error) {
            console.error(error);
            showToast("تعذر إرسال الرسالة، تحقق من الاتصال", "error");
        } finally {
            sendBtn.innerHTML = '<i class="fas fa-paper-plane" style="margin-right:-3px;"></i>';
            sendBtn.disabled = false;
        }
    }

    function deleteMsg(msgKey) {
        if(confirm("هل أنت متأكد من حذف هذه الرسالة؟ لا يمكن التراجع عن هذا الإجراء.")) {
            db.ref(currentChatRef).child(msgKey).remove();
        }
    }

    function clearGroupChat() {
        if(confirm("تحذير أمني عالي: هل أنت متأكد من مسح محادثات هذه المجموعة بالكامل لكافة الأفراد؟ هذا الإجراء لا يمكن التراجع عنه.")) {
            db.ref(currentChatRef).remove();
            showToast("تم مسح المحادثات بالكامل", "success");
        }
    }

    function updateReqStatus(msgKey, reqId, newStatus) {
        let reason = "";
        if(newStatus === 'rejected') {
            reason = prompt("الرجاء توضيح سبب رفض الطلب:");
            if(reason === null) return; 
        }

        db.ref('all_requests/' + reqId).update({ status: newStatus, rejectReason: reason });
        db.ref('chats/رئيس القسم/' + msgKey).update({ status: newStatus });
        
        showToast("تم تحديث واعتماد حالة الطلب بنجاح", "success");
    }

</script>
</body>
</html>
